# Auto-publish @spendguard/openclaw-provider-plugin to npm with provenance.
#
# Trigger: any GitHub release tagged `openclaw-v*` (e.g. `openclaw-v0.1.0`).
# Auth:   NODE_AUTH_TOKEN (the NPM_TOKEN repo secret, a granular access token
#         with bypass-2FA) authenticates the publish; --provenance attaches a
#         signed build attestation from GitHub Actions.
#
# Source: integrations/openclaw-provider-plugin/ (a pnpm workspace member).
# Depends on @spendguard/sdk, so the SDK is built first to emit the .d.ts the
# typecheck resolves against. No lint step (the package ships no lint script).

name: Publish @spendguard/openclaw-provider-plugin to npm

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger for re-publish testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/openclaw-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: npm
      url: https://www.npmjs.com/package/@spendguard/openclaw-provider-plugin/v/${{ github.ref_name }}
    defaults:
      run:
        working-directory: integrations/openclaw-provider-plugin
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (workspace-aware, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build @spendguard/sdk (workspace dependency)
        # The plugin typechecks against @spendguard/sdk's emitted .d.ts in
        # dist/; the SDK dist is gitignored, so build it before typecheck.
        run: pnpm --filter @spendguard/sdk run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build (tsup ESM + .d.ts emit)
        run: pnpm run build

      - name: Size budget
        run: sh scripts/size-budget.sh

      - name: Publish to npm (provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
