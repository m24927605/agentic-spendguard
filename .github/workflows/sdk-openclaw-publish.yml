# Auto-publish @spendguard/openclaw-provider-plugin to npm with provenance.
#
# Trigger: any GitHub release tagged `openclaw-v*` (e.g. `openclaw-v0.1.0`).
# Auth:   NODE_AUTH_TOKEN (the NPM_TOKEN repo secret, a granular access token
#         with bypass-2FA) authenticates the publish; --provenance attaches a
#         signed build attestation from GitHub Actions.
#
# Source: integrations/openclaw-provider-plugin/ — a STANDALONE package (NOT a
# pnpm workspace member; split out 2026-06-22). It builds/typechecks against the
# PUBLISHED @spendguard/sdk + openclaw peers, installed via `pnpm --ignore-workspace`.
# No lint step (the package ships no lint script).

name: Publish @spendguard/openclaw-provider-plugin to npm

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger for re-publish testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/openclaw-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: npm
      url: https://www.npmjs.com/package/@spendguard/openclaw-provider-plugin/v/${{ github.ref_name }}
    defaults:
      run:
        working-directory: integrations/openclaw-provider-plugin
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: integrations/openclaw-provider-plugin/package.json

      - name: Install deps (standalone — not a workspace member)
        # integrations/openclaw-provider-plugin was split out of the pnpm
        # workspace 2026-06-22. --ignore-workspace resolves its own deps + peers
        # (@spendguard/sdk ^0.5.0, openclaw) from npm, not the root workspace.
        run: pnpm install --ignore-workspace

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build (tsup ESM + .d.ts emit)
        run: pnpm run build

      - name: Size budget
        run: sh scripts/size-budget.sh

      - name: Publish to npm (provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
