name: Helm chart validation

on:
  pull_request:
    paths:
      - "charts/spendguard/**"
      - ".github/workflows/helm-validate.yml"
      - "scripts/helm-validate.sh"
      - "scripts/helm-validate-kind.sh"
      - "scripts/helm-validate-test-values.yaml"
  push:
    branches: [main]
    paths:
      - "charts/spendguard/**"
      - ".github/workflows/helm-validate.yml"
      - "scripts/helm-validate.sh"
      - "scripts/helm-validate-kind.sh"
      - "scripts/helm-validate-test-values.yaml"
  workflow_dispatch:
    inputs:
      run_kind_e2e:
        description: "Run full kind e2e install validation"
        required: true
        default: true
        type: boolean
      image_source:
        description: "Image source for full kind e2e"
        required: true
        default: "published"
        type: choice
        options:
          - published
          - build
  schedule:
    # Nightly full kind e2e validation. Push/PR paths stay fast and rely
    # on the template gate; manual dispatch can run this gate on demand.
    - cron: "0 18 * * *"

permissions:
  contents: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  template:
    name: helm lint + template gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.0

      - name: helm lint
        run: helm lint charts/spendguard

      - name: helm template profile=demo (defaults must succeed)
        run: |
          helm template spendguard charts/spendguard > /dev/null

      - name: helm template profile=production with defaults (MUST FAIL)
        run: |
          set +e
          out=$(helm template spendguard charts/spendguard --set chart.profile=production 2>&1)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::Expected helm template to FAIL with chart.profile=production + default CHANGE_ME values; it succeeded. Production fail-gates are not firing."
            echo "$out" | head -20
            exit 1
          fi
          # Expect at least one production safety validation to have triggered.
          echo "$out" | grep -q -E "(CHANGE_ME|required under chart.profile=production|must be .* under chart.profile=production)" || {
            echo "::error::Expected a fail() message from validations.yaml / sidecar.yaml / outbox-forwarder.yaml / canonical-ingest.yaml gates; got:"
            echo "$out" | head -20
            exit 1
          }
          echo "✓ profile=production failed as expected: $(echo "$out" | head -1)"

      - name: helm template profile=production with full values (must succeed)
        run: |
          helm template spendguard charts/spendguard \
            -f scripts/helm-validate-test-values.yaml \
            > /tmp/rendered-production.yaml
          test -s /tmp/rendered-production.yaml
          echo "✓ profile=production with full values rendered $(wc -l < /tmp/rendered-production.yaml) lines"

      - name: kubeval-style YAML validation (no cluster needed)
        run: |
          # Skip kubectl apply --dry-run=client; it requires a live API
          # server to fetch OpenAPI. Real K8s validation happens in the
          # kind job. Here we just confirm the rendered YAML parses as
          # a multi-document YAML stream and every doc has apiVersion +
          # kind (typed-resource sanity).
          python3 <<'PY'
          import sys, yaml
          with open("/tmp/rendered-production.yaml") as f:
              docs = list(yaml.safe_load_all(f))
          docs = [d for d in docs if d]  # strip empties from --- separators
          if not docs:
              print("::error::no documents in rendered YAML")
              sys.exit(1)
          bad = [i for i, d in enumerate(docs) if not (d.get("apiVersion") and d.get("kind"))]
          if bad:
              print(f"::error::documents missing apiVersion/kind: indices={bad}")
              sys.exit(1)
          kinds = {}
          for d in docs:
              kinds[d["kind"]] = kinds.get(d["kind"], 0) + 1
          print(f"✓ {len(docs)} documents parsed; kinds={kinds}")
          PY

  kind:
    name: kind cluster install (demo profile)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Slow job: spins up kind + postgres + helm install + waits for pods
    # Ready. Kept out of push/PR runs. Nightly (schedule) BUILDS the service
    # images in-job and kind-loads them — self-contained, with no dependency
    # on a published sha-<HEAD> image (which often does not exist because HEAD
    # is a docs commit, or publishing was gated). Manual dispatch can choose
    # image_source=published to validate already-published images instead.
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_kind_e2e)
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.0

      - name: Install kind
        run: |
          install -d "$RUNNER_TEMP/bin"
          curl -fsSL https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64 -o "$RUNNER_TEMP/bin/kind"
          chmod +x "$RUNNER_TEMP/bin/kind"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          kind version

      - name: Install kubectl
        run: |
          install -d "$RUNNER_TEMP/bin"
          curl -fsSL https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl -o "$RUNNER_TEMP/bin/kubectl"
          chmod +x "$RUNNER_TEMP/bin/kubectl"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          kubectl version --client

      - name: Log in to GHCR
        # Only needed when actually PULLING published images. The nightly
        # schedule builds in-job (image_source=build) and needs no registry.
        if: inputs.image_source == 'published'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run kind validation script (STRICT_READY=1)
        run: |
          image_source="${IMAGE_SOURCE:-published}"
          case "$image_source" in
            published)
              short_sha="${GITHUB_SHA::7}"
              KIND_IMAGE_TAG="sha-${short_sha}" \
              LOAD_PUBLISHED_IMAGES=1 \
              STRICT_READY=1 \
              bash scripts/helm-validate-kind.sh
              ;;
            build)
              BUILD_IMAGES=1 STRICT_READY=1 bash scripts/helm-validate-kind.sh
              ;;
            *)
              echo "::error::unsupported image_source=${image_source}"
              exit 1
              ;;
          esac
        env:
          # Nightly schedule → build images in-job + kind-load (self-contained,
          # never hits "manifest unknown" on a missing sha-<HEAD> image).
          # workflow_dispatch honors the chosen input; default elsewhere is published.
          IMAGE_SOURCE: ${{ inputs.image_source || (github.event_name == 'schedule' && 'build' || 'published') }}
        timeout-minutes: 75

      - name: Dump pod state on failure
        if: failure()
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            echo "kubectl is not installed; skipping pod dump."
            exit 0
          fi
          if ! kubectl config get-contexts -o name | grep -qx 'kind-spendguard-validate'; then
            echo "kind-spendguard-validate context is not available; skipping pod dump."
            exit 0
          fi
          kubectl --context kind-spendguard-validate get pods -A
          for pod in $(kubectl --context kind-spendguard-validate get pods -n spendguard -o name); do
            echo "=== $pod ==="
            kubectl --context kind-spendguard-validate logs -n spendguard "$pod" --tail=50 2>&1 || true
          done

      - name: Tear down kind cluster
        if: always()
        run: |
          if command -v kind >/dev/null 2>&1; then
            kind delete cluster --name spendguard-validate
          else
            echo "kind is not installed; skipping cluster teardown."
          fi
