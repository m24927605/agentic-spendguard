# Auto-publish spendguard-sdk to PyPI via Trusted Publisher OIDC.
#
# Trigger: any GitHub release tagged `sdk-v*` (e.g. `sdk-v0.3.1`).
# Auth:   no PyPI API token — PyPI trusts THIS workflow file via OIDC.
#         Setup: PyPI → Manage account → Publishing → Add trusted publisher
#           - PyPI Project Name: spendguard-sdk
#           - Owner:             m24927605
#           - Repository:        agentic-spendguard
#           - Workflow filename: sdk-publish.yml
#           - Environment:       pypi (optional but recommended)
#
# Future releases: `gh release create sdk-v0.3.1 --title "..." --notes "..."`
# CI then builds + uploads with NO secret in any config.

name: Publish spendguard-sdk to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger for re-publish testing

jobs:
  publish:
    # Only fire for sdk-v* tags. Other release tags (e.g. helm-chart-v*)
    # ignored.
    if: startsWith(github.ref, 'refs/tags/sdk-v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/spendguard-sdk/${{ github.ref_name }}
    permissions:
      # OIDC token for Trusted Publisher exchange with PyPI.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip build

      - name: Generate proto stubs
        # The SDK's pyproject builds from src/ which expects generated
        # _proto/ stubs. Reuse the Makefile target. Keep grpcio-tools
        # below 1.72 while package runtime allows protobuf<6; newer
        # generators emit protobuf 6.x gencode that fails imports with
        # the SDK's runtime dependency range.
        run: |
          python -m pip install 'grpcio-tools>=1.62,<1.72'
          make -C sdk/python proto

      - name: Build sdist + wheel
        run: python -m build sdk/python

      - name: Verify build artifacts
        run: |
          python -m pip install twine
          python -m twine check sdk/python/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/
          # No `password:` — Trusted Publisher OIDC flow.
