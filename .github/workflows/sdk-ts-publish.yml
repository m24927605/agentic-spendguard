# Auto-publish @spendguard/sdk to npm via Trusted Publisher OIDC.
#
# Trigger: any GitHub release tagged `ts-sdk-v*` (e.g. `ts-sdk-v0.1.0`).
# Auth:   no npm API token in steady state — npm trusts THIS workflow file
#         via OIDC provenance.
#         Setup: npm → @spendguard/sdk → Settings → Trusted publishers
#           - Owner:             m24927605
#           - Repository:        agentic-spendguard
#           - Workflow filename: sdk-ts-publish.yml
#           - Environment:       npm (optional but recommended)
#
# During the npm Trusted Publisher rollout window (review-standards §12.8) the
# workflow falls back to `NODE_AUTH_TOKEN` (the `NPM_TOKEN` repo secret) so
# the first publish can still happen. Once the Trusted Publisher entry is in
# place on npm, the token can be revoked.
#
# Future releases: `gh release create ts-sdk-v0.1.0 --title "..." --notes "..."`
# CI then runs proto -> lint -> typecheck -> test -> build -> size and only
# then `npm publish --provenance --access public`.

name: Publish @spendguard/sdk to npm

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger for re-publish testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # Only fire for ts-sdk-v* tags. Other release tags (e.g. sdk-v*, helm-chart-v*)
    # are ignored so the Python and TypeScript releases stay independent.
    if: startsWith(github.ref, 'refs/tags/ts-sdk-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: npm
      url: https://www.npmjs.com/package/@spendguard/sdk/v/${{ github.ref_name }}
    defaults:
      run:
        working-directory: sdk/typescript
    permissions:
      # OIDC token for Trusted Publisher exchange with npm + the npm
      # `--provenance` flag (which also requires id-token: write).
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        # proto:check (below) runs codegen via scripts/proto.ts which needs
        # protoc. Pin libprotoc 35 to match the version that generated the
        # committed src/_proto tree (mirrors sdk-ts-ci.yml). apt protoc 3.21
        # is too old for the bundled google/protobuf well-known imports.
        uses: arduino/setup-protoc@v3
        with:
          version: "35.0"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pin pnpm to the same major as the lockfile (lockfile v9 = pnpm 9+).
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          # The SDK is part of the repo-root pnpm workspace; there is no
          # standalone sdk/typescript/pnpm-lock.yaml. Point the cache at the
          # root lockfile (matches sdk-ts-ci.yml). node 22: node 20 fails the
          # isolated-vm native build at install (v8::SourceLocation).
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Verify version parity (package.json vs src/version.ts)
        run: pnpm run version-check

      - name: Generate proto stubs (lockfile parity check)
        # SLICE 3 commits the generated `src/_proto/` tree; `proto:check`
        # re-runs codegen against the committed source and bails if anything
        # would have changed. This is the TS equivalent of `make proto`
        # in the Python workflow.
        run: pnpm run proto:check

      - name: Lint
        # The root pnpm-lock.yaml resolved @biomejs/biome's platform binary for
        # darwin only (lockfile generated on macOS), so `pnpm run lint` can't
        # find the biome native binary on Linux. Run the pinned biome via dlx,
        # which fetches the correct platform build (matches botpress CI).
        run: pnpm dlx @biomejs/biome@1.9.4 check src tests scripts

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test (366 cross-language + unit + integration suites)
        run: pnpm run test

      - name: Build (tsup ESM + .d.ts emit)
        run: pnpm run build

      - name: Prepublish (copy cross-language fixture + rebuild)
        # `pnpm publish` runs the `prepublishOnly` hook automatically; we
        # invoke it explicitly here so the size budget step below measures
        # the exact pack contents the publish step will upload.
        run: bash scripts/prepublish.sh

      - name: Size budget (npm pack tarball ≤ 250 KB)
        run: pnpm run size

      - name: Publish to npm (Trusted Publisher OIDC + provenance)
        # `--provenance` requires id-token: write (set on the job).
        # `--access public` is also pinned in `publishConfig` but kept here
        # so the published-access mode is explicit at the call site.
        # NODE_AUTH_TOKEN is the rollout-window fallback per review-standards
        # §12.8; with Trusted Publisher configured on npm it is ignored.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
