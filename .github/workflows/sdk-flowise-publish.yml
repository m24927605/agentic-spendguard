# Auto-publish @spendguard/flowise-nodes to npm with provenance.
#
# Trigger: any GitHub release tagged `flowise-v*` (e.g. `flowise-v0.1.0`).
# Auth:   NODE_AUTH_TOKEN (the NPM_TOKEN repo secret, a granular access token
#         with bypass-2FA) authenticates the publish; --provenance attaches a
#         signed build attestation from GitHub Actions.
#
# Source: integrations/flowise/ (a pnpm workspace member). Depends on
# @spendguard/sdk, so the SDK is built first to emit the .d.ts the typecheck
# resolves against.

name: Publish @spendguard/flowise-nodes to npm

on:
  release:
    types: [published]
  workflow_dispatch:  # allow manual trigger for re-publish testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/flowise-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: npm
      url: https://www.npmjs.com/package/@spendguard/flowise-nodes/v/${{ github.ref_name }}
    defaults:
      run:
        working-directory: integrations/flowise
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (workspace-aware, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build @spendguard/sdk (workspace dependency)
        # The adapter typechecks against @spendguard/sdk's emitted .d.ts in
        # dist/; the SDK dist is gitignored, so build it before typecheck.
        run: pnpm --filter @spendguard/sdk run build

      - name: Lint
        # biome native binary is darwin-only in the root lockfile; dlx fetches the Linux build.
        run: pnpm dlx @biomejs/biome@1.9.4 check src tests

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build (tsup ESM + .d.ts emit)
        run: pnpm run build

      - name: Publish to npm (provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
