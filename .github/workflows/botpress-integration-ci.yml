# CI for @spendguard/botpress-integration.
#
# SpendGuard is a Botpress LLM-provider integration: it implements the
# `generateContent` action (the point Botpress calls for an LLM completion),
# reserving budget with the SpendGuard sidecar before forwarding to the
# upstream provider and committing real usage afterwards.
#
# The pipeline (all offline / no Botpress Cloud auth):
#   1. Install the pnpm workspace (frozen lockfile).
#   2. Build the @spendguard/sdk workspace dependency (its dist/ is gitignored,
#      and the integration imports its runtime helpers — computePromptHash,
#      deriveIdempotencyKey, newUuid7 — so the dist must exist before tests).
#   3. Lint (biome via dlx), typecheck (tsc x2), build (tsup), unit tests
#      (vitest), resolving `import * as bp from '.botpress'` against the
#      COMMITTED `.botpress/` typings. CI does NOT run `bp build`: although
#      it claims offline, the @botpress/cli reaches Botpress Cloud and has
#      hung to the 6h job ceiling. Regenerate locally with `pnpm bp:build`
#      and commit `.botpress/` when integration.definition.ts changes.
#
# The Docker / real-Botpress-server integration tier is intentionally NOT run
# here: the previous hook-based integration tests targeted an architecture
# (`beforeAiGeneration` / `afterAiGeneration` bot hooks) that does not exist in
# the real @botpress/sdk. A real end-to-end tier (booting a Botpress bot that
# routes LLM calls through this provider integration) is tracked separately.

name: Botpress integration CI

on:
  pull_request:
    paths:
      - "integrations/botpress/**"
      - ".github/workflows/botpress-integration-ci.yml"
  push:
    branches:
      - main
    paths:
      - "integrations/botpress/**"
      - ".github/workflows/botpress-integration-ci.yml"

jobs:
  unit-tier:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          # The lockfile lives at the repo root: the SDK + all adapters /
          # integrations share one pnpm workspace (see pnpm-workspace.yaml).
          cache-dependency-path: pnpm-lock.yaml

      - name: Install deps (workspace-aware, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build @spendguard/sdk (workspace dependency)
        # The integration imports the SDK's runtime helpers; its dist/ is
        # gitignored, so build it before typecheck/test resolve the package.
        run: pnpm --filter @spendguard/sdk run build

      # NOTE: no `bp build` step — `.botpress/` typings are committed; running
      # the codegen in CI has hung to the 6h ceiling reaching Botpress Cloud.

      - name: Lint
        # The root pnpm-lock.yaml resolved @biomejs/biome's platform binary for
        # darwin only (the lockfile was generated on macOS), so `pnpm run lint`
        # can't find the biome native binary on the Linux runner. Run the pinned
        # biome via dlx, which fetches the correct platform build. (Permanent
        # fix: regenerate the lockfile with pnpm supportedArchitectures.)
        working-directory: integrations/botpress
        run: pnpm dlx @biomejs/biome@1.9.4 check src tests

      - name: Typecheck
        working-directory: integrations/botpress
        run: pnpm run typecheck

      - name: Build
        working-directory: integrations/botpress
        run: pnpm run build

      - name: Unit tests
        working-directory: integrations/botpress
        run: pnpm run test
