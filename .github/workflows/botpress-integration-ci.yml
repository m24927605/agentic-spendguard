# CI for @spendguard/botpress-integration.
#
# SpendGuard is a Botpress LLM-provider integration: it implements the
# `generateContent` action (the point Botpress calls for an LLM completion),
# reserving budget with the SpendGuard sidecar before forwarding to the
# upstream provider and committing real usage afterwards.
#
# The pipeline (all offline / no Botpress Cloud auth):
#   1. Install standalone (`pnpm install --ignore-workspace`): integrations/botpress
#      was split out of the pnpm workspace 2026-06-22, so it resolves its own
#      devDeps + peers (@spendguard/sdk ^0.5.0 from npm, @botpress/sdk/cli) here
#      rather than dragging the @botpress/cli tree into the core SDK lockfile.
#   2. Generate the Botpress `.botpress` module via `bp build` (offline
#      codegen from integration.definition.ts; needed for the bare
#      `import * as bp from '.botpress'` to resolve). Bounded by a 5m STEP
#      timeout — the @botpress/cli can intermittently hang reaching Botpress
#      Cloud (it hung to the 6h job ceiling once when unbounded).
#   3. Lint (biome via dlx), typecheck (tsc x2), build (tsup), unit tests
#      (vitest).
#
# The Docker / real-Botpress-server integration tier is intentionally NOT run
# here: the previous hook-based integration tests targeted an architecture
# (`beforeAiGeneration` / `afterAiGeneration` bot hooks) that does not exist in
# the real @botpress/sdk. A real end-to-end tier (booting a Botpress bot that
# routes LLM calls through this provider integration) is tracked separately.

name: Botpress integration CI

on:
  pull_request:
    paths:
      - "integrations/botpress/**"
      - ".github/workflows/botpress-integration-ci.yml"
  push:
    branches:
      - main
    paths:
      - "integrations/botpress/**"
      - ".github/workflows/botpress-integration-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tier:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: integrations/botpress/package.json

      - name: Install deps (standalone — not a workspace member)
        # integrations/botpress was split out of the pnpm workspace 2026-06-22.
        # --ignore-workspace resolves only its own devDeps + peers (@spendguard/sdk
        # ^0.5.0, @botpress/sdk, @botpress/cli) from npm, so the @botpress/cli tree
        # no longer pollutes the core SDK lockfile.
        working-directory: integrations/botpress
        run: pnpm install --ignore-workspace

      - name: Generate Botpress typings (offline codegen)
        # `bp build` regenerates the `.botpress/` module (typings +
        # node_modules/.botpress link + index.js) that src resolves via the
        # bare `import * as bp from '.botpress'` — required for typecheck/build.
        # Normally offline and fast (~seconds), but the @botpress/cli can
        # intermittently hang reaching Botpress Cloud; the 5m STEP timeout caps
        # that (it hung to the 6h job ceiling once with no timeout).
        working-directory: integrations/botpress
        timeout-minutes: 5
        run: pnpm exec bp build -y

      - name: Lint
        # The root pnpm-lock.yaml resolved @biomejs/biome's platform binary for
        # darwin only (the lockfile was generated on macOS), so `pnpm run lint`
        # can't find the biome native binary on the Linux runner. Run the pinned
        # biome via dlx, which fetches the correct platform build. (Permanent
        # fix: regenerate the lockfile with pnpm supportedArchitectures.)
        working-directory: integrations/botpress
        run: pnpm dlx @biomejs/biome@1.9.4 check src tests

      - name: Typecheck
        working-directory: integrations/botpress
        run: pnpm run typecheck

      - name: Build
        working-directory: integrations/botpress
        run: pnpm run build

      - name: Unit tests
        working-directory: integrations/botpress
        run: pnpm run test
