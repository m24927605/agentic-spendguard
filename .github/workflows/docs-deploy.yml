name: Deploy docs to GitHub Pages

# Runs on every push that touches the docs site or this workflow.
# Other paths don't trigger a rebuild — keeps the action minute usage low.
#
# 2026-05-22: migrated from MkDocs (`docs/site/`) to Astro Starlight
# (`docs/site-v2/`). The old MkDocs source stays in git for one release
# cycle as a rollback parachute; this workflow now only watches the new
# location.
on:
  push:
    branches: [main]
    paths:
      - 'docs/site-v2/**'
      - 'README.md'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch: {}

# Pages deploy needs id-token for OIDC + pages:write for the artifact.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. cancel-in-progress=false because we want the
# most recent commit on main to win, not the first started.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/site-v2/package-lock.json

      - name: Install Astro + Starlight deps
        working-directory: docs/site-v2
        run: npm ci

      - name: Build site
        working-directory: docs/site-v2
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site-v2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
