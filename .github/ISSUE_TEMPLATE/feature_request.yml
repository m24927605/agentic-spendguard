name: Feature request
description: Suggest an enhancement or new integration
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem are you trying to solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like SpendGuard to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New framework / gateway integration
        - Decision / contract DSL
        - Ledger / audit chain
        - Predictor / tokenizer
        - Observability / operations
        - SDK
        - Docs
        - other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else — wire/migration impact, links, prior art.
    validations:
      required: false
