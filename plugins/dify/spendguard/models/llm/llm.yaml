# SpendGuard LLM model schema.
# Models are prefixed with `spendguard/` to disambiguate from native
# Dify model picker entries. The plugin strips this prefix before forwarding
# the request to the chosen upstream provider.
model: spendguard/gpt-4o-mini
label:
  en_US: SpendGuard - gpt-4o-mini
model_type: llm
features:
  - agent-thought
  - tool-call
model_properties:
  mode: chat
  context_size: 128000
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: max_tokens
    use_template: max_tokens
    default: 512
    min: 1
    max: 16384
pricing:
  input: '0.15'
  output: '0.60'
  unit: '0.000001'
  currency: USD
