// SpendGuard Ledger service.
//
// Spec references:
//   - Stage 2 POC Topology spec v1alpha1 §4 (audit_outbox), §8.2.1 (gRPC API)
//   - Ledger Storage spec v1alpha1 §1-§22 (canonical truth model + DDL)
//   - Contract DSL spec v1alpha1 §6 (decision transaction stages),
//     §5 (commit state machine), §10 (refund/dispute), §14 (latency budget)
//   - Trace spec v1alpha1 §11 (audit anchors)
//
// Transport: gRPC over mTLS.
// Idempotency: scoped to (tenant_id, operation_kind, idempotency_key).
// Per-unit balance: enforced server-side (Ledger §3); cross-unit comparison forbidden.
// Audit invariant: ReserveSet + audit_outbox row inserted in single Postgres tx
// with synchronous_commit=on + sync replica quorum (Stage 2 §4).
//
// Compatibility: proto3, additive evolution; no field removal pre-GA.

syntax = "proto3";

package spendguard.ledger.v1;

import "google/protobuf/timestamp.proto";
import "spendguard/common/v1/common.proto";

// ============================================================================
// SERVICE
// ============================================================================

service Ledger {
  // -- Reservation lifecycle ------------------------------------------------

  // Atomic multi-budget reservation + audit_decision durable commit.
  //
  // Invariant: response is returned only after WAL durable + ≥1 sync replica
  // ack (Stage 2 §4.2). Sidecar must NOT publish_effect before receiving
  // success response.
  rpc ReserveSet(ReserveSetRequest) returns (ReserveSetResponse);

  // Phase 3 wedge: record a contract-evaluator-denied decision. Writes
  // a carrier ledger_transactions row (operation_kind='denied_decision';
  // no ledger_entries) plus an audit_outbox row preserving the
  // Contract §6.1 invariant 「無 audit 則無 effect」 even when no
  // reserve happens.
  rpc RecordDeniedDecision(RecordDeniedDecisionRequest)
      returns (RecordDeniedDecisionResponse);

  // Phase 5 S3: acquire / renew a fencing lease. Replaces seeded
  // current_epoch=1 with an SP-owned CAS lease lifecycle. Sidecar +
  // workers MUST hold a non-expired lease before issuing any ledger
  // mutation. Renewal preserves epoch; takeover bumps it.
  rpc AcquireFencingLease(AcquireFencingLeaseRequest)
      returns (AcquireFencingLeaseResponse);

  // Release held reservation (TTL expired / runtime error / run aborted).
  rpc Release(ReleaseRequest) returns (ReleaseResponse);

  // -- Commit lifecycle (per Contract §5 commitStateMachine) ----------------

  rpc CommitEstimated(CommitEstimatedRequest) returns (CommitEstimatedResponse);
  rpc ProviderReport(ProviderReportRequest) returns (ProviderReportResponse);
  rpc InvoiceReconcile(InvoiceReconcileRequest) returns (InvoiceReconcileResponse);

  // -- Refund / dispute (per Ledger §10; Contract §5.1a) --------------------

  rpc RefundCredit(RefundCreditRequest) returns (RefundCreditResponse);
  rpc DisputeAdjustment(DisputeAdjustmentRequest) returns (DisputeAdjustmentResponse);

  // -- Compensation (reverse a prior posting; for reconciliation) -----------

  rpc Compensate(CompensateRequest) returns (CompensateResponse);

  // -- Query -----------------------------------------------------------------

  rpc QueryBudgetState(QueryBudgetStateRequest) returns (QueryBudgetStateResponse);

  // Lookup reservation context (Phase 2B Step 7). Sidecar uses this to
  // recover commit-time context after a reservation_cache miss (e.g.,
  // process restart). Returns the canonical reservation row + frozen
  // pricing tuple + fencing scope from the original ReserveSet.
  rpc QueryReservationContext(QueryReservationContextRequest)
      returns (QueryReservationContextResponse);

  // -- Recovery (per Stage 2 §4.5; Codex round 1 A3, A9) --------------------

  // Stream historical audit_outbox events for sidecar crash recovery.
  // Server enforces fencing_epoch == current; rejects stale.
  rpc ReplayAuditFromCursor(ReplayAuditFromCursorRequest)
      returns (stream ReplayAuditEvent);

  // Query whether a decision has reached publish/outcome state.
  rpc QueryDecisionOutcome(QueryDecisionOutcomeRequest)
      returns (QueryDecisionOutcomeResponse);

  // -- Approval bundling (Round-2 #9 part 2 PR 9b) ----------------------------

  // Read an approval row's resume context. Sidecar's
  // ResumeAfterApproval handler calls this after the operator
  // approves; the response carries `decision_context` +
  // `requested_effect` so sidecar can rebuild a fresh
  // RequestDecision and call ReserveSet under a new idempotency key.
  rpc GetApprovalForResume(GetApprovalForResumeRequest)
      returns (GetApprovalForResumeResponse);

  // Atomically mark an approval as bundled with a freshly-landed
  // ledger transaction. Wraps the `mark_approval_bundled` SP from
  // migration 0036. Idempotent on (approval_id, ledger_transaction_id);
  // returns IDEMPOTENCY_CONFLICT if a different tx_id is presented.
  rpc MarkApprovalBundled(MarkApprovalBundledRequest)
      returns (MarkApprovalBundledResponse);
}

// ============================================================================
// SHARED MESSAGES
// ============================================================================

message Reservation {
  string reservation_id = 1;                // UUID v7
  string budget_id = 2;
  string window_instance_id = 3;
  spendguard.common.v1.UnitRef unit = 4;
  string amount_atomic = 5;                  // NUMERIC(38,0) decimal string
  google.protobuf.Timestamp ttl_expires_at = 6;
  string idempotency_key = 7;

  enum State {
    STATE_UNSPECIFIED = 0;
    RESERVED = 1;
    COMMITTED = 2;
    RELEASED = 3;
    OVERRUN_DEBT = 4;
  }
  State current_state = 8;
}

// Commit state mirrors Contract §5 commitStateMachine.
enum CommitState {
  COMMIT_STATE_UNSPECIFIED = 0;
  UNKNOWN = 1;
  ESTIMATED = 2;
  PROVIDER_REPORTED = 3;
  INVOICE_RECONCILED = 4;
}

// ============================================================================
// ReserveSet
// ============================================================================

message ReserveSetRequest {
  string tenant_id = 1;

  // Contract §6 idempotency_key for the entire decision transaction.
  string decision_id = 2;
  // Anchor for audit chain (per Trace §11.1 audit.decision_event_id).
  string audit_decision_event_id = 3;
  // Monotonic per (tenant_id, workload_instance_id).
  uint64 producer_sequence = 4;

  spendguard.common.v1.Idempotency idempotency = 5;
  spendguard.common.v1.Fencing fencing = 6;

  // Multi-budget claims; server canonicalizes order via lock_order_token.
  // ReservationSet is all_or_nothing (per Contract §4).
  repeated spendguard.common.v1.BudgetClaim claims = 7;

  // Optional: caller may supply derived token; server validates and rejects
  // mismatches with LOCK_ORDER_TOKEN_MISMATCH. If omitted, server derives.
  spendguard.common.v1.LockOrderToken lock_order_token = 8;

  // Reservation TTL (per Contract §7).
  google.protobuf.Timestamp ttl_expires_at = 9;

  // Audit payload — pre-built CloudEvents 1.0 envelope, signed by sidecar.
  // Inserted into audit_outbox in same Postgres tx as ledger entries.
  spendguard.common.v1.CloudEvent audit_event = 10;

  // Pricing context (per Stage 2 §9.4 build-time freeze).
  // Sidecar reads from cached contract_bundle; no Platform Pricing DB query.
  spendguard.common.v1.PricingFreeze pricing = 11;

  // Bundle context (per Contract §17).
  spendguard.common.v1.ContractBundleRef contract_bundle = 12;
}

message ReserveSetResponse {
  oneof outcome {
    ReserveSetSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message ReserveSetSuccess {
  string ledger_transaction_id = 1;
  string reservation_set_id = 2;
  repeated Reservation reservations = 3;
  string audit_decision_event_id = 4;
  uint64 producer_sequence = 5;

  // Server-derived (or caller-validated) lock order token.
  spendguard.common.v1.LockOrderToken lock_order_token = 6;

  // Full payload — only on first success; replay returns Replay variant.
  spendguard.common.v1.FullResponsePayload full = 7;

  google.protobuf.Timestamp recorded_at = 8;
}

// ============================================================================
// Release
// ============================================================================

message ReleaseRequest {
  string tenant_id = 1;
  string reservation_set_id = 2;
  spendguard.common.v1.Idempotency idempotency = 3;
  spendguard.common.v1.Fencing fencing = 4;

  enum Reason {
    REASON_UNSPECIFIED = 0;
    TTL_EXPIRED = 1;
    RUNTIME_ERROR = 2;
    RUN_ABORTED = 3;
    EXPLICIT = 4;
  }
  Reason reason = 5;

  // Audit event for release.
  spendguard.common.v1.CloudEvent audit_event = 6;
  string decision_id = 7;
  uint64 producer_sequence = 8;
}

message ReleaseResponse {
  oneof outcome {
    ReleaseSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message ReleaseSuccess {
  string ledger_transaction_id = 1;
  repeated string released_reservation_ids = 2;
  google.protobuf.Timestamp recorded_at = 3;
}

// ============================================================================
// RecordDeniedDecision (Phase 3 wedge)
// ============================================================================
//
// Writes a non-effect decision into the audit chain so the Contract §6.1
// invariant 「無 audit 則無 effect」 holds even when the contract evaluator
// returns STOP / REQUIRE_APPROVAL / DEGRADE / SKIP. The carrier ledger_tx
// has operation_kind='denied_decision' and zero ledger_entries; balance
// invariants no-op on tx with no entries.

message RecordDeniedDecisionRequest {
  string tenant_id = 1;
  string decision_id = 2;
  string audit_decision_event_id = 3;
  uint64 producer_sequence = 4;

  spendguard.common.v1.Idempotency idempotency = 5;
  spendguard.common.v1.Fencing fencing = 6;

  // What the caller tried to claim (audit forensics; not posted to ledger).
  repeated spendguard.common.v1.BudgetClaim attempted_claims = 7;

  // Contract evaluator outputs.
  repeated string matched_rule_ids = 8;
  repeated string reason_codes = 9;
  // Final decision name: STOP / REQUIRE_APPROVAL / DEGRADE / SKIP.
  string final_decision = 10;

  spendguard.common.v1.CloudEvent audit_event = 11;
  spendguard.common.v1.ContractBundleRef contract_bundle = 12;
  spendguard.common.v1.PricingFreeze pricing = 13;
}

message RecordDeniedDecisionResponse {
  oneof outcome {
    RecordDeniedDecisionSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message RecordDeniedDecisionSuccess {
  string ledger_transaction_id = 1;
  string audit_decision_event_id = 2;
  uint64 producer_sequence = 3;
  google.protobuf.Timestamp recorded_at = 4;
}

// ============================================================================
// AcquireFencingLease (Phase 5 S3)
// ============================================================================

message AcquireFencingLeaseRequest {
  // Scope to acquire (existing fencing_scopes row).
  string fencing_scope_id = 1;
  string tenant_id = 2;
  // Per-pod-unique identity (matches workload_instance_id used by
  // ReserveSet et al.). Two callers with the same workload_id will
  // RENEW each other's lease; this is a misconfiguration but doesn't
  // corrupt the audit chain.
  string workload_instance_id = 3;
  // How long the granted lease lasts. Caller must renew before this.
  uint32 ttl_seconds = 4;
  // Operator-driven force takeover. Default false. When true, takes
  // over an unexpired lease — bumps epoch and writes a 'revoke'
  // history row. Use only for incident recovery.
  bool force = 5;
  // Optional caller-supplied audit event id (UUID). Default minted
  // server-side. Useful for adapters that want to correlate the
  // lease event with an external incident ticket.
  string audit_event_id = 6;
}

message AcquireFencingLeaseResponse {
  oneof outcome {
    AcquireFencingLeaseSuccess success = 1;
    AcquireFencingLeaseDenied denied = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message AcquireFencingLeaseSuccess {
  // Caller MUST use this epoch in subsequent ReserveSet / Release /
  // CommitEstimated / RecordDeniedDecision calls. Stale epoch fails
  // closed at the SP layer.
  uint64 epoch = 1;
  // Expiry of the granted lease. Caller renews before this wallclock
  // time, accounting for clock skew.
  google.protobuf.Timestamp ttl_expires_at = 2;
  // What the SP did: "acquire" (first lease), "renew" (no epoch
  // change), "promote" (took over after expiry), "revoke" (operator
  // forced takeover), "recover" (same workload reclaiming).
  string action = 3;
}

message AcquireFencingLeaseDenied {
  // Current holder (so caller can show "fencing held by ${who}" in
  // operator UIs).
  string current_holder_instance_id = 1;
  uint64 current_epoch = 2;
  google.protobuf.Timestamp current_ttl_expires_at = 3;
}

// ============================================================================
// CommitEstimated / ProviderReport / InvoiceReconcile
// ============================================================================

message CommitEstimatedRequest {
  string tenant_id = 1;
  string reservation_id = 2;
  string estimated_amount_atomic = 3;       // NUMERIC(38,0)
  spendguard.common.v1.UnitRef unit = 4;
  spendguard.common.v1.Idempotency idempotency = 5;
  spendguard.common.v1.Fencing fencing = 6;
  spendguard.common.v1.PricingFreeze pricing = 7;
  spendguard.common.v1.CloudEvent audit_event = 8;
  string decision_id = 9;
  uint64 producer_sequence = 10;
}

message CommitEstimatedResponse {
  oneof outcome {
    CommitSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message ProviderReportRequest {
  string tenant_id = 1;
  string reservation_id = 2;
  string provider_reported_amount_atomic = 3;
  spendguard.common.v1.UnitRef unit = 4;
  string provider_response_metadata = 5;    // raw header / provider event id
  spendguard.common.v1.Idempotency idempotency = 6;
  spendguard.common.v1.Fencing fencing = 7;
  spendguard.common.v1.PricingFreeze pricing = 8;
  spendguard.common.v1.CloudEvent audit_event = 9;
  uint64 producer_sequence = 10;

  // Audit anchor (per Stage 2 §4.3 audit_outbox.decision_id NOT NULL).
  // For sidecar-originated commits: matches the original ReserveSet
  // decision_id. For webhook-originated reports: receiver mints a new
  // decision_id; audit chain links via reservation_id.
  string decision_id = 11;
}

message ProviderReportResponse {
  oneof outcome {
    CommitSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message InvoiceReconcileRequest {
  string tenant_id = 1;
  string provider_invoice_id = 2;
  string invoice_reconciled_amount_atomic = 3;
  spendguard.common.v1.UnitRef unit = 4;
  string reservation_id = 5;
  spendguard.common.v1.Idempotency idempotency = 6;
  spendguard.common.v1.PricingFreeze pricing = 7;
  spendguard.common.v1.CloudEvent audit_event = 8;
  uint64 producer_sequence = 9;

  // Audit anchor (per Stage 2 §4.3). Webhook-originated invoice reconcile:
  // receiver mints decision_id; audit chain links via reservation_id.
  string decision_id = 10;

  // Control-plane fencing scope for webhook/reconciliation writers
  // (per Sidecar §9 + Ledger §9 fencing_scopes; webhook receiver has its
  // own workload identity + epoch).
  spendguard.common.v1.Fencing fencing = 11;
}

message InvoiceReconcileResponse {
  oneof outcome {
    CommitSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message CommitSuccess {
  string ledger_transaction_id = 1;
  string reservation_id = 2;
  CommitState latest_state = 3;
  string delta_to_reserved_atomic = 4;      // NUMERIC(38,0); signed
  google.protobuf.Timestamp recorded_at = 5;
}

// ============================================================================
// RefundCredit / DisputeAdjustment / Compensate
// ============================================================================

message RefundCreditRequest {
  string tenant_id = 1;
  string provider_credit_id = 2;
  string original_reservation_id = 3;
  string credit_amount_atomic = 4;
  spendguard.common.v1.UnitRef unit = 5;
  spendguard.common.v1.Idempotency idempotency = 6;
  spendguard.common.v1.PricingFreeze pricing = 7;
  spendguard.common.v1.CloudEvent audit_event = 8;
  uint64 producer_sequence = 9;
  google.protobuf.Timestamp credited_at = 10;

  // Audit anchor for the refund event (per Stage 2 §4.3).
  string decision_id = 11;

  // Control-plane fencing scope (webhook receiver writer identity).
  spendguard.common.v1.Fencing fencing = 12;
}

message RefundCreditResponse {
  oneof outcome {
    RefundCreditSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message RefundCreditSuccess {
  string ledger_transaction_id = 1;
  string refund_credit_event_id = 2;
  google.protobuf.Timestamp recorded_at = 3;
}

message DisputeAdjustmentRequest {
  string tenant_id = 1;
  string provider_dispute_id = 2;

  enum CaseState {
    CASE_STATE_UNSPECIFIED = 0;
    OPEN = 1;
    UNDER_REVIEW = 2;
    RESOLVED_IN_FAVOR = 3;
    RESOLVED_AGAINST = 4;
    WITHDRAWN = 5;
  }
  CaseState case_state = 3;

  string original_reservation_id = 4;
  string resolution_amount_atomic = 5;      // when case_state in resolved_*
  spendguard.common.v1.UnitRef unit = 6;
  spendguard.common.v1.Idempotency idempotency = 7;
  spendguard.common.v1.CloudEvent audit_event = 8;
  uint64 producer_sequence = 9;
  google.protobuf.Timestamp resolved_at = 10;

  // Audit anchor for the dispute lifecycle event (per Stage 2 §4.3).
  string decision_id = 11;

  // Control-plane fencing scope (webhook receiver writer identity).
  spendguard.common.v1.Fencing fencing = 12;

  // Pricing context — for resolution amounts. Inherited from the original
  // reservation when caller does not supply (server validates equality).
  spendguard.common.v1.PricingFreeze pricing = 13;
}

message DisputeAdjustmentResponse {
  oneof outcome {
    DisputeAdjustmentSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message DisputeAdjustmentSuccess {
  string ledger_transaction_id = 1;
  string dispute_event_id = 2;
  google.protobuf.Timestamp recorded_at = 3;
}

message CompensateRequest {
  string tenant_id = 1;
  // Reverse a prior posting via compensating entry (Ledger §6 immutability).
  string original_ledger_transaction_id = 2;
  string reason_code = 3;
  spendguard.common.v1.Idempotency idempotency = 4;
  spendguard.common.v1.CloudEvent audit_event = 5;
  uint64 producer_sequence = 6;

  // Audit anchor (per Stage 2 §4.3). For reconciliation-driven compensations
  // the operator/system mints a new decision_id; audit chain links via
  // original_ledger_transaction_id.
  string decision_id = 7;

  // Control-plane fencing scope (operator / reconciliation writer identity).
  spendguard.common.v1.Fencing fencing = 8;
}

message CompensateResponse {
  oneof outcome {
    CompensateSuccess success = 1;
    spendguard.common.v1.Replay replay = 2;
    spendguard.common.v1.Error error = 3;
  }
}

message CompensateSuccess {
  string compensating_ledger_transaction_id = 1;
  google.protobuf.Timestamp recorded_at = 2;
}

// ============================================================================
// QueryBudgetState
// ============================================================================

message QueryBudgetStateRequest {
  string tenant_id = 1;
  string budget_id = 2;
  string window_instance_id = 3;
  // For rolling windows; required parameter (Ledger §8 — no now()).
  google.protobuf.Timestamp snapshot_at = 4;
  // Required (Ledger §3 forbids cross-unit aggregation in hot path).
  // The (budget_id, window_instance_id, unit_id) triple selects the
  // ledger_accounts row set this query aggregates over.
  string unit_id = 5;
}

message QueryBudgetStateResponse {
  spendguard.common.v1.UnitRef unit = 1;
  string available_atomic = 2;
  string reserved_hold_atomic = 3;
  string committed_spend_atomic = 4;
  string debt_atomic = 5;
  string adjustment_atomic = 6;
  string refund_credit_atomic = 7;
  uint64 reservation_count = 8;
  uint64 commit_count = 9;
  google.protobuf.Timestamp as_of = 10;
}

// ============================================================================
// ReplayAuditFromCursor
// ============================================================================

message ReplayAuditFromCursorRequest {
  string tenant_id = 1;
  string workload_instance_id = 2;
  // Must match current fencing scope epoch; stale rejected with
  // FENCING_EPOCH_STALE.
  uint64 fencing_epoch = 3;
  // Exclusive lower bound on producer_sequence.
  uint64 producer_sequence_after = 4;
  uint32 limit = 5;

  // Specific fencing scope to validate against. Optional for POC where a
  // workload owns at most one active scope; REQUIRED for GA when a workload
  // may own multiple scopes (per Sidecar §9 fencing_scope_id_map).
  // When omitted, server picks the most-recently-updated live scope owned
  // by the caller, but rejects if more than one matches with different
  // current_epoch values.
  string fencing_scope_id = 6;
}

message ReplayAuditEvent {
  spendguard.common.v1.CloudEvent event = 1;
  uint64 producer_sequence = 2;
  google.protobuf.Timestamp recorded_at = 3;
  string ledger_transaction_id = 4;

  enum ForwardingState {
    FORWARDING_STATE_UNSPECIFIED = 0;
    PENDING = 1;
    FORWARDED = 2;
  }
  ForwardingState forwarding_state = 5;
}

// ============================================================================
// QueryDecisionOutcome
// ============================================================================

message QueryDecisionOutcomeRequest {
  string tenant_id = 1;
  string decision_id = 2;
}

message QueryDecisionOutcomeResponse {
  enum Stage {
    STAGE_UNSPECIFIED = 0;
    NOT_FOUND = 1;
    AUDIT_DECISION_RECORDED = 2;     // reserve+audit_outbox committed
    AUDIT_OUTCOME_RECORDED = 3;       // commit/release+audit_outcome committed
  }
  Stage stage = 1;
  string ledger_transaction_id = 2;
  string audit_decision_event_id = 3;
  string audit_outcome_event_id = 4;
  google.protobuf.Timestamp last_updated_at = 5;

  // For idempotent re-publish (Stage 2 §4.6 adapter idempotency).
  bytes effect_hash = 6;
}

// ============================================================================
// QueryReservationContext (Phase 2B Step 7)
// ============================================================================

message QueryReservationContextRequest {
  string tenant_id = 1;
  string reservation_id = 2;
}

message QueryReservationContextResponse {
  oneof outcome {
    ReservationContext context = 1;
    spendguard.common.v1.Error error = 2;
  }
}

// Server-derived view of the original ReserveSet for one reservation.
// All fields are derived from `reservations` + `ledger_entries` joined
// against `ledger_accounts` (account_kind='reserved_hold' credit row).
//
// Phase 2B Step 7 single-reservation constraint: server returns Error
// MULTI_RESERVATION_COMMIT_DEFERRED when the originating decision created
// more than one reservation. The CommitEstimatedSet RPC for batched
// commits is deferred to a future slice.
message ReservationContext {
  string reservation_id = 1;
  string budget_id = 2;
  string window_instance_id = 3;
  spendguard.common.v1.UnitRef unit = 4;
  // NUMERIC(38,0) decimal string. Sum of the original `reserved_hold`
  // credit entries for this reservation.
  string original_reserved_amount_atomic = 5;
  spendguard.common.v1.PricingFreeze pricing = 6;
  string fencing_scope_id = 7;
  uint64 fencing_epoch_at_post = 8;
  // Original ReserveSet decision_id; CommitEstimated reuses this so
  // audit_outbox per-(tenant, decision_id) outcome uniqueness pairs the
  // outcome to its preceding decision.
  string decision_id = 9;
  google.protobuf.Timestamp ttl_expires_at = 10;
  // 'reserved' | 'committed' | 'released' | 'overrun_debt'.
  string current_state = 11;
  string source_ledger_transaction_id = 12;
  string tenant_id = 13;
}

// ============================================================================
// Approval bundling (Round-2 #9 part 2 PR 9b)
// ============================================================================

// Read an approval row's resume context.
message GetApprovalForResumeRequest {
  // UUID hex string. The approval_requests row to look up.
  string approval_id = 1;
  // Tenant scope check — server returns Error if the row's tenant_id
  // doesn't match. Defense in depth against caller-supplied
  // approval_ids that might come from another tenant.
  string tenant_id = 2;
}

message GetApprovalForResumeResponse {
  oneof outcome {
    ApprovalResumeContext context = 1;
    spendguard.common.v1.Error error = 2;
  }
}

// Server-derived view of one approval_requests row, scoped to the
// fields the sidecar needs to rebuild a fresh RequestDecision after
// the operator approves.
message ApprovalResumeContext {
  string approval_id = 1;
  string tenant_id = 2;
  string decision_id = 3;
  // 'pending' | 'approved' | 'denied' | 'expired' | 'cancelled'.
  string state = 4;
  // JSON blob — the matched_rule_ids + reason_codes + ContractBundleRef +
  // PricingFreeze tuple captured at REQUIRE_APPROVAL time. Sidecar uses
  // this as the seed for a fresh RequestDecision when state='approved'.
  bytes decision_context_json = 5;
  // JSON blob — the proposed budget effect (debit/credit envelope).
  // Sidecar passes through to ReserveSet under a derived idempotency
  // key.
  bytes requested_effect_json = 6;
  // Set when state='approved' and the deferred operation has already
  // been bundled into a ledger transaction. If present, the sidecar's
  // resume path is idempotent — it should look up this transaction
  // rather than creating a new one.
  string bundled_ledger_transaction_id = 7;
}

// Mark an approval as bundled with a freshly-landed ledger transaction.
message MarkApprovalBundledRequest {
  string approval_id = 1;
  string ledger_transaction_id = 2;
}

message MarkApprovalBundledResponse {
  oneof outcome {
    MarkApprovalBundledSuccess success = 1;
    spendguard.common.v1.Error error = 2;
  }
}

message MarkApprovalBundledSuccess {
  // True iff this is the FIRST call to mark_approval_bundled for this
  // approval. Subsequent retries with the same tx_id return false +
  // the same ledger_transaction_id (idempotent).
  bool was_first_bundling = 1;
  string ledger_transaction_id = 2;
}
