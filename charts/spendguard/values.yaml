# Default values for spendguard chart.
#
# Required by the operator before install:
#   - secrets.tls.existingSecret    — Secret with ca.crt + per-service
#                                     keypairs (ledger.{crt,key}, etc.)
#   - secrets.bundles.existingSecret— Secret with contract bundle .tgz
#                                     + metadata.json + runtime.env
#   - postgres.url                  — postgres://user:pass@host:5432/spendguard_ledger
#                                     (separate canonical DB inferred via .canonicalUrl)
#
# A single-pod replica count is enforced by default for sidecar /
# outbox-forwarder / ttl-sweeper because multi-pod work distribution is
# a Phase 5 GA gate (per memory project_overview.md). Override with
# caution — producer_sequence races corrupt audit_outbox.

global:
  tenantId: "00000000-0000-4000-8000-000000000001"
  region: "demo"
  imagePullPolicy: IfNotPresent
  imageRegistry: ghcr.io/m24927605

# chart.profile selects the install posture.
#
# demo (default)
#   Allows empty / placeholder values to render. Suitable for
#   `helm template`, dev-cluster experimentation, and the compose-based
#   demo path under deploy/demo.
#
# production
#   Enforces required-input gates at template render time:
#     - sidecar.contractBundleHashHex MUST be set
#     - sidecar.trustRootSpkiSha256Hex MUST be set
#     - outboxForwarder.schemaBundleHashHex MUST be set
#     - postgres.ledgerUrl / canonicalUrl MUST NOT contain CHANGE_ME
#     - signing.mode != "disabled" (enforced per-service)
#     - canonical-ingest strictVerification MUST be true (S8)
#   Other invariants (workload_instance_id uniqueness, fencing scope
#   epoch seeding, Secret existence) are operator-side responsibilities
#   the chart cannot validate.
#
# NOTE: production profile is INSTALLABLE but has not yet been
# validated end-to-end on a real K8s cluster. Tracking: issue #3
# (real-cluster kind validation, operator-side).
chart:
  profile: "demo"   # demo | production

# Secrets
secrets:
  tls:
    # Name of pre-created Secret containing:
    #   ca.crt, ledger.crt, ledger.key, canonical-ingest.crt,
    #   canonical-ingest.key, sidecar.crt, sidecar.key,
    #   webhook-receiver.crt, webhook-receiver.key,
    #   outbox-forwarder.crt, outbox-forwarder.key,
    #   ttl-sweeper.crt, ttl-sweeper.key.
    existingSecret: spendguard-tls
  bundles:
    # Name of pre-created Secret with FLAT keys (K8s Secret keys cannot
    # contain "/", so the sidecar's expected `contract_bundle/<id>.tgz`
    # subdirectory layout is reconstructed by this chart's `items.path`
    # projection at mount time).
    #
    # Required flat keys (operator-supplied):
    #   contract_bundle_tgz            — contract bundle .tgz bytes
    #   contract_bundle_sig            — contract bundle sigstore .sig bytes
    #   contract_bundle_metadata_json  — contract bundle metadata.json bytes
    #   schema_bundle_tgz              — schema bundle .tgz bytes
    #
    # Chart projects them at /var/lib/spendguard/bundles/ as:
    #   contract_bundle/<sidecar.contractBundleId>.tgz
    #   contract_bundle/<sidecar.contractBundleId>.tgz.sig
    #   contract_bundle/<sidecar.contractBundleId>.metadata.json
    #   schema_bundle/<sidecar.schemaBundleId>.tgz
    existingSecret: spendguard-bundles

# Postgres connection (external; chart does NOT provision Postgres).
postgres:
  ledgerUrl: "postgres://spendguard:CHANGE_ME@postgres:5432/spendguard_ledger"
  canonicalUrl: "postgres://spendguard:CHANGE_ME@postgres:5432/spendguard_canonical"
  # R2 M3 (Security F5): control_plane DB now owns the SLICE_07
  # predictor_plugin_endpoints registry + the control_plane_audit_outbox
  # table introduced in R2 M1. Co-located on the same Postgres server
  # as ledger/canonical by default (separate logical DB to keep
  # schema/RLS surfaces independent); operators can point at a
  # different host for production isolation.
  controlPlaneUrl: "postgres://spendguard:CHANGE_ME@postgres:5432/spendguard_control_plane"
  # Apply ledger + canonical + control_plane SQL migrations on chart install via hook.
  applyMigrationsOnInstall: true

# Per-service overrides
ledger:
  enabled: true
  replicas: 1
  image:
    repository: spendguard/ledger
    tag: "0.1.0-alpha.1"
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi"   }

canonicalIngest:
  enabled: true
  replicas: 1
  image:
    repository: spendguard/canonical-ingest
    tag: "0.1.0-alpha.1"
  # Round-2 #3: required by services/canonical_ingest Config::from_env().
  # The (region, ingest_shard_id) tuple is the canonical ordering scope
  # per Trace §10.5. Multiple instances can share a shard or own their
  # own; pick a stable id per replica/scope. The default `default-shard`
  # is single-shard.
  ingestShardId: "default-shard"
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi"   }

sidecar:
  enabled: true
  # Phase 5 S1+S2: multi-pod safe via leader-election + per-pod
  # workload_instance_id (sourced from k8s downward API metadata.name).
  # Override workloadInstanceIdOverride for non-k8s deployments.
  replicas: 1
  workloadInstanceIdOverride: ""
  # Phase 5 S5: explicit acknowledgement that the operator understands
  # multi-pod sidecar semantics (active/standby model, NOT horizontal
  # scaling — each pod calls Ledger.AcquireFencingLease at startup;
  # only one wins, the rest fail-closed waiting for takeover).
  # Helm template REJECTS replicas > 1 without this flag. Read the
  # multi-pod runbook in docs/runbooks/sidecar-multi-pod.md before
  # flipping this.
  acknowledgeMultiPod: false
  image:
    repository: spendguard/sidecar
    tag: "0.1.0-alpha.1"
  fencingScopeId: "33333333-3333-4333-8333-333333333333"
  workloadInstanceId: "sidecar-0"
  reservationTtlSeconds: 600
  # Round-2 #3: Required by services/sidecar Config::from_env(). Operator
  # MUST seed `fencing_scopes.current_epoch = N` matching this value
  # before installing. Set to 1 for first install.
  fencingInitialEpoch: 1
  # Endpoint catalog manifest URL — sidecar pulls + verifies this manifest
  # at startup + every manifestPullSeconds. The catalog publisher signs
  # manifests with its ed25519 key; sidecar pins the corresponding public
  # key under SPENDGUARD_SIDECAR_MANIFEST_VERIFY_KEY_PEM.
  #
  # The default below is a PLACEHOLDER DNS that this chart does not render.
  # chart.profile=production rejects it; operator must supply a real URL
  # pointing at their endpoint-catalog deployment (not provisioned here).
  endpointCatalogManifestUrl: "https://endpoint-catalog.spendguard:8443/v1/catalog/manifest"
  # SLICE_09/HARDEN_02: optional run-cost projector RPC endpoint. Demo
  # compose sets this only for scenarios that explicitly start the
  # projector. Production leaves it empty by default to avoid accidental
  # TCP wiring for UDS-only deployments; operators may wire it explicitly.
  # With the demo/test metadata gate off, budget projection uses
  # Ledger.QueryBudgetState rather than caller-supplied metadata.
  runCostProjectorUrl: ""
  # Demo/test-only. When true, sidecar accepts caller-supplied
  # runtime_metadata.budget_remaining_atomic for RUN_BUDGET_PROJECTION_EXCEEDED.
  # Production renders fail if this is enabled; production must derive budget
  # remaining from a signed/fenced ledger snapshot.
  allowUntrustedBudgetMetadata: false
  # Round-2 #3: Contract + schema bundle bootstrap. The chart's bundles
  # init container pre-pulls these .tgz files into the bundles-data
  # secret; the sidecar verifies the byte-exact hash before installing.
  contractBundleId: "11111111-1111-4111-8111-111111111111"
  contractBundleHashHex: ""
  schemaBundleId: "22222222-2222-4222-8222-222222222222"
  # Round-2 #3: Trust-root pins (defense-in-depth against intermediate
  # compromise). trustSecret.name MUST be the operator-supplied Secret
  # holding the root CA PEM contents under `caPemKey`. The SPKI hash
  # is the sha256 of the root CA SubjectPublicKeyInfo, hex-encoded.
  trustSecret:
    name: spendguard-trust
    caPemKey: ca.pem
  trustRootSpkiSha256Hex: ""
  # Round-2 #3: mTLS bootstrap token (one-shot, used by cert-manager
  # external issuer to provision the workload cert at first boot).
  mtlsBootstrapTokenSecret:
    name: spendguard-mtls-bootstrap
    tokenKey: token
  # Endpoint catalog manifest signing key. Sidecar's main.rs reads
  # SPENDGUARD_SIDECAR_MANIFEST_VERIFY_KEY_PEM at startup and refuses
  # to boot without it; the file holds the ed25519 PUBLIC key the
  # catalog publisher signs manifests with. Operator pre-creates the
  # Secret holding the PEM contents under `pemKey`.
  manifestVerifyKey:
    existingSecret: spendguard-manifest-verify-key
    pemKey: manifest_verify_key.pub.pem
  # Open the UDS adapter socket on a hostPath so apps in other pods can
  # mount it. Set hostPath.enabled=false for an in-pod-only sidecar.
  hostPath:
    enabled: true
    socketDir: /var/run/spendguard
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

# SLICE_03 — Tokenizer service (per tokenizer-service-spec-v1alpha1.md
# §2.1(a) centralised gRPC form). The library form §2.1(b) is linked
# directly by sidecar / egress_proxy in-process and does NOT require a
# chart resource. SLICE_03 ships Tier 2 OpenAI dispatch + Tier 3
# heuristic fallback; SLICE_04 adds Anthropic / Gemini / Cohere.
tokenizer:
  enabled: true
  # The tokenizer is stateless and horizontally scalable — encoder
  # cache is per-pod read-only. Production deploys typically run 2-3
  # replicas behind the in-cluster ClusterIP for redundancy; SLICE_03
  # ships 1 as the default for cost-minimal demo / dev clusters.
  replicas: 1
  image:
    repository: spendguard/tokenizer
    # Round-2 fix M5: production profile requires semver (vN.N.N) or
    # digest pin (@sha256:HEX); demo can use alpha tags as below.
    tag: "0.1.0-alpha.1"
  # Spec §5.3 health invariant: tier 3 hit rate / total tokenize <
  # 0.001 (0.1%). Beyond this threshold the control plane (SLICE-extra)
  # raises a `tokenizer_tier3_hit_high` alert + opens a PR for the
  # missing dispatch entry. Threshold plumbed through Config in
  # SLICE_03; alert wire-up in SLICE-extra.
  # Round-2 fix M4: production profile bounds-checks this to
  # (0.00001, 0.05] and tolerates string-from-helm-set.
  tier3AlertThreshold: 0.001
  # Round-2 fix B3.3 + Round-3 Backend N2: secure-transport gates for
  # production profile. Set EXACTLY ONE of these under
  # chart.profile=production. Demo profile leaves both empty and falls
  # back to plaintext TCP (with a loud warn from main.rs).
  #
  # udsHostPath: hostPath on the node for the gRPC UDS socket dir.
  #              Sidecar pods on the same node mount the same hostPath
  #              and talk to the tokenizer without an L4 hop (spec
  #              §10.1 hot-path budget).
  #              UDS-ONLY DEPLOYMENT NOTE (round-3 Backend N2): when set
  #              the chart does NOT render the ClusterIP Service —
  #              main.rs binds the UDS xor TCP, so a Service entry
  #              would advertise a TCP endpoint that the pod RSTs.
  #              Cross-node callers (Tier 1 shadow, output_predictor)
  #              cannot reach a UDS-only tokenizer; deploy a separate
  #              release with mtlsSecretName for those topologies.
  # mtlsSecretName: name of a pre-created Secret holding ca.crt /
  #                 tls.crt / tls.key for cross-node mTLS callers
  #                 (Tier 1 shadow worker, output_predictor). When
  #                 set, the chart renders the ClusterIP Service so
  #                 callers can resolve `<release>-spendguard-tokenizer:50053`.
  udsHostPath: ""
  mtlsSecretName: ""
  # ── SLICE_05: Tier 1 shadow drift detection ────────────────────────
  # Master kill-switch for the shadow worker. When false the Tier 2
  # hot path is unaffected — only the async shadow path stops. Per
  # spec §11 rollback plan, operators flip this when a vendor outage
  # cascades shadow failures into operational noise.
  shadowEnabled: true
  # Default sample rate per spec §4.1 = 0.01 (1%). Per-(tenant, model)
  # override via the control plane API. Range (0.0, 1.0]; 0 disables
  # sampling, 1 forces 100% sampling (matches the cool-down rate).
  shadowDefaultSampleRate: 0.01
  # canonical_ingest gRPC endpoint for the signed
  # `tokenizer_drift_alert` CloudEvent the shadow worker emits per
  # spec §4 + stats-aggregator-spec §7.2. Empty in demo profile
  # (worker drops alerts to logs); production deploys SHOULD set
  # this so drift detection feeds the canonical audit chain.
  canonicalIngestUrl: ""
  # HARDEN_03 / #168: schema bundle envelope fields for the
  # AppendEventsRequest sent to canonical_ingest. Same values as
  # outboxForwarder.schemaBundleId / schemaBundleHashHex because the
  # tokenizer drift-alert producer writes the same canonical schema
  # family. Required under chart.profile=production + shadowEnabled=true.
  schemaBundleId: "22222222-2222-4222-8222-222222222222"
  schemaBundleHashHex: ""
  canonicalSchemaVersion: "spendguard.v1alpha1"
  # Postgres URL for tokenizer_t1_samples persistence per spec §4.4
  # schema (migration 0051). Empty falls back to in-memory persister
  # (demo only). Production deploys MUST set this.
  databaseUrl: ""
  # Optional Secret holding Anthropic + Gemini Tier 1 count_tokens
  # API keys. Expected keys inside the Secret:
  #   anthropic-api-key: <api key string>
  #   gemini-api-key:    <api key string>
  # Both keys are independent — if only Anthropic is set, Gemini
  # shadow samples are silently skipped and the Tier 1 path is
  # disabled for that vendor. Empty in demo profile = shadow worker
  # boots in drop-only mode (events accepted from the gRPC handler
  # but discarded; Tier 2 hot path unaffected). See
  # services/tokenizer/src/main.rs boot log for visibility.
  # R2 M12: required under chart.profile=production + shadowEnabled=true.
  # R2 M12: `optional` flag on the env reference flips to false in
  # production so a missing/rotated key surfaces as CrashLoopBackoff
  # instead of silent shadow-disablement.
  providerSecretName: ""
  # R2 B4: outbound mTLS Secret for the canonical_ingest sink.
  # Expected keys: tls.crt / tls.key / ca.crt. SNI sent to
  # canonical_ingest defaults to the in-cluster ClusterIP DNS name
  # — override for cross-cluster topologies.
  # Required under chart.profile=production + shadowEnabled=true.
  sinkMtlsSecretName: ""
  sinkMtlsSni: "canonical-ingest.spendguard.internal"
  # R2 B1: Ed25519 signing key (PKCS8 PEM) for the drift_alert
  # CloudEvent. signingKeySecretName names the Secret; signingKeyPath
  # is the in-pod path the binary reads via signer_from_env. Demo
  # profile leaves both empty and falls back to the disabled signer.
  signingKeySecretName: ""
  signingKeyPath: ""
  resources:
    requests: { cpu: "100m", memory: "192Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

# ── output_predictor service (SLICE_06) ─────────────────────────────
# Spec: docs/output-predictor-service-spec-v1alpha1.md §2.
#
# Hot-path RPC: Predict (A + B + C parallel). SLICE_06 ships A + B + L1/L4
# cold-start; C arrives in SLICE_07; L2 TOML in SLICE_08. SLICE_10 wires
# sidecar/egress_proxy as clients.
outputPredictor:
  enabled: true
  # Stateless; per-pod cache only. 2-3 replicas for redundancy in prod.
  replicas: 1
  image:
    repository: spendguard/output-predictor
    tag: "0.1.0-alpha.1"
  # ── Secure transport gates (mirrors tokenizer SLICE_03 R3 N2) ──
  # Set EXACTLY ONE under chart.profile=production. Demo falls back to
  # plaintext TCP with a loud warn.
  udsHostPath: ""
  mtlsSecretName: ""
  # ── canonical_ingest DB for output_distribution_cache lookup (spec §4.2)
  # Required under chart.profile=production. Demo can leave empty —
  # output_predictor runs in skeleton mode where Strategy B always
  # falls to L1 cold-start.
  databaseUrl: ""
  # In-memory cache TTL per spec §4.3 (default 5 min).
  cacheTtlSeconds: 300
  # Unknown-model context window fallback per spec §3.3.
  unknownModelContextWindow: 8000
  # ── SLICE_07: Strategy C plugin wiring ──────────────────────────
  # per output-predictor-plugin-contract-v1alpha1.md.
  # Empty pluginEndpointDatabaseUrl = Strategy C skeleton mode:
  # every tenant lookup returns NotConfigured so Predict falls to
  # Strategy B silently (per spec §11). Setting this enables
  # Strategy C and REQUIRES pluginClientSecretName under
  # chart.profile=production (production gate enforces).
  # Distinct from databaseUrl because the registry lives in
  # control_plane DB while output_distribution_cache lives in
  # canonical_ingest DB; separate pools per spec §8.
  pluginEndpointDatabaseUrl: ""
  # Plugin endpoint cache TTL (spec §6.3 — 30s health-check cadence
  # implies cache TTL ≤ 30s; R2 M2 tightened the default to 5s so a
  # control plane mutation (POST/PUT/DELETE/force-reset) is observed
  # by the predictor within at most 5s. Spec §11 documents this as
  # the eventual-consistency window operator contract. Tighter
  # consistency requires the cache_revision_at column approach
  # tracked as a follow-up GH issue.
  pluginEndpointCacheTtlSeconds: 5
  # Secret name carrying SpendGuard's client cert + key + the
  # customer trust CA (PEMs under keys tls.crt / tls.key / ca.crt).
  # Required under chart.profile=production when Strategy C is
  # enabled. Mounted at /etc/spendguard/plugin-client/.
  pluginClientSecretName: ""
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

# ── run_cost_projector service (SLICE_09) ───────────────────────────
# Spec: docs/run-cost-projector-spec-v1alpha1.md (full).
#
# Hot-path gRPC service called by sidecar after output_predictor.Predict
# and before reserve stage. SLICE_09 ships Signal 1 (historical P95) +
# Signal 2 (per-step drift) + Signal 3 (SDK with_run_plan pass-through)
# + 3 RUN_* code emission (BUDGET > STEPS > DRIFT precedence) +
# in-memory RunState cache (10K cap, 30-min TTL) + audit-chain replay
# recovery on cold miss.
#
# Resource ceiling (spec §10): 256 MiB worst case for 10K concurrent
# runs × ~1 KiB RunState; default request 64 MiB.
runCostProjector:
  enabled: true
  # Stateless across replicas via per-run state cache (in-memory).
  # Multi-replica deployments rely on tenant-shard routing OR audit-
  # chain replay for cross-replica state recovery (spec §7.4).
  replicas: 1
  image:
    repository: spendguard/run-cost-projector
    tag: "0.1.0-alpha.1"
  # ── Secure transport gates (mirrors output_predictor SLICE_06 R3 N2) ──
  # Set EXACTLY ONE under chart.profile=production. Demo falls back to
  # plaintext TCP with a loud warn.
  udsHostPath: ""
  mtlsSecretName: ""
  # ── canonical_ingest DB for Signal 1 + audit-chain recovery ──
  # Required under chart.profile=production. Empty → skeleton mode
  # (Signal 1 always cold-starts; recovery returns Ok(None); demo only).
  databaseUrl: ""
  # ── RunState cache (spec §7.2) ──
  # TTL eviction default 30 minutes; LRU eviction at capacity 10K.
  stateCacheTtlSeconds: 1800
  stateCacheCapacity: 10000
  # ── Audit-chain replay window (spec §7.4) ──
  # Bounded window (NOT 30 days) — replay is hot-path on cold miss.
  replayWindowMinutes: 30
  # ── Signal 1 cold-start default (spec §3.2) ──
  coldStartRunLength: 10
  # ── Signal 2 drift detection (spec §4.2) ──
  # 3 consecutive steps > 0.5 ratio shift triggers RUN_DRIFT_DETECTED.
  driftConsecutiveThreshold: 3
  driftRatioThreshold: "0.5"
  resources:
    requests: { cpu: "100m", memory: "64Mi"  }
    limits:   { cpu: "500m", memory: "256Mi" }

# ── egress_proxy service (SLICE_10) ─────────────────────────────────
# Spec: docs/specs/auto-instrument-egress-proxy-spec.md v7;
#       docs/slices/SLICE_10_egress_proxy_decision_rewrite.md.
#
# HTTP proxy for SpendGuard: drop-in OpenAI-compatible endpoint that
# gates LLM calls via the sidecar UDS before forwarding. SLICE_10
# upgraded the decision lane to call tokenizer library + output_predictor
# + run_cost_projector before each DecisionRequest, lighting up all 17
# audit columns from SLICE_01 in production.
#
# Per-call latency budget (Contract §14 50ms p99 total):
#   tokenizer library    : ≤ 1ms  p99 (in-process, no RPC)
#   output_predictor RPC : ≤ 10ms p99 (parallel with projector)
#   run_cost_projector RPC: ≤ 5ms  p99 (parallel with predictor)
#   sidecar DecisionRequest: ≤ 35ms p99 remaining
egressProxy:
  enabled: false                            # opt-in: not all deployments expose HTTP proxy
  replicas: 1
  image:
    repository: spendguard/egress-proxy
    tag: "0.1.0-alpha"
  # ── Bind address (proxy listens here) ──
  # v0.1 trust model: localhost only by default. Operators exposing on
  # other interfaces accept the trust-boundary widening per spec §8.
  bindAddr: "0.0.0.0:9000"
  # ── Sidecar UDS path (proxy dials sidecar here) ──
  # Shared hostPath with the sidecar DaemonSet.
  sidecarUdsHostPath: "/var/run/spendguard"
  # ── SLICE_10 — output_predictor + run_cost_projector endpoints ──
  # Both optional. When unset, decision::estimate_call_cost falls back per
  # spec §11:
  #   * predictor unset → local Strategy A only (audit row: predicted_b/c=0,
  #     reserved_strategy="A", confidence=0).
  #   * projector unset → no RUN_* code; run_predicted_remaining_steps=-1
  #     sentinel per audit-chain-prediction-extension-v1alpha1.md §3.3.
  #
  # Production deployments SHOULD set outputPredictorEndpoint, or leave it
  # empty to use the chart's production default when outputPredictor.enabled.
  # Do not wire runCostProjectorEndpoint when the sidecar is explicitly wired
  # to run_cost_projector: Project is mutating and one logical call must
  # advance RunState exactly once.
  #
  # Format: gRPC endpoint URL (http://host:port for plaintext or
  # https://host:port + chart.profile=production for mTLS once SLICE_07
  # cert-pinning lands for egress_proxy).
  outputPredictorEndpoint: ""
  runCostProjectorEndpoint: ""
  # ── Production gate ──
  # Under chart.profile=production the output predictor endpoint SHOULD be set;
  # run_cost_projector stays empty by default until a non-mutating proxy
  # preview RPC exists.
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

# ── SLICE_11 — NetworkPolicy for L2 bypass-resistance ───────────────
# Spec: docs/slices/SLICE_11_multi_provider_routing.md §2 + §9.5.
#
# L2 capability semantics (per README): the egress_proxy is the
# single hard-block point for external LLM API egress. Without a
# NetworkPolicy, app pods can dial api.openai.com directly and
# bypass SpendGuard gating. This chart's NetworkPolicy renders a
# default-deny + explicit-allow set so L2 enforcement becomes a
# K8s-level guarantee, not an advisory README claim.
#
# Operator opt-in: pods MUST carry the label
# `spendguard.io/enforced=true` to fall under the policy. This is the
# per-tenant kill switch and the gradual-migration path.
#
# Production gate: chart.profile=production with networkPolicy.enabled=
# false requires explicit `acknowledgeNoNetworkPolicy=true` so an
# operator doesn't accidentally ship a bypass-able L2.
networkPolicy:
  # Opt-in. Default false to keep the demo path noise-free; production
  # operators flip to true (or explicitly acknowledge advisory-mode).
  enabled: false
  # Explicit opt-out of NetworkPolicy under chart.profile=production.
  # When true the production gate accepts a deployment without
  # NetworkPolicy enforcement (operator accepts L2 advisory-mode).
  acknowledgeNoNetworkPolicy: false
  # Namespace the app pods (LLM SDK callers) live in. Defaults to
  # the release namespace. Override for cross-namespace deployments.
  appNamespace: ""
  # Optional CIDR allowlist for external provider hosts. When set, the
  # `allow-egress-proxy-to-providers` policy uses these CIDRs instead
  # of the default broad public-internet allow. Use this to tightly
  # pin which provider IPs the proxy can reach (e.g. cloud-provider
  # private-link endpoints). Most operators leave this empty — the
  # default `0.0.0.0/0` minus RFC1918 covers all major LLM providers.
  externalProviderCidrs: []
  # Optional CIDR allowlist for Postgres. When unset, the policies
  # do NOT include a Postgres egress rule (operators using cluster-
  # internal Postgres add it via internal podSelector + extraEgressRules).
  # Most managed-Postgres deployments use a known CIDR — set it here.
  postgresCidrs: []

# ── stats_aggregator service (SLICE_06) ─────────────────────────────
# Spec: docs/stats-aggregator-spec-v1alpha1.md (full).
#
# Singleton daemon — Postgres advisory lock enforces. Hourly aggregation
# cycle UPSERTs output_distribution_cache + run_length_distribution_cache;
# 2σ drift detection emits signed CloudEvents via canonical_ingest.
statsAggregator:
  enabled: true
  # Per spec §2.2 only one replica may write at a time. The advisory
  # lock allows blue/green rollouts (overlapping pods compete; only the
  # lock holder runs). Recreate strategy ensures clean handoff.
  replicas: 1
  image:
    repository: spendguard/stats-aggregator
    tag: "0.1.0-alpha.1"
  # Postgres URL for canonical_ingest DB (read source + cache write).
  # REQUIRED under chart.profile=production; demo can leave empty and
  # the daemon bails at boot with a clear error.
  databaseUrl: ""
  # canonical_ingest gRPC for signed prediction_drift_alert CloudEvent
  # emission (spec §7.2). Required under chart.profile=production;
  # demo falls back to LoggingDriftAlertSink (drift alerts → stdout only).
  canonicalIngestUrl: ""
  # Outbound mTLS Secret for the canonical_ingest sink (mirrors
  # tokenizer SLICE_05 R2 B4 + sinkMtlsSecretName pattern). Required
  # under chart.profile=production + canonicalIngestUrl set.
  sinkMtlsSecretName: ""
  sinkMtlsSni: "canonical-ingest.spendguard.internal"
  # Ed25519 signing key (PKCS8 PEM) for the drift_alert CloudEvent.
  # Demo profile falls back to DisabledSigner (empty signatures —
  # verifiers refuse to validate; correct demo behaviour).
  signingKeySecretName: ""
  signingKeyPath: ""
  # R2 B5: schema bundle envelope fields. canonical_ingest's append
  # handler rejects AppendEventsRequest without a schema_bundle. Same
  # values as outboxForwarder.schemaBundleId / schemaBundleHashHex
  # because both producers write into the same canonical_ingest schema
  # bundle (single source of truth for `spendguard.v1alpha1`). Required
  # under chart.profile=production by the R2 M9 gate.
  schemaBundleId: "22222222-2222-4222-8222-222222222222"
  schemaBundleHashHex: ""
  # Aggregation cycle cadence in seconds (spec §8.1 default 3600 hourly).
  # Minimum 60 enforced at boot.
  cycleSeconds: 3600
  # Drift detection threshold params (spec §7.1). Default 2.0σ + 100 min
  # samples.
  driftZThreshold: 2.0
  minSamplesForAlert: 100
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

webhookReceiver:
  enabled: true
  replicas: 1
  image:
    repository: spendguard/webhook-receiver
    tag: "0.1.0-alpha.1"
  service:
    type: ClusterIP
    httpsPort: 8443
  fencingScopeId: "00000000-0000-7000-a000-000000000050"
  workloadInstanceId: "webhook-receiver-0"
  hmacSecretName: spendguard-webhook-hmac
  # Round-2 #3: required by services/webhook_receiver Config::from_env().
  # Operator MUST seed `fencing_scopes.current_epoch = N` for the
  # webhook-receiver scope BEFORE installing. Set to 1 for first install.
  fencingInitialEpoch: 1

# Phase 5 S1 — leader election for singleton background workers.
# Modes:
#   postgres  — Postgres-backed lease via acquire_lease SP (default).
#               Safe for replicas >= 1.
#   k8s       — Kubernetes coordination.k8s.io/Lease (S5 wiring).
#               Safe for replicas >= 1; requires RBAC below.
#   disabled  — no leader election. Safe ONLY with replicas == 1.
#               Helm template REJECTS this mode + replicas > 1 (S5 gate).
leaderElection:
  mode: "postgres"
  region: "demo"
  ttlMs: 15000
  renewIntervalMs: 5000
  retryIntervalMs: 1000

outboxForwarder:
  enabled: true
  # Phase 5 S1 unblocks replicas > 1 when leaderElection.mode != 'disabled'.
  replicas: 1
  image:
    repository: spendguard/outbox-forwarder
    tag: "0.1.0-alpha.1"
  pollIntervalSeconds: 2
  batchSize: 50
  leaseName: "outbox-forwarder"
  # Phase 5 S2: pod-unique workload id via downward API by default.
  workloadInstanceIdOverride: ""
  # Round-2 #3: required by services/outbox_forwarder Config::from_env().
  # The forwarder hashes outgoing CloudEvents against the canonical-ingest
  # service's expected schema bundle; mismatched id/hash → ingest rejects
  # every event. Set to the bundle id + hex hash the operator pre-pulled
  # into the `bundles-data` secret. Empty string = chart fail at install.
  schemaBundleId: "22222222-2222-4222-8222-222222222222"
  schemaBundleHashHex: ""

ttlSweeper:
  enabled: true
  replicas: 1
  image:
    repository: spendguard/ttl-sweeper
    tag: "0.1.0-alpha.1"
  fencingScopeId: "00000000-0000-7000-a000-000000000060"
  # Round-2 #3: required by services/ttl_sweeper Config::from_env().
  # Operator MUST seed `fencing_scopes.current_epoch = N` for the same
  # scope BEFORE installing the chart. Set to 1 for first install.
  fencingInitialEpoch: 1
  pollIntervalSeconds: 2
  batchSize: 10
  leaseName: "ttl-sweeper"
  workloadInstanceIdOverride: ""

# Phase 5 GA hardening S6 — producer signing config.
#
# Modes:
#   local     — Each service reads a PKCS8 Ed25519 PEM file mounted from
#               `signing.existingSecret`. Default for non-KMS deploys.
#   kms       — KMS-backed signing (S7 will wire AWS KMS / GCP / Azure).
#               Construct succeeds; sign() returns ModeUnavailable until
#               S7 lands. Operators choosing this mode today get a clean
#               "not implemented" failure rather than silent empty
#               signatures.
#   disabled  — Empty signatures. Helm template REJECTS this mode unless
#               profile == "demo" (audit invariant: production must not
#               write unsigned audit rows).
#
# Profile gate:
#   profile=production blocks `mode=disabled` at template render time.
#   profile=demo allows it but still warns in chart NOTES.
signing:
  mode: "local"
  profile: "production"
  # Single Secret holding ed25519.pem keys, one per producer service.
  # Keys: ledger.pem, sidecar.pem, webhook-receiver.pem, ttl-sweeper.pem
  existingSecret: spendguard-signing-keys
  # KMS arns per-service (used only when mode=kms; ignored otherwise).
  kms:
    ledgerArn: ""
    sidecarArn: ""
    webhookReceiverArn: ""
    ttlSweeperArn: ""
  # Phase 5 GA hardening S8: canonical_ingest strict verification.
  # When true, canonical_ingest mounts the same Secret as a trust
  # store and rejects/quarantines events with bad / unknown / pre-S6 /
  # disabled-mode signatures. Helm template REJECTS profile=production
  # with strictVerification=false.
  strictVerification: true

# Phase 5 GA hardening S13 — pricing authority staleness policy.
#
# `maxStalenessSeconds` defines how old the latest successful pricing
# sync may be before bundle-build / decision pipelines fail-closed.
# 86400 = 24 hours; tighter values appropriate for high-volatility
# providers (token costs change weekly).
#
# `allowOverride: true` lets operators manually edit pricing_table
# when the sync adapter doesn't yet handle a new model. Every override
# writes a `pricing_overrides_audit` row with reviewer identity (S17
# JWT subject) + reason. Helm template reserves the right to FAIL
# on `signing.profile=production` + `pricing.allowOverride=true` in a
# future tightening; today the audit row IS the safeguard.
pricing:
  maxStalenessSeconds: 86400
  allowOverride: true

# Phase 5 GA hardening S22: fail-open / fail-closed policy matrix.
# Default stance is fail-closed everywhere. Operators override via
# JSON map keyed by dependency × workflow_class. Production profile
# additionally requires `_acknowledge_risk_of_fail_open: true` in the
# JSON for any fail-open cell to be accepted (defense in depth).
#
# Example to allow fail-open on pricing for non-monetary tools:
#   failPolicy:
#     overrides: |
#       {
#         "_version": "2026-q3",
#         "_acknowledge_risk_of_fail_open": true,
#         "pricing": { "non_monetary_tool": "fail_open_with_marker" }
#       }
failPolicy:
  overrides: ""

# Migration job (post-install hook).
#
# Issue #61 slice 6: the Job applies SQL files mounted from
# operator-supplied ConfigMaps. Two ConfigMaps are mounted optionally:
#   * spendguard-migrations-ledger    — applied to postgres.ledgerUrl
#   * spendguard-migrations-canonical — applied to postgres.canonicalUrl
#
# If either ConfigMap is absent, the Job runs without applying those
# files and prints a no-op message. Operators who manage migrations
# out-of-band can set postgres.applyMigrationsOnInstall=false to skip
# the Job entirely.
#
# For kind validation tests, scripts/helm-validate-kind.sh creates
# both ConfigMaps automatically from services/{ledger,canonical_ingest}
# /migrations/*.sql before helm install.
migrations:
  ledgerImage: postgres:16-alpine
  canonicalImage: postgres:16-alpine
  ledgerConfigMapName: spendguard-migrations-ledger
  canonicalConfigMapName: spendguard-migrations-canonical
  # R2 M3 (Security F5): control_plane migrations live under
  # services/control_plane/migrations/. The ConfigMap is OPTIONAL —
  # if the operator hasn't created it, the migrate Job processes only
  # the ledger + canonical globs (no-op for control_plane, with a
  # warn-style [migrate] line). Production helm-validate-kind.sh
  # regenerates all three ConfigMaps in lockstep.
  controlPlaneConfigMapName: spendguard-migrations-control-plane
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }

# SLICE_13 Phase D: optional CronJob that runs `spendguard-calibration-report`
# on a schedule and pushes the resulting report + self-audit CloudEvent.
#
# Default cronEnabled=false because the CLI is primarily operator-driven
# (oncall + ad-hoc). Operators wanting daily monitoring set
# cronEnabled=true and configure schedule + tenant.
#
# When `verifyChain=true` the cron run pulls `--proof-mode=canonical`
# implicitly per spec §2.2 — the report exits 3 on chain integrity
# violation, which fails the pod and pages on-call.
calibrationReport:
  cronEnabled: false
  schedule: "0 4 * * *"   # 04:00 UTC daily
  image:
    repository: spendguard/calibration-report
    tag: "0.1.0-alpha.1"
  tenant: ""               # operator MUST set when cronEnabled=true
  from: "7d"
  to: "now"
  format: "json"           # JSON output for SIEM ingestion
  proofMode: "cache"
  verifyChain: false
  authSubject: "cron:calibration-report"
  rustLog: "info"
  activeDeadlineSeconds: 1800
  successHistory: 7
  failureHistory: 14
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }
