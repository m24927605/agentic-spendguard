apiVersion: v2
name: spendguard
description: |
  SpendGuard runtime safety layer for AI agent budgets. Deploys the
  full sidecar topology to a Kubernetes cluster: ledger + canonical
  ingest + sidecar (DaemonSet) + webhook receiver + outbox forwarder
  + TTL sweeper. Ledger schema migrations run as a post-install hook.

  Postgres + secrets (PKI / contract bundle) are user-provided
  externals — bring your own RDS / Cloud SQL / managed Postgres, and
  pre-create the spendguard-tls + spendguard-bundles Secrets per the
  README.
type: application
# Round-2 fix B2: patch version bump on SLICE_01 to surface the schema
# migration requirement (4 new migration files added under
# services/ledger/migrations/ + services/canonical_ingest/migrations/).
# Operators upgrading from 0.1.0-alpha.1 MUST regenerate the migration
# ConfigMaps — see templates/NOTES.txt for the upgrade procedure.
version: 0.1.0-alpha.3
appVersion: "0.1.0-alpha.3"
# Round-3 fix m5: declare minimum Kubernetes version. The chart uses
# `helm.sh/hook` annotations + Job + ConfigMap.optional which are all
# stable since 1.24. Older clusters silently mis-render the hook order.
kubeVersion: ">=1.24.0"
keywords:
  - ai
  - agents
  - budget
  - governance
  - llm
  - safety
home: https://github.com/m24927605/agentic-flow-cost-evaluation
sources:
  - https://github.com/m24927605/agentic-flow-cost-evaluation
maintainers:
  - name: SpendGuard authors
