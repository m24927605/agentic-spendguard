{{- /*
chart.profile=production global validations.

These run regardless of which Deployments are enabled — so disabling
ledger / canonical-ingest in favour of external services still gates
the database URL Secret names required by consumer pods
(ttl-sweeper, outbox-forwarder, webhook-receiver, canonical-ingest).

This file emits no Kubernetes resources; it exists only so Helm
evaluates the {{- fail -}} directives at template render time.
*/ -}}
{{- if eq .Values.chart.profile "production" -}}
{{- if not .Values.postgres.existingSecret -}}
{{- fail "postgres.existingSecret is required under chart.profile=production (database URLs are credentials and must be supplied via Secret, not literal Helm values)" -}}
{{- end -}}
{{- if not .Values.postgres.ledgerUrlKey -}}
{{- fail "postgres.ledgerUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.canonicalUrlKey -}}
{{- fail "postgres.canonicalUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.controlPlaneUrlKey -}}
{{- fail "postgres.controlPlaneUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.tokenizerShadowUrlKey -}}
{{- fail "postgres.tokenizerShadowUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.tokenizerUrlKey -}}
{{- fail "postgres.tokenizerUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.outputPredictorUrlKey -}}
{{- fail "postgres.outputPredictorUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.outputPredictorPluginEndpointUrlKey -}}
{{- fail "postgres.outputPredictorPluginEndpointUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.runCostProjectorUrlKey -}}
{{- fail "postgres.runCostProjectorUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- if not .Values.postgres.statsAggregatorUrlKey -}}
{{- fail "postgres.statsAggregatorUrlKey is required under chart.profile=production" -}}
{{- end -}}
{{- end -}}
