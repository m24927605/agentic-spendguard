{{- if .Values.sidecar.enabled }}
{{- $component := "sidecar" }}
{{- /* chart.profile=production: required-input gates.
       Values default to empty strings so demo / dev renders cleanly;
       production install MUST supply real values. Sidecar refuses
       to install bundles whose hash doesn't match, and the SPKI hash
       is defense-in-depth against intermediate CA compromise. */ -}}
{{- if eq .Values.chart.profile "production" -}}
{{- if eq .Values.sidecar.contractBundleHashHex "" -}}
{{- fail "sidecar.contractBundleHashHex is required under chart.profile=production (byte-exact hash of the contract bundle .tgz; sidecar refuses to install on mismatch)" -}}
{{- end -}}
{{- if eq .Values.sidecar.trustRootSpkiSha256Hex "" -}}
{{- fail "sidecar.trustRootSpkiSha256Hex is required under chart.profile=production (sha256 of the trust-root CA SubjectPublicKeyInfo, hex-encoded; defense-in-depth pin)" -}}
{{- end -}}
{{- if eq .Values.sidecar.manifestVerifyKey.existingSecret "" -}}
{{- fail "sidecar.manifestVerifyKey.existingSecret is required under chart.profile=production (sidecar main.rs refuses to boot without SPENDGUARD_SIDECAR_MANIFEST_VERIFY_KEY_PEM)" -}}
{{- end -}}
{{- /* Catch the chart's placeholder DNS — it doesn't resolve and the
       chart doesn't render an endpoint-catalog Service for it. */ -}}
{{- if contains "endpoint-catalog.spendguard:8443" .Values.sidecar.endpointCatalogManifestUrl -}}
{{- fail "sidecar.endpointCatalogManifestUrl still points at the chart's placeholder DNS; supply a real catalog manifest URL under chart.profile=production (sidecar main.rs awaits catalog::refresh_once() during startup)" -}}
{{- end -}}
{{- end -}}
{{- /* Phase 5 GA hardening S6: signing-mode fail-gate.
       production profile MUST NOT allow disabled signing —
       audit_outbox writes go through this sidecar.
*/ -}}
{{- if and (eq .Values.signing.mode "disabled") (ne .Values.signing.profile "demo") }}
{{- fail "S6: signing.mode=disabled is only allowed when signing.profile=demo (set signing.profile=demo in values.yaml or pick mode=local|kms)" }}
{{- end }}
{{- /* Phase 5 GA hardening S5: multi-pod safety gates. */ -}}
{{- if gt (int .Values.sidecar.replicas) 1 }}
{{- if not .Values.sidecar.acknowledgeMultiPod }}
{{- fail "S5: sidecar.replicas > 1 requires sidecar.acknowledgeMultiPod=true. Read docs/runbooks/sidecar-multi-pod.md (active/standby semantics, not horizontal scaling) before flipping the flag." }}
{{- end }}
{{- if .Values.sidecar.workloadInstanceIdOverride }}
{{- fail "S5: sidecar.replicas > 1 forbids sidecar.workloadInstanceIdOverride (override means single-pod identity; multi-pod requires the downward-API per-pod metadata.name path)." }}
{{- end }}
{{- end }}
{{- /*
Sidecar deployed as DaemonSet so the UDS socket lives on each node's
hostPath; application pods that mount the same hostPath get the
sidecar locally. For an in-pod sidecar (single application pod)
disable hostPath in values and use shared emptyDir volume.
*/ -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "spendguard.fullname" . }}-sidecar
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "spendguard.selector" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 8 }}
    spec:
      containers:
        - name: sidecar
          image: {{ include "spendguard.image" (merge (dict "image" .Values.sidecar.image "global" .Values.global) .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - { name: metrics, containerPort: 9093 }
          env:
            - { name: SPENDGUARD_SIDECAR_METRICS_ADDR,         value: "0.0.0.0:9093" }
            - { name: SPENDGUARD_SIDECAR_TENANT_ID,            value: {{ .Values.global.tenantId | quote }} }
            - { name: SPENDGUARD_SIDECAR_REGION,               value: {{ .Values.global.region | quote }} }
            - { name: SPENDGUARD_SIDECAR_FENCING_SCOPE_ID,     value: {{ .Values.sidecar.fencingScopeId | quote }} }
            # Phase 5 S2: producer_instance_id (==workload_instance_id) MUST
            # be per-pod unique. Use the k8s downward API to inject the
            # pod name + a service prefix so two replicas can never collide.
            # Operator can override with sidecar.workloadInstanceIdOverride
            # for non-k8s deployments where pod identity comes from
            # elsewhere (must still be per-instance unique).
            {{- if .Values.sidecar.workloadInstanceIdOverride }}
            - { name: SPENDGUARD_SIDECAR_WORKLOAD_INSTANCE_ID, value: {{ .Values.sidecar.workloadInstanceIdOverride | quote }} }
            {{- else }}
            - name: _POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: SPENDGUARD_SIDECAR_WORKLOAD_INSTANCE_ID, value: "sidecar-$(_POD_NAME)" }
            {{- end }}
            - { name: SPENDGUARD_SIDECAR_RESERVATION_TTL_SECONDS, value: {{ .Values.sidecar.reservationTtlSeconds | quote }} }
            - name: SPENDGUARD_SIDECAR_LEDGER_URL
              value: "https://{{ include "spendguard.fullname" . }}-ledger:50051"
            - name: SPENDGUARD_SIDECAR_CANONICAL_INGEST_URL
              value: "https://{{ include "spendguard.fullname" . }}-canonical-ingest:50052"
            # NOTE: sidecar/src/clients/mtls.rs uses MTlsPaths::default()
            # which hardcodes the workload-cert paths. Files come from the
            # `tls` volume mounted at /var/run/secrets/spendguard/ below,
            # with the per-service Secret keys projected to tls.crt / tls.key.
            # Do NOT wire SPENDGUARD_SIDECAR_TLS_* env vars here — they
            # are not read by the sidecar boot path.
            - { name: SPENDGUARD_SIDECAR_UDS_PATH,     value: "/var/run/spendguard/adapter.sock" }
            # Endpoint catalog manifest verify key. Required by
            # sidecar/src/main.rs at startup (load_manifest_signing_key);
            # without it the sidecar refuses to boot. File comes from
            # the operator-supplied `manifestVerifyKey.existingSecret`.
            - { name: SPENDGUARD_SIDECAR_MANIFEST_VERIFY_KEY_PEM, value: "/etc/spendguard/manifest-verify-key/manifest_verify_key.pub.pem" }
            # Round-2 #3: Required by services/sidecar Config::from_env().
            # Without these, Config::from_env() panics with
            # "missing field <name>" and the pod CrashLoopBackOff's.
            - { name: SPENDGUARD_SIDECAR_ENDPOINT_CATALOG_MANIFEST_URL, value: {{ .Values.sidecar.endpointCatalogManifestUrl | quote }} }
            - { name: SPENDGUARD_SIDECAR_FENCING_INITIAL_EPOCH,         value: {{ .Values.sidecar.fencingInitialEpoch | quote }} }
            # Contract + schema bundle bootstrap. The hashes MUST be
            # byte-exact matches for the pre-pulled .tgz files in
            # bundles-data; otherwise the sidecar refuses to install
            # them at startup.
            - { name: SPENDGUARD_SIDECAR_CONTRACT_BUNDLE_ID,        value: {{ .Values.sidecar.contractBundleId | quote }} }
            - { name: SPENDGUARD_SIDECAR_CONTRACT_BUNDLE_HASH_HEX,  value: {{ .Values.sidecar.contractBundleHashHex | quote }} }
            - { name: SPENDGUARD_SIDECAR_SCHEMA_BUNDLE_ID,          value: {{ .Values.sidecar.schemaBundleId | quote }} }
            # Trust-root pins. Sourced from the operator-supplied
            # `spendguard-trust` Secret. trust_root_ca_pem holds the
            # PEM CONTENTS (not a path); trust_root_spki_sha256_hex
            # is the sha256 of the root CA SubjectPublicKeyInfo.
            - name: SPENDGUARD_SIDECAR_TRUST_ROOT_CA_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sidecar.trustSecret.name }}
                  key: {{ .Values.sidecar.trustSecret.caPemKey | quote }}
            - { name: SPENDGUARD_SIDECAR_TRUST_ROOT_SPKI_SHA256_HEX, value: {{ .Values.sidecar.trustRootSpkiSha256Hex | quote }} }
            # mTLS bootstrap token (one-shot, used by cert-manager
            # external issuer to provision the workload cert at
            # first boot).
            - name: SPENDGUARD_SIDECAR_MTLS_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sidecar.mtlsBootstrapTokenSecret.name }}
                  key: {{ .Values.sidecar.mtlsBootstrapTokenSecret.tokenKey | quote }}
            # Phase 5 GA hardening S6: producer signing config.
            - { name: SPENDGUARD_PROFILE,                            value: {{ .Values.signing.profile | quote }} }
            - { name: SPENDGUARD_SIDECAR_SIGNING_MODE,               value: {{ .Values.signing.mode | quote }} }
            - { name: SPENDGUARD_SIDECAR_SIGNING_PRODUCER_IDENTITY,  value: "sidecar:$(SPENDGUARD_SIDECAR_WORKLOAD_INSTANCE_ID)" }
            {{- if eq .Values.signing.mode "local" }}
            - { name: SPENDGUARD_SIDECAR_SIGNING_KEY_PATH,           value: "/etc/spendguard/signing/sidecar.pem" }
            {{- else if eq .Values.signing.mode "kms" }}
            - { name: SPENDGUARD_SIDECAR_SIGNING_KMS_ARN,            value: {{ .Values.signing.kms.sidecarArn | quote }} }
            {{- end }}
            # Phase 5 GA hardening S22: fail-policy matrix (defaults
            # to fail-closed everywhere when overrides string is empty).
            {{- if .Values.failPolicy.overrides }}
            - { name: SPENDGUARD_SIDECAR_FAIL_POLICY_JSON,           value: {{ .Values.failPolicy.overrides | quote }} }
            {{- end }}
          volumeMounts:
            # sidecar boot path waits for /var/run/secrets/spendguard/{tls.crt,tls.key,ca.crt}
            # (MTlsPaths::default in services/sidecar/src/clients/mtls.rs).
            - { name: tls,                 mountPath: /var/run/secrets/spendguard, readOnly: true }
            - { name: bundles,             mountPath: /var/lib/spendguard/bundles, readOnly: true }
            - { name: manifest-verify-key, mountPath: /etc/spendguard/manifest-verify-key, readOnly: true }
            {{- if eq .Values.signing.mode "local" }}
            - { name: signing,             mountPath: /etc/spendguard/signing, readOnly: true }
            {{- end }}
            {{- if .Values.sidecar.hostPath.enabled }}
            - { name: uds,                 mountPath: /var/run/spendguard }
            {{- end }}
          resources:
            {{- toYaml .Values.sidecar.resources | nindent 12 }}
      volumes:
        # Project the shared TLS Secret's per-service keys (sidecar.crt /
        # sidecar.key) to the conventional tls.crt / tls.key filenames the
        # sidecar binary expects at /var/run/secrets/spendguard/. Operator's
        # Secret structure stays the same; chart adapts.
        - name: tls
          secret:
            secretName: {{ .Values.secrets.tls.existingSecret }}
            items:
              - { key: sidecar.crt, path: tls.crt }
              - { key: sidecar.key, path: tls.key }
              - { key: ca.crt,      path: ca.crt }
        # bootstrap/bundles.rs reads four files at fixed sub-paths:
        #   contract_bundle/<contractBundleId>.tgz
        #   contract_bundle/<contractBundleId>.tgz.sig
        #   contract_bundle/<contractBundleId>.metadata.json
        #   schema_bundle/<schemaBundleId>.tgz
        # K8s Secret keys cannot contain "/", so we project flat operator-
        # supplied keys to those paths via items.path.
        - name: bundles
          secret:
            secretName: {{ .Values.secrets.bundles.existingSecret }}
            items:
              - key: contract_bundle_tgz
                path: contract_bundle/{{ .Values.sidecar.contractBundleId }}.tgz
              - key: contract_bundle_sig
                path: contract_bundle/{{ .Values.sidecar.contractBundleId }}.tgz.sig
              - key: contract_bundle_metadata_json
                path: contract_bundle/{{ .Values.sidecar.contractBundleId }}.metadata.json
              - key: schema_bundle_tgz
                path: schema_bundle/{{ .Values.sidecar.schemaBundleId }}.tgz
        - name: manifest-verify-key
          secret:
            secretName: {{ .Values.sidecar.manifestVerifyKey.existingSecret }}
            items:
              - key: {{ .Values.sidecar.manifestVerifyKey.pemKey | quote }}
                path: manifest_verify_key.pub.pem
        {{- if eq .Values.signing.mode "local" }}
        - name: signing
          secret:
            secretName: {{ .Values.signing.existingSecret }}
            items:
              - { key: sidecar.pem, path: sidecar.pem }
        {{- end }}
        {{- if .Values.sidecar.hostPath.enabled }}
        - name: uds
          hostPath:
            path: {{ .Values.sidecar.hostPath.socketDir }}
            type: DirectoryOrCreate
        {{- end }}
{{- end }}
