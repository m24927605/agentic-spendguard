{{- if .Values.ttlSweeper.enabled }}
{{- $component := "ttl-sweeper" }}
{{- /* Phase 5 S1 multi-pod safety gate */ -}}
{{- if and (gt (int .Values.ttlSweeper.replicas) 1) (eq .Values.leaderElection.mode "disabled") -}}
{{- fail "ttlSweeper.replicas > 1 requires leaderElection.mode != 'disabled' (S1 multi-pod safety gate)" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spendguard.fullname" . }}-ttl-sweeper
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  replicas: {{ .Values.ttlSweeper.replicas }}
  selector:
    matchLabels:
      {{- include "spendguard.selector" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 8 }}
    spec:
      containers:
        - name: ttl-sweeper
          image: {{ include "spendguard.image" (merge (dict "image" .Values.ttlSweeper.image "global" .Values.global) .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - { name: SPENDGUARD_TTL_SWEEPER_TENANT_ID,            value: {{ .Values.global.tenantId | quote }} }
            - { name: SPENDGUARD_TTL_SWEEPER_FENCING_SCOPE_ID,     value: {{ .Values.ttlSweeper.fencingScopeId | quote }} }
            # Phase 5 S2: per-pod-unique workload_instance_id via downward API.
            {{- if .Values.ttlSweeper.workloadInstanceIdOverride }}
            - { name: SPENDGUARD_TTL_SWEEPER_WORKLOAD_INSTANCE_ID, value: {{ .Values.ttlSweeper.workloadInstanceIdOverride | quote }} }
            {{- else }}
            - name: _POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: SPENDGUARD_TTL_SWEEPER_WORKLOAD_INSTANCE_ID, value: "ttl-sweeper-$(_POD_NAME)" }
            {{- end }}
            - name: SPENDGUARD_TTL_SWEEPER_LEDGER_URL
              value: "https://{{ include "spendguard.fullname" . }}-ledger:50051"
            - name: SPENDGUARD_TTL_SWEEPER_DATABASE_URL
              value: {{ .Values.postgres.ledgerUrl | quote }}
            - { name: SPENDGUARD_TTL_SWEEPER_POLL_INTERVAL_SECONDS, value: {{ .Values.ttlSweeper.pollIntervalSeconds | quote }} }
            - { name: SPENDGUARD_TTL_SWEEPER_BATCH_SIZE,            value: {{ .Values.ttlSweeper.batchSize | quote }} }
            - { name: SPENDGUARD_TTL_SWEEPER_TLS_CERT_PEM, value: "/etc/ssl/spendguard/ttl-sweeper.crt" }
            - { name: SPENDGUARD_TTL_SWEEPER_TLS_KEY_PEM,  value: "/etc/ssl/spendguard/ttl-sweeper.key" }
            - { name: SPENDGUARD_TTL_SWEEPER_TLS_CA_PEM,   value: "/etc/ssl/spendguard/ca.crt" }
            # Phase 5 S1 — leader election config.
            - { name: SPENDGUARD_LEADER_ELECTION_MODE,    value: {{ .Values.leaderElection.mode | quote }} }
            - { name: SPENDGUARD_LEADER_LEASE_NAME,        value: {{ .Values.ttlSweeper.leaseName | quote }} }
            - { name: SPENDGUARD_LEADER_REGION,            value: {{ .Values.leaderElection.region | quote }} }
            - { name: SPENDGUARD_LEADER_LEASE_TTL_MS,      value: {{ .Values.leaderElection.ttlMs | quote }} }
            - { name: SPENDGUARD_LEADER_RENEW_INTERVAL_MS, value: {{ .Values.leaderElection.renewIntervalMs | quote }} }
            - { name: SPENDGUARD_LEADER_RETRY_INTERVAL_MS, value: {{ .Values.leaderElection.retryIntervalMs | quote }} }
          volumeMounts:
            - { name: tls, mountPath: /etc/ssl/spendguard, readOnly: true }
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.secrets.tls.existingSecret }}
{{- end }}
