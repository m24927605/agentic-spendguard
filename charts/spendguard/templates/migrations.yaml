{{- if .Values.postgres.applyMigrationsOnInstall }}
{{- $component := "migrations" }}
{{- /*
Issue #61 slice 6: apply ledger + canonical-ingest SQL files from
operator-supplied ConfigMaps. ConfigMaps are OPTIONAL: if the operator
hasn't created them, the Job completes as a no-op (helm install
succeeds; operator runs migrations out-of-band). Kind validation
script generates the ConfigMaps automatically (see
scripts/helm-validate-kind.sh).

ConfigMap shape:
  Name:  {{ .Values.migrations.ledgerConfigMapName }}    (default: spendguard-migrations-ledger)
  Keys:  one entry per .sql file from services/ledger/migrations/
         (lexicographic order preserved by the apply loop's `sort`).
  Same shape for canonical-ingest under
  {{ .Values.migrations.canonicalConfigMapName }} (default: spendguard-migrations-canonical).

Round-2 fix B2 + M15: SLICE_01 added 4 new migration files
(ledger 0046+0048, canonical 0013+0014). On chart upgrade the
operator MUST regenerate the ConfigMaps with the new files included.
This template now (1) fails the render under chart.profile=production
when the ConfigMaps are absent, and (2) NOTES.txt warns operators
loudly before helm upgrade.

The fail-gate prevents the silent no-op path: chart.profile=demo still
tolerates absent ConfigMaps (the Job exits 0 with a "no SQL files found"
log line) so out-of-band migration workflows keep working. But under
chart.profile=production the assumption is "Helm owns migration",
and a silent no-op there would let a production cluster boot with
stale schema — masking the SLICE_01 changes until the first decision
event triggers a "column does not exist" runtime error from the
ledger.

Cross-DB migration ordering (round-2 fix M16): the apply loop already
processes the ledger glob before the canonical glob, which is required
because the canonical_events mirror columns assume the ledger side has
already accepted the same schema. The lexicographic file ordering
inside each glob is also load-bearing: 0046 (audit_outbox columns +
trigger + TRUNCATE guard, all atomic) MUST land before 0048
(tokenizer_versions + FK) so the FK target table exists; 0013 MUST land
before 0014 (schema_bundle row insert depends on canonical_events
schema being prepared).
*/ -}}
{{- /*
Round-3 fix B1: gate the production fail-gate on install/upgrade context.
Without this gate, `helm template` (no cluster connection) sees
`lookup "v1" "ConfigMap" ...` return nil → the {{- fail ... }} fires →
CI helm-validate.yml red. The lookup function only works against a live
cluster API server; during template-only renders (CI dry-run) it returns
nil regardless of ConfigMap existence in the operator's cluster.

The .Release.IsInstall / .Release.IsUpgrade guards ONLY fire during real
helm install / helm upgrade — `helm template` sees both as false, so the
fail-gate is skipped in CI but enforced in production rollouts.

Also fixes B3 (round-2 fix removed in round-3): the schema_bundle
placeholder migration 0014 has been deleted. The file-presence check now
only enforces 0013 — SLICE_06 producer slice will register the real
cosigned bundle.
*/ -}}
{{- if eq (.Values.chart.profile | default "demo") "production" }}
{{- if or .Release.IsInstall .Release.IsUpgrade }}
{{- $ledgerCm := lookup "v1" "ConfigMap" .Release.Namespace (.Values.migrations.ledgerConfigMapName | default "spendguard-migrations-ledger") }}
{{- $canonicalCm := lookup "v1" "ConfigMap" .Release.Namespace (.Values.migrations.canonicalConfigMapName | default "spendguard-migrations-canonical") }}
{{- if not $ledgerCm }}
{{- fail (printf "chart.profile=production requires ConfigMap %s/%s with SLICE_01 migrations 0046_audit_outbox_prediction_columns.sql + 0048_tokenizer_versions.sql. Round-2 fix B2: regenerate via scripts/helm-validate-kind.sh or apply migrations out-of-band and set postgres.applyMigrationsOnInstall=false." .Release.Namespace (.Values.migrations.ledgerConfigMapName | default "spendguard-migrations-ledger")) }}
{{- end }}
{{- if not $canonicalCm }}
{{- fail (printf "chart.profile=production requires ConfigMap %s/%s with SLICE_01 migrations 0013_canonical_events_prediction_columns.sql + 0015_audit_outcome_quarantine_prediction_columns.sql. Round-3 fix B3: 0014 placeholder bundle migration was removed; SLICE_06 registers the real cosigned bundle. Regenerate via scripts/helm-validate-kind.sh or apply migrations out-of-band and set postgres.applyMigrationsOnInstall=false." .Release.Namespace (.Values.migrations.canonicalConfigMapName | default "spendguard-migrations-canonical")) }}
{{- end }}
{{- /*
File-presence check for the SLICE_01 migrations themselves: even if the
ConfigMap exists, the operator may have generated it from a pre-SLICE_01
snapshot. Inspect the ConfigMap.data keys and fail loudly if the new
files are missing.
*/ -}}
{{- $needLedger := list "0046_audit_outbox_prediction_columns.sql" "0048_tokenizer_versions.sql" }}
{{- range $needLedger }}
{{- if not (hasKey $ledgerCm.data .) }}
{{- fail (printf "chart.profile=production: ledger migration ConfigMap missing SLICE_01 file %s. Round-2 fix B2: regenerate the ConfigMap to include all migrations in services/ledger/migrations/ — see CHANGELOG for the SLICE_01 additions." .) }}
{{- end }}
{{- end }}
{{- $needCanonical := list "0013_canonical_events_prediction_columns.sql" "0015_audit_outcome_quarantine_prediction_columns.sql" }}
{{- range $needCanonical }}
{{- if not (hasKey $canonicalCm.data .) }}
{{- fail (printf "chart.profile=production: canonical-ingest migration ConfigMap missing SLICE_01 file %s. Round-3 fix B3: 0014 placeholder removed; 0015 quarantine prediction columns added. Regenerate the ConfigMap to include all migrations in services/canonical_ingest/migrations/." .) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "spendguard.fullname" . }}-migrate
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ .Values.migrations.ledgerImage }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              applied=0
              skipped=0
              # Round-3 fix m6: detect SLICE_01-incomplete ConfigMap.
              # In demo profile the production fail-gate does NOT fire,
              # but the operator may still have mounted a pre-SLICE_01
              # ConfigMap missing 0046/0048. Warn loudly so the silent
              # stale-schema boot is at least observable in demo mode.
              missing_slice01=""
              for f in 0046_audit_outbox_prediction_columns.sql 0048_tokenizer_versions.sql; do
                  if [ -d /etc/migrations/ledger ] && [ ! -f "/etc/migrations/ledger/$f" ]; then
                      missing_slice01="$missing_slice01 ledger/$f"
                  fi
              done
              for f in 0013_canonical_events_prediction_columns.sql 0015_audit_outcome_quarantine_prediction_columns.sql; do
                  if [ -d /etc/migrations/canonical ] && [ ! -f "/etc/migrations/canonical/$f" ]; then
                      missing_slice01="$missing_slice01 canonical/$f"
                  fi
              done
              if [ -n "$missing_slice01" ]; then
                  echo "[migrate] WARNING: SLICE_01 migration file(s) MISSING from mounted ConfigMaps:$missing_slice01"
                  echo "[migrate] WARNING: this is OK in demo profile but will cause a 'column does not exist'"
                  echo "[migrate] WARNING: runtime error once SLICE_06 producers attempt to write tag-300+ fields."
                  echo "[migrate] WARNING: regenerate ConfigMaps via scripts/helm-validate-kind.sh."
              fi
              for f in $(ls /etc/migrations/ledger/*.sql 2>/dev/null | sort); do
                  echo "[migrate] applying $f to spendguard_ledger..."
                  psql "$PG_LEDGER_URL" -v ON_ERROR_STOP=1 -f "$f"
                  applied=$((applied + 1))
              done
              for f in $(ls /etc/migrations/canonical/*.sql 2>/dev/null | sort); do
                  echo "[migrate] applying $f to spendguard_canonical..."
                  psql "$PG_CANONICAL_URL" -v ON_ERROR_STOP=1 -f "$f"
                  applied=$((applied + 1))
              done
              if [ "$applied" -eq 0 ]; then
                  echo "[migrate] no SQL files found in /etc/migrations/{ledger,canonical}/."
                  echo "[migrate] Operator must mount the {{ .Values.migrations.ledgerConfigMapName | default "spendguard-migrations-ledger" }} +"
                  echo "[migrate] {{ .Values.migrations.canonicalConfigMapName | default "spendguard-migrations-canonical" }} ConfigMaps OR"
                  echo "[migrate] override migrations.applyMigrationsOnInstall=false + run migrations out-of-band."
                  echo "[migrate] Job exits 0 so helm install can complete."
              else
                  echo "[migrate] PASS — applied ${applied} migration file(s)."
              fi
          env:
            - name: PG_LEDGER_URL
              value: {{ .Values.postgres.ledgerUrl | quote }}
            - name: PG_CANONICAL_URL
              value: {{ .Values.postgres.canonicalUrl | quote }}
          volumeMounts:
            - name: migrations-ledger
              mountPath: /etc/migrations/ledger
              readOnly: true
            - name: migrations-canonical
              mountPath: /etc/migrations/canonical
              readOnly: true
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      volumes:
        - name: migrations-ledger
          configMap:
            name: {{ .Values.migrations.ledgerConfigMapName | default "spendguard-migrations-ledger" }}
            optional: true
        - name: migrations-canonical
          configMap:
            name: {{ .Values.migrations.canonicalConfigMapName | default "spendguard-migrations-canonical" }}
            optional: true
{{- end }}
