{{- if .Values.outboxForwarder.enabled }}
{{- $component := "outbox-forwarder" }}
{{- /* Phase 5 S1 multi-pod safety gate */ -}}
{{- if and (gt (int .Values.outboxForwarder.replicas) 1) (eq .Values.leaderElection.mode "disabled") -}}
{{- fail "outboxForwarder.replicas > 1 requires leaderElection.mode != 'disabled' (S1 multi-pod safety gate)" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spendguard.fullname" . }}-outbox-forwarder
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  replicas: {{ .Values.outboxForwarder.replicas }}
  selector:
    matchLabels:
      {{- include "spendguard.selector" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 8 }}
    spec:
      containers:
        - name: outbox-forwarder
          image: {{ include "spendguard.image" (merge (dict "image" .Values.outboxForwarder.image "global" .Values.global) .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - { name: SPENDGUARD_OUTBOX_FORWARDER_TENANT_ID,         value: {{ .Values.global.tenantId | quote }} }
            # Phase 5 S2: per-pod-unique workload_instance_id via downward API.
            {{- if .Values.outboxForwarder.workloadInstanceIdOverride }}
            - { name: SPENDGUARD_OUTBOX_FORWARDER_WORKLOAD_INSTANCE_ID, value: {{ .Values.outboxForwarder.workloadInstanceIdOverride | quote }} }
            {{- else }}
            - name: _POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - { name: SPENDGUARD_OUTBOX_FORWARDER_WORKLOAD_INSTANCE_ID, value: "outbox-forwarder-$(_POD_NAME)" }
            {{- end }}
            - name: SPENDGUARD_OUTBOX_FORWARDER_DATABASE_URL
              value: {{ .Values.postgres.ledgerUrl | quote }}
            - name: SPENDGUARD_OUTBOX_FORWARDER_CANONICAL_INGEST_URL
              value: "https://{{ include "spendguard.fullname" . }}-canonical-ingest:50052"
            - { name: SPENDGUARD_OUTBOX_FORWARDER_POLL_INTERVAL_SECONDS, value: {{ .Values.outboxForwarder.pollIntervalSeconds | quote }} }
            - { name: SPENDGUARD_OUTBOX_FORWARDER_BATCH_SIZE,            value: {{ .Values.outboxForwarder.batchSize | quote }} }
            - { name: SPENDGUARD_OUTBOX_FORWARDER_TLS_CERT_PEM, value: "/etc/ssl/spendguard/outbox-forwarder.crt" }
            - { name: SPENDGUARD_OUTBOX_FORWARDER_TLS_KEY_PEM,  value: "/etc/ssl/spendguard/outbox-forwarder.key" }
            - { name: SPENDGUARD_OUTBOX_FORWARDER_TLS_CA_PEM,   value: "/etc/ssl/spendguard/ca.crt" }
            # Phase 5 S1 — leader election config.
            - { name: SPENDGUARD_LEADER_ELECTION_MODE,    value: {{ .Values.leaderElection.mode | quote }} }
            - { name: SPENDGUARD_LEADER_LEASE_NAME,        value: {{ .Values.outboxForwarder.leaseName | quote }} }
            - { name: SPENDGUARD_LEADER_REGION,            value: {{ .Values.leaderElection.region | quote }} }
            - { name: SPENDGUARD_LEADER_LEASE_TTL_MS,      value: {{ .Values.leaderElection.ttlMs | quote }} }
            - { name: SPENDGUARD_LEADER_RENEW_INTERVAL_MS, value: {{ .Values.leaderElection.renewIntervalMs | quote }} }
            - { name: SPENDGUARD_LEADER_RETRY_INTERVAL_MS, value: {{ .Values.leaderElection.retryIntervalMs | quote }} }
          volumeMounts:
            - { name: tls,     mountPath: /etc/ssl/spendguard, readOnly: true }
            - { name: bundles, mountPath: /var/lib/spendguard/bundles, readOnly: true }
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.secrets.tls.existingSecret }}
        - name: bundles
          secret:
            secretName: {{ .Values.secrets.bundles.existingSecret }}
{{- end }}
