{{- if .Values.tokenizer.enabled }}
{{- $component := "tokenizer" }}
{{- /* chart.profile=production: required-input gates.

       Per tokenizer-service-spec-v1alpha1.md §5.3 health invariant
       (tier3 hit rate < 0.1%) the operator must explicitly confirm
       the tier3 alert threshold under production profile — leaving
       it at chart default in production hides the metric behind a
       chart placeholder.

       Per spec §8 "Tier 2 encoder load failure" + §7.4 signed bundle:
       the asset sha256 verification happens inside the library at
       boot; chart-side we only need to ensure the image tag is
       pinned (no `latest`).

       Mirrors the sidecar.yaml:8-23 production-profile fail-gate
       pattern. Round-2 fixes B3, M4, M5 strengthen the gates:
       - B3.3: production must configure UDS hostPath OR mTLS Secret
       - M4: tier3AlertThreshold uses regex (Helm --set casts to string)
              + range bounds (0.00001, 0.05]
       - M5: image.tag must be semver vN.N.N or @sha256:... digest
    */ -}}
{{- if eq .Values.chart.profile "production" -}}
{{- if eq .Values.tokenizer.image.tag "" -}}
{{- fail "tokenizer.image.tag is required under chart.profile=production (do not run with mutable tags like `latest`)" -}}
{{- end -}}
{{- /* Round-2 fix M5: strict tag policy. Previously rejected only
       "latest"; mutable tags like "stable", "main", "dev" slipped
       through. Now: must be either semver (v?N.N.N optionally
       suffixed) OR digest-pinned (@sha256:HEX). */ -}}
{{- if not (or (regexMatch "@sha256:[0-9a-f]{64}$" (toString .Values.tokenizer.image.tag)) (regexMatch "^v?[0-9]+\\.[0-9]+\\.[0-9]+(-[a-z0-9.]+)?$" (toString .Values.tokenizer.image.tag))) -}}
{{- fail (printf "tokenizer.image.tag=%q must be a semver tag (vN.N.N) or digest-pinned (@sha256:HEX) under chart.profile=production (per spec §7.2 immutable tag for asset signature audit trail)" (toString .Values.tokenizer.image.tag)) -}}
{{- end -}}
{{- /* Round-2 fix M4: tier3AlertThreshold validation. Helm --set
       casts numbers to strings, so kindIs "float64" rejects valid
       overrides like --set tokenizer.tier3AlertThreshold=0.005. Use
       regexMatch to validate the string shape, then bounds-check
       the parsed float. */ -}}
{{- if not (regexMatch "^[0-9]+(\\.[0-9]+)?$" (toString .Values.tokenizer.tier3AlertThreshold)) -}}
{{- fail (printf "tokenizer.tier3AlertThreshold=%q must be a positive number under chart.profile=production (per spec §5.3 health invariant default 0.001 = 0.1%%)" (toString .Values.tokenizer.tier3AlertThreshold)) -}}
{{- end -}}
{{- $threshold := .Values.tokenizer.tier3AlertThreshold | float64 -}}
{{- if or (lt $threshold 0.00001) (gt $threshold 0.05) -}}
{{- fail (printf "tokenizer.tier3AlertThreshold=%f must be in (0.00001, 0.05] under chart.profile=production (per spec §5.3 default 0.001; values outside this range either disable alerts or alert constantly)" $threshold) -}}
{{- end -}}
{{- /* Round-2 fix B3.3: production must configure secure transport.
       Either UDS hostPath (in-pod kernel trust) OR mTLS Secret. If
       neither is set, fail-fast. */ -}}
{{- if and (not .Values.tokenizer.udsHostPath) (not .Values.tokenizer.mtlsSecretName) -}}
{{- fail "tokenizer must configure either udsHostPath (for in-cluster on-node sidecar callers) or mtlsSecretName (for cross-node mTLS) under chart.profile=production (plaintext TCP forbidden per spec §10.1 + sidecar-architecture §5)" -}}
{{- end -}}
{{- /* R2 B1 + M12: when shadowEnabled is true (default), the production
       profile requires the FULL shadow stack — provider Secret +
       canonical_ingest URL + database URL + outbound mTLS secret.
       Drop-only mode is forbidden in production because the entire
       point of SLICE_05 is drift detection; silently disabling it
       defeats the audit-routed alert chain (spec §6 / slice §6).
       Operators who want to ship the tokenizer without shadow set
       tokenizer.shadowEnabled=false explicitly. */ -}}
{{- if .Values.tokenizer.shadowEnabled -}}
{{- if not .Values.tokenizer.providerSecretName -}}
{{- fail "tokenizer.providerSecretName is required under chart.profile=production when tokenizer.shadowEnabled=true (R2 B1 + M12: silent drop-only mode is forbidden — set shadowEnabled=false to ship without drift detection)" -}}
{{- end -}}
{{- if not .Values.tokenizer.canonicalIngestUrl -}}
{{- fail "tokenizer.canonicalIngestUrl is required under chart.profile=production when tokenizer.shadowEnabled=true (R2 B1 + M12: drift alerts must reach canonical_ingest's ImmutableAuditLog route)" -}}
{{- end -}}
{{- if not .Values.tokenizer.schemaBundleId -}}
{{- fail "tokenizer.schemaBundleId is required under chart.profile=production when tokenizer.shadowEnabled=true (HARDEN_03 #168: canonical_ingest rejects AppendEventsRequest without schema_bundle)" -}}
{{- end -}}
{{- if not .Values.tokenizer.schemaBundleHashHex -}}
{{- fail "tokenizer.schemaBundleHashHex is required under chart.profile=production when tokenizer.shadowEnabled=true (HARDEN_03 #168: byte-exact schema bundle hash for tokenizer_drift_alert AppendEventsRequest)" -}}
{{- end -}}
{{- if not .Values.tokenizer.databaseUrl -}}
{{- fail "tokenizer.databaseUrl is required under chart.profile=production when tokenizer.shadowEnabled=true (R2 B1 + M12: tokenizer_t1_samples persistence required for drift attribution)" -}}
{{- end -}}
{{- if not .Values.tokenizer.sinkMtlsSecretName -}}
{{- fail "tokenizer.sinkMtlsSecretName is required under chart.profile=production when tokenizer.shadowEnabled=true (R2 B4 + M12: plaintext canonical_ingest sink is forbidden — drift_alert CloudEvents carry signed audit-chain bytes)" -}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- /* Spec §2.1 — the tokenizer ships in two co-existing forms:
       (a) gRPC service (this Deployment + Service) — used by the
           Tier 1 shadow worker, output_predictor, calibration_report,
           SDK fallback.
       (b) Rust library — sidecar / egress_proxy link directly for
           the hot path; no chart resource needed.
       Both forms share the same dispatch table + tokenizer_versions
       registry, so a service-side encoder refresh + DB seed migration
       roll out together.
    */ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spendguard.fullname" . }}-tokenizer
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  replicas: {{ .Values.tokenizer.replicas }}
  selector:
    matchLabels:
      {{- include "spendguard.selector" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 8 }}
    spec:
      # Round-2 fix M7: pod-level securityContext — runAsNonRoot +
      # seccomp baseline matching CIS Kubernetes Benchmark §5.7. Container
      # securityContext below adds read-only rootfs + drop ALL caps.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tokenizer
          image: {{ include "spendguard.image" (merge (dict "image" .Values.tokenizer.image "global" .Values.global) .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # Round-2 fix M7: container-level securityContext.
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - { name: grpc,    containerPort: 50053 }
            - { name: metrics, containerPort: 9099  }
          env:
            - { name: SPENDGUARD_TOKENIZER_LISTEN_ADDR,           value: "0.0.0.0:50053" }
            - { name: SPENDGUARD_TOKENIZER_METRICS_ADDR,          value: "0.0.0.0:9099"  }
            - { name: SPENDGUARD_TOKENIZER_REGION,                value: {{ .Values.global.region | quote }} }
            # Per spec §5.3 health invariant — Tier 3 hit-rate
            # alerting threshold. SLICE_03 plumbs the value through
            # Config; the alert wire-up itself lands in SLICE-extra.
            - { name: SPENDGUARD_TOKENIZER_TIER3_ALERT_THRESHOLD, value: {{ .Values.tokenizer.tier3AlertThreshold | quote }} }
            # ── SLICE_05: Tier 1 shadow drift detection ────────────
            # Per spec §4 + §11 rollback plan, shadowEnabled is a
            # master kill-switch. Default true; operators set to
            # false to disable the shadow worker entirely (Tier 2
            # hot path is unaffected).
            - { name: SPENDGUARD_TOKENIZER_SHADOW_ENABLED,        value: {{ .Values.tokenizer.shadowEnabled | quote }} }
            # Default sample rate per spec §4.1 (1% = 0.01).
            # Per-(tenant, model) override via the control plane API.
            - { name: SPENDGUARD_TOKENIZER_SHADOW_DEFAULT_SAMPLE_RATE, value: {{ .Values.tokenizer.shadowDefaultSampleRate | quote }} }
            {{- if .Values.tokenizer.canonicalIngestUrl }}
            # canonical_ingest gRPC endpoint for signed
            # tokenizer_drift_alert CloudEvent emission.
            - { name: SPENDGUARD_TOKENIZER_CANONICAL_INGEST_URL,  value: {{ .Values.tokenizer.canonicalIngestUrl | quote }} }
            {{- end }}
            {{- if .Values.tokenizer.schemaBundleId }}
            # HARDEN_03 / #168: AppendEventsRequest schema bundle
            # envelope. Production profile gates this above; demo may
            # leave the hash empty because canonical_ingest is unset and
            # the sink is not constructed.
            - { name: SPENDGUARD_TOKENIZER_SCHEMA_BUNDLE_ID,       value: {{ .Values.tokenizer.schemaBundleId | quote }} }
            {{- end }}
            {{- if .Values.tokenizer.schemaBundleHashHex }}
            - { name: SPENDGUARD_TOKENIZER_SCHEMA_BUNDLE_HASH_HEX, value: {{ .Values.tokenizer.schemaBundleHashHex | quote }} }
            {{- end }}
            - { name: SPENDGUARD_TOKENIZER_CANONICAL_SCHEMA_VERSION, value: {{ .Values.tokenizer.canonicalSchemaVersion | quote }} }
            {{- if .Values.tokenizer.databaseUrl }}
            # Postgres URL for tokenizer_t1_samples persistence.
            # Migration 0051 owns the schema.
            - { name: SPENDGUARD_TOKENIZER_DATABASE_URL,          value: {{ .Values.tokenizer.databaseUrl | quote }} }
            {{- end }}
            {{- if .Values.tokenizer.providerSecretName }}
            # Provider API keys for Anthropic / Gemini Tier 1
            # count_tokens calls. Mounted from a pre-created Secret
            # so the keys never appear in the Helm release secrets
            # or Deployment manifest. Demo: both optional (worker falls
            # back to drop-only when neither key is present). Production
            # (chart.profile=production + shadowEnabled=true): the
            # template-level fail-fast above requires this Secret to
            # exist; at least ONE of the two keys MUST be populated for
            # the shadow worker to make any provider call.
            # R2 M12: optional flag flipped to false in production so a
            # rotated/missing key surfaces as a CrashLoopBackoff instead
            # of silent shadow-disablement.
            - name: SPENDGUARD_TOKENIZER_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tokenizer.providerSecretName | quote }}
                  key: anthropic-api-key
                  optional: {{ if eq .Values.chart.profile "production" }}false{{ else }}true{{ end }}
            - name: SPENDGUARD_TOKENIZER_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tokenizer.providerSecretName | quote }}
                  key: gemini-api-key
                  optional: {{ if eq .Values.chart.profile "production" }}false{{ else }}true{{ end }}
            {{- end }}
            {{- if .Values.tokenizer.sinkMtlsSecretName }}
            # R2 B4: outbound mTLS to canonical_ingest for the
            # tokenizer_drift_alert CloudEvent sink. Required under
            # chart.profile=production + shadowEnabled=true. Paths
            # match the cert-manager mount convention the sidecar uses.
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_CERT_PEM, value: "/etc/spendguard/sink-tls/tls.crt" }
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_KEY_PEM,  value: "/etc/spendguard/sink-tls/tls.key" }
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_CA_PEM,   value: "/etc/spendguard/sink-tls/ca.crt"  }
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_SNI,      value: {{ .Values.tokenizer.sinkMtlsSni | quote }} }
            {{- end }}
            # R2 B1: producer identity + signing mode for the audit-routed
            # drift_alert CloudEvent. Mirrors the env contract used by
            # sidecar / canonical_ingest / ledger via signer_from_env.
            - { name: SPENDGUARD_PROFILE,                     value: {{ .Values.chart.profile | quote }} }
            - { name: SPENDGUARD_TOKENIZER_SIGNING_PRODUCER_IDENTITY, value: {{ printf "tokenizer-service:%s" .Values.global.region | quote }} }
            {{- if .Values.tokenizer.signingKeyPath }}
            - { name: SPENDGUARD_TOKENIZER_SIGNING_MODE,      value: "local" }
            - { name: SPENDGUARD_TOKENIZER_SIGNING_KEY_PATH,  value: {{ .Values.tokenizer.signingKeyPath | quote }} }
            {{- else if eq .Values.chart.profile "demo" }}
            - { name: SPENDGUARD_TOKENIZER_SIGNING_MODE,      value: "disabled" }
            {{- end }}
            {{- if .Values.tokenizer.udsHostPath }}
            # Round-2 fix B3.1: UDS bind path (hostPath for on-node
            # sidecar callers). When set, the service binds the UDS
            # *instead of* TCP — both modes share the dispatch + cache.
            - { name: SPENDGUARD_TOKENIZER_UDS_PATH,              value: "/var/run/spendguard/tokenizer.sock" }
            {{- end }}
            {{- if .Values.tokenizer.mtlsSecretName }}
            # Round-2 fix B3.2: mTLS — paths into the mounted Secret.
            - { name: SPENDGUARD_TOKENIZER_TLS_CERT_PEM,          value: "/etc/spendguard/tls/tls.crt" }
            - { name: SPENDGUARD_TOKENIZER_TLS_KEY_PEM,           value: "/etc/spendguard/tls/tls.key" }
            - { name: SPENDGUARD_TOKENIZER_TLS_CA_PEM,            value: "/etc/spendguard/tls/ca.crt" }
            {{- end }}
          volumeMounts:
            # Round-2 fix M7: read-only rootfs requires /tmp writable for
            # any scratch + spilled state from tonic/h2.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.tokenizer.udsHostPath }}
            - name: uds
              mountPath: /var/run/spendguard
            {{- end }}
            {{- if .Values.tokenizer.mtlsSecretName }}
            - name: tls
              mountPath: /etc/spendguard/tls
              readOnly: true
            {{- end }}
            {{- if .Values.tokenizer.sinkMtlsSecretName }}
            # R2 B4: outbound mTLS material for canonical_ingest sink.
            - name: sink-tls
              mountPath: /etc/spendguard/sink-tls
              readOnly: true
            {{- end }}
            {{- if .Values.tokenizer.signingKeyPath }}
            # R2 B1: PKCS8 PEM key for Ed25519 drift_alert CloudEvent
            # signing. Mounted from a Secret named `signingKeySecretName`
            # at the path the SPENDGUARD_TOKENIZER_SIGNING_KEY_PATH env
            # points at.
            - name: signing-key
              mountPath: /etc/spendguard/signing
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.tokenizer.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.tokenizer.udsHostPath }}
        - name: uds
          hostPath:
            path: {{ .Values.tokenizer.udsHostPath | quote }}
            type: DirectoryOrCreate
        {{- end }}
        {{- if .Values.tokenizer.mtlsSecretName }}
        - name: tls
          secret:
            secretName: {{ .Values.tokenizer.mtlsSecretName | quote }}
        {{- end }}
        {{- if .Values.tokenizer.sinkMtlsSecretName }}
        - name: sink-tls
          secret:
            secretName: {{ .Values.tokenizer.sinkMtlsSecretName | quote }}
        {{- end }}
        {{- if .Values.tokenizer.signingKeySecretName }}
        - name: signing-key
          secret:
            secretName: {{ .Values.tokenizer.signingKeySecretName | quote }}
        {{- end }}
{{- /* Round-3 Backend Architect Finding N2 (Major): Service gating.

       Spec §2.1(a) — the tokenizer ships in two transport modes:
         * UDS hostPath (on-node sidecar callers; kernel-enforced trust)
         * TCP with mTLS (cross-node callers: Tier 1 shadow worker,
           output_predictor, calibration_report, SDK fallback)

       In UDS-only mode the pod binds the UDS socket and does NOT
       listen on TCP 50053 (main.rs:101-105 dispatches one or the
       other). Exposing a Service with `port: grpc → targetPort: grpc`
       under UDS-only mode would advertise a TCP endpoint that the
       pod immediately RSTs. Cross-node callers would see connection
       resets instead of a clean "TCP transport not configured" signal.

       Gate the entire Service block behind `not udsHostPath`:
         * UDS-only deploys     → no Service rendered. Operators
                                  mount the hostPath directly.
         * mTLS / plaintext     → Service rendered with grpc + metrics.

       Note: the /metrics endpoint runs on a separate hyper server
       inside the same pod and only binds TCP — Prometheus scrape via
       a separate Pod-targeted ServiceMonitor or annotations on the
       Deployment, NOT through this Service. This is consistent with
       services/canonical_ingest and services/ledger which do not
       expose /metrics via Service either.
    */ -}}
{{- if not .Values.tokenizer.udsHostPath }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spendguard.fullname" . }}-tokenizer
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - { name: grpc,    port: 50053, targetPort: grpc    }
    - { name: metrics, port: 9099,  targetPort: metrics }
  selector:
    {{- include "spendguard.selector" (merge (dict "component" $component) .) | nindent 4 }}
{{- else }}
# UDS-only deployment (udsHostPath is set): no TCP Service exposed.
# main.rs dispatches UDS xor TCP — when SPENDGUARD_TOKENIZER_UDS_PATH
# is set, the pod does NOT listen on TCP 50053, so rendering a
# Service would advertise an endpoint that the pod immediately RSTs.
#
# Per round-3 Backend Architect Finding N2 — cross-node callers
# (Tier 1 shadow worker, output_predictor) cannot reach a UDS-only
# tokenizer. Operators running multi-tier topologies must:
#   * deploy a SECOND tokenizer release with mtlsSecretName set
#     (different release name, no udsHostPath), OR
#   * leave udsHostPath empty and use mtlsSecretName for all callers.
# Setting both values on the same release results in UDS taking
# precedence (the pod binds UDS, ignores TCP) and is rejected here.
{{- end }}
{{- end }}
