{{- if .Values.canonicalIngest.enabled }}
{{- $component := "canonical-ingest" }}
{{- /* chart.profile=production: refuse the CHANGE_ME default that
       ships in values.yaml. Real connection string MUST be supplied. */ -}}
{{- if and (eq .Values.chart.profile "production") (contains "CHANGE_ME" .Values.postgres.canonicalUrl) -}}
{{- fail "postgres.canonicalUrl still contains the CHANGE_ME default; supply a real connection string under chart.profile=production" -}}
{{- end -}}
{{- /* Phase 5 GA hardening S8: strict signatures gate.
       production profile MUST run with strict mode on; flipping it
       off in production silently admits unsigned events. */ -}}
{{- if and (eq .Values.signing.profile "production") (not .Values.signing.strictVerification) }}
{{- fail "S8: signing.profile=production requires signing.strictVerification=true (set strictVerification=true or change profile to demo)" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spendguard.fullname" . }}-canonical-ingest
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  replicas: {{ .Values.canonicalIngest.replicas }}
  selector:
    matchLabels:
      {{- include "spendguard.selector" (merge (dict "component" $component) .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 8 }}
    spec:
      containers:
        - name: canonical-ingest
          image: {{ include "spendguard.image" (merge (dict "image" .Values.canonicalIngest.image "global" .Values.global) .) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - { name: grpc, containerPort: 50052 }
            - { name: metrics, containerPort: 9091 }
          env:
            - { name: SPENDGUARD_CANONICAL_INGEST_BIND_ADDR,    value: "0.0.0.0:50052" }
            - { name: SPENDGUARD_CANONICAL_INGEST_DATABASE_URL, value: {{ .Values.postgres.canonicalUrl | quote }} }
            # Round-2 #3: canonical_ingest Config::from_env() requires
            # REGION + INGEST_SHARD_ID (no defaults). The (region,
            # ingest_shard_id) tuple is the canonical ordering scope
            # per Trace §10.5; missing either → CrashLoopBackOff.
            # The chart's earlier TENANT_ID env was extraneous —
            # canonical_ingest is multi-tenant at the row level, not
            # per-instance, so the binary's Config doesn't read it.
            - { name: SPENDGUARD_CANONICAL_INGEST_REGION,          value: {{ .Values.global.region | quote }} }
            - { name: SPENDGUARD_CANONICAL_INGEST_INGEST_SHARD_ID, value: {{ .Values.canonicalIngest.ingestShardId | quote }} }
            - { name: SPENDGUARD_CANONICAL_INGEST_TLS_CERT_PEM, value: "/etc/ssl/spendguard/canonical-ingest.crt" }
            - { name: SPENDGUARD_CANONICAL_INGEST_TLS_KEY_PEM,  value: "/etc/ssl/spendguard/canonical-ingest.key" }
            - { name: SPENDGUARD_CANONICAL_INGEST_TLS_CA_PEM,   value: "/etc/ssl/spendguard/ca.crt" }
            # Phase 5 GA hardening S8: strict signature verification.
            - { name: SPENDGUARD_CANONICAL_INGEST_STRICT_SIGNATURES, value: {{ .Values.signing.strictVerification | quote }} }
            - { name: SPENDGUARD_CANONICAL_INGEST_TRUST_STORE_DIR,   value: "/etc/spendguard/trust-store" }
            - { name: SPENDGUARD_CANONICAL_INGEST_METRICS_ADDR,      value: "0.0.0.0:9091" }
          volumeMounts:
            - { name: tls, mountPath: /etc/ssl/spendguard, readOnly: true }
            - { name: trust-store, mountPath: /etc/spendguard/trust-store, readOnly: true }
          resources:
            {{- toYaml .Values.canonicalIngest.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.secrets.tls.existingSecret }}
        - name: trust-store
          secret:
            secretName: {{ .Values.signing.existingSecret }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spendguard.fullname" . }}-canonical-ingest
  labels:
    {{- include "spendguard.componentLabels" (merge (dict "component" $component) .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - { name: grpc, port: 50052, targetPort: grpc }
  selector:
    {{- include "spendguard.selector" (merge (dict "component" $component) .) | nindent 4 }}
{{- end }}
