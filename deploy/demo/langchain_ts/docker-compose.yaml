# D04 SLICE 5 (`DEMO_MODE=langchain_ts`) — sidecar compose overlay.
#
# This compose file is layered on top of `deploy/demo/compose.yaml` via
# `docker compose -f deploy/demo/compose.yaml -f deploy/demo/langchain_ts/docker-compose.yaml up`.
# The Makefile DEMO_MODE=langchain_ts branch does that for you.
#
# It declares the TWO services this demo mode needs on top of the base
# postgres + sidecar + ledger + outbox-forwarder stack:
#
#   counting-stub      mock OpenAI /v1/chat/completions provider that
#                      counts calls per HTTP hit. Same image + script
#                      as deploy/demo/envoy_extproc/docker-compose.yaml.
#
#   langchain-runner   Node 20 container that pre-builds @spendguard/sdk
#                      + @spendguard/langchain from the workspace + runs
#                      examples/langchain-ts/index.mjs against the
#                      sidecar UDS. Mirrors the D11/6 `demo-langchain-ts`
#                      pattern: build context = workspace root so the
#                      already-built dist/ artefacts can be vendored
#                      without re-running tsup at image build time.
#
# All services join the `spendguard-demo_spendguard-net` network so they
# can reach `sidecar` and the `spendguard-postgres` healthcheck graph
# from the parent compose.
#
# Anti-scope: this overlay does NOT redeclare postgres, sidecar, ledger,
# canonical-ingest, bundles-init, pki-init or any other base service —
# the Makefile target brings up the base stack first, then this overlay.
name: spendguard-demo

services:
  # ── counting-stub ────────────────────────────────────────────────────
  # In-network mock OpenAI provider. Counts every POST /v1/chat/completions
  # and returns a fixed `usage` block with non-zero completion_tokens so
  # the audit chain has a real provider amount to reconcile.
  #
  # Identical to deploy/demo/envoy_extproc/docker-compose.yaml's
  # counting-stub — by-value duplicated so the overlays remain independent
  # (avoids hidden cross-file dependency).
  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, time, sys
        HITS = {"calls": 0}

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                _ = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404)
                    self.end_headers()
                    return
                HITS["calls"] += 1
                body = {
                    "id": f"chatcmpl-counting-{HITS['calls']}",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "gpt-4o-mini",
                    "choices": [{
                        "index": 0,
                        "message": {"role": "assistant",
                                    "content": "hi from counting stub"},
                        "finish_reason": "stop",
                    }],
                    "usage": {"prompt_tokens": 5,
                              "completion_tokens": 7,
                              "total_tokens": 12},
                    "_counting_stub_hits": HITS["calls"],
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(HITS["calls"]))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok")
                    return
                self.send_response(404)
                self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[counting-stub] {self.command} {self.path} -> "
                    f"hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  # ── langchain-runner ─────────────────────────────────────────────────
  # Node 20 container that vendors the workspace-built `@spendguard/sdk`
  # + `@spendguard/langchain` dist artefacts into a self-contained
  # node_modules tree, then runs `examples/langchain-ts/index.mjs`.
  #
  # Pre-built dist mounts (instead of `pnpm install`) keep the image
  # build deterministic and offline-capable; the demo-as-quality-gate
  # principle (project memory) demands the wire shape match what the
  # production publish bundle ships. SLICE 4 already keeps the dist/
  # bundle current via `pnpm run build`.
  #
  # The container blocks on `sidecar` + `counting-stub` health and
  # exits non-zero if any of the 3 demo steps fail.
  langchain-runner:
    image: node:20.10-bookworm-slim
    container_name: spendguard-langchain-runner
    # Demo-only: run as root inside the container so the named-volume
    # node_modules tree (mounted by docker as root-owned) is writable.
    # Production deployments of `@spendguard/langchain` run under the
    # consumer's own runtime; the adapter itself never touches the
    # filesystem at runtime. The base sidecar / ledger / runner
    # production images keep their non-root posture.
    working_dir: /opt/spendguard/examples/langchain-ts
    environment:
      # SpendGuard sidecar wiring — identical to the Python demo container.
      SPENDGUARD_SIDECAR_UDS: "/var/run/spendguard/adapter.sock"
      SPENDGUARD_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID: "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION: "demo-pricing-v1"
      SPENDGUARD_HANDSHAKE_TIMEOUT_MS: "30000"
      # ChatOpenAI is pointed at the in-network counting stub. The
      # counting stub ignores the auth header but the OpenAI SDK refuses
      # to construct without a non-empty key, hence the placeholder.
      OPENAI_BASE_URL: "http://counting-stub:8765/v1"
      OPENAI_API_KEY: "demo-counting-stub-no-real-key"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
    # The container mounts the workspace read-only (so the host stays
    # the source of truth) and stages the example to a writable tmpfs
    # at /tmp/langchain-ts-stage where `npm install` runs cleanly.
    # Keeping the workspace read-only avoids accidental host writes
    # and matches the security posture of the other compose services
    # (egress-proxy, cost-advisor-demo).
    volumes:
      # Workspace source — read-only.
      - ../..:/opt/spendguard:ro
      # Sidecar UDS shared with the rest of the stack.
      - sidecar-uds:/var/run/spendguard
      # Writable node_modules persistence across re-runs (named volume,
      # not mounted inside the read-only workspace tree). The entrypoint
      # uses this as the install target via a symlink from the staging
      # directory.
      - langchain-runner-modules:/var/lib/langchain-runner/node_modules
    tmpfs:
      - /tmp
      - /home/node/.npm
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        # NOTE: every $ that should reach the container shell at runtime
        # (not be interpolated by docker compose at parse time) is
        # written as $$ in this YAML literal. Plain $ would be eaten by
        # compose's env-substitution layer (see `docker compose config`).

        echo "[langchain-runner] node $$(node --version) npm $$(npm --version)"

        # The workspace mount is read-only; we cannot `npm install`
        # directly into it. Instead, stage a writable copy of the
        # example into /tmp (small — 3 files) and resolve the SpendGuard
        # halves via `file:` deps against the read-only mount's
        # pre-built dist artefacts.
        STAGING=/tmp/langchain-ts-stage
        mkdir -p "$$STAGING"
        cp /opt/spendguard/examples/langchain-ts/package.json "$$STAGING/"
        cp /opt/spendguard/examples/langchain-ts/index.mjs "$$STAGING/"

        # Wire the staging dir's node_modules to the named volume so
        # repeated runs reuse the install. The named volume mounts at
        # /var/lib/langchain-runner/node_modules (writable); symlink it
        # into the staging tree so `npm install` lands there.
        mkdir -p /var/lib/langchain-runner/node_modules
        ln -sf /var/lib/langchain-runner/node_modules "$$STAGING/node_modules"

        cd "$$STAGING"

        # Override the published-version deps with `file:` references
        # to the in-tree workspace builds — this is what `examples/`
        # idiomatically does to track the workspace head without a
        # `npm link` dance. The original published-name imports in
        # index.mjs still resolve through node_modules because both
        # workspace packages keep their published `name` in package.json.
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.dependencies['@spendguard/sdk'] = 'file:/opt/spendguard/sdk/typescript';
          pkg.dependencies['@spendguard/langchain'] = 'file:/opt/spendguard/sdk/typescript-langchain';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
        "

        echo "[langchain-runner] installing example deps..."
        npm install --no-audit --no-fund --no-package-lock --loglevel=warn

        echo "[langchain-runner] sidecar UDS ready check..."
        for i in $$(seq 1 60); do
          if [ -S "$$SPENDGUARD_SIDECAR_UDS" ]; then
            echo "[langchain-runner] sidecar UDS visible at $$SPENDGUARD_SIDECAR_UDS"
            break
          fi
          sleep 1
        done

        echo "[langchain-runner] launching index.mjs..."
        exec node index.mjs
    depends_on:
      sidecar:
        condition: service_healthy
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [langchain-runner]

volumes:
  langchain-runner-modules:
