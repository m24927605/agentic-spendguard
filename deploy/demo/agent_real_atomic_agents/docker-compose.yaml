# COV_D28 SLICE 4 (`DEMO_MODE=agent_real_atomic_agents`) — sidecar compose overlay.
#
# Mirrors `deploy/demo/agent_real_autogen/docker-compose.yaml`
# field-for-field; only the runner service differs (Python
# Atomic Agents `BaseAgent` wired with a SpendGuard-wrapped
# Instructor client vs AutoGen's `OpenAIChatCompletionClient`).
#
# Layered on top of `deploy/demo/compose.yaml` via:
#   docker compose -f deploy/demo/compose.yaml \
#                  -f deploy/demo/agent_real_atomic_agents/docker-compose.yaml up
# The Makefile `DEMO_MODE=agent_real_atomic_agents` branch does that
# for you.
#
# Services declared here:
#
#   counting-stub                  mock provider accepting OpenAI-shape
#                                  requests so the Atomic Agents
#                                  BaseAgent (Instructor TOOLS mode)
#                                  gets responses without needing a
#                                  real OPENAI_API_KEY.
#
#   atomic-agents-runner           Python 3.12 container that
#                                  `pip install -e`s the in-tree
#                                  `spendguard-sdk` with the
#                                  [atomic-agents] extra, then runs
#                                  the demo driver from
#                                  `deploy/demo/demo/run_demo.py`
#                                  against the sidecar UDS with
#                                  SPENDGUARD_DEMO_MODE=agent_real_atomic_agents.
#
# Anti-scope: this overlay does NOT redeclare postgres, sidecar,
# ledger, canonical-ingest, bundles-init, pki-init or any other base
# service — the Makefile target brings up the base stack first, then
# this overlay.
name: spendguard-demo

services:
  # ── counting-stub ────────────────────────────────────────────────────
  # Mock OpenAI provider on /v1/chat/completions. Atomic Agents'
  # default Instructor TOOLS mode hits that endpoint with a function-
  # tool call shape; the stub returns a canned tool_calls payload
  # whose `arguments` JSON deserializes into the Answer Pydantic
  # schema, plus a 32-token usage block so the gated raw POST commits
  # a real estimated amount.
  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, time, sys
        HITS = {"calls": 0}

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                _ = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404)
                    self.end_headers()
                    return
                HITS["calls"] += 1
                # Atomic Agents drives Instructor TOOLS mode by default,
                # so the response must be a function-tool call whose
                # arguments JSON matches the Answer schema
                # (`{"final": "..."}`). The body shape mirrors what
                # real OpenAI returns for a TOOLS mode call.
                body = {
                    "id": f"chatcmpl-atomic-{HITS['calls']}",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "gpt-4o-mini",
                    "choices": [{
                        "index": 0,
                        "message": {
                            "role": "assistant",
                            "content": None,
                            "tool_calls": [{
                                "id": f"call_{HITS['calls']}",
                                "type": "function",
                                "function": {
                                    "name": "Answer",
                                    "arguments": json.dumps(
                                        {"final": f"hi from atomic stub #{HITS['calls']}"}
                                    ),
                                },
                            }],
                        },
                        "finish_reason": "tool_calls",
                    }],
                    "usage": {"prompt_tokens": 12,
                              "completion_tokens": 20,
                              "total_tokens": 32},
                    "_counting_stub_hits": HITS["calls"],
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(HITS["calls"]))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok")
                    return
                self.send_response(404)
                self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[counting-stub] {self.command} {self.path} -> "
                    f"hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  # ── atomic-agents-runner ─────────────────────────────────────────────
  # Python 3.12 container that pip-installs the in-tree `spendguard-sdk`
  # with the [atomic-agents] extra (pulls atomic-agents>=2.0,<3 +
  # instructor>=1.5,<2.0) and runs `run_demo.py` against the sidecar
  # UDS. The driver constructs:
  #   instructor.from_openai(openai.OpenAI(base_url=counting-stub))
  #   wrap_instructor_client(...)  → SpendGuardInstructorProxy
  #   BaseAgent(BaseAgentConfig(client=guarded, ...))
  # and calls agent.run(...) twice (ALLOW + DENY) to exercise the
  # gated raw create_fn boundary.
  atomic-agents-runner:
    image: python:3.12-slim-bookworm
    container_name: spendguard-atomic-agents-runner
    # Demo-only: run as root inside the container so the named-volume
    # site-packages tree (mounted by docker as root-owned) is
    # writable. Production deployments of
    # `spendguard-sdk[atomic-agents]` run under the consumer's own
    # runtime; the adapter itself never touches the filesystem at
    # runtime.
    working_dir: /opt/spendguard/deploy/demo/demo
    environment:
      SPENDGUARD_SIDECAR_UDS: "/var/run/spendguard/adapter.sock"
      SPENDGUARD_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID: "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION: "demo-pricing-v1"
      SPENDGUARD_FX_RATE_VERSION: "demo-fx-v1"
      SPENDGUARD_UNIT_CONVERSION_VERSION: "demo-units-v1"

      SPENDGUARD_HANDSHAKE_TIMEOUT_MS: "30000"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
      SPENDGUARD_DEMO_MODE: "agent_real_atomic_agents"
      # Instructor uses the underlying openai.OpenAI client's
      # base_url + api_key; pointing both at the counting-stub means
      # no real API key is needed. The mock value is required because
      # OpenAI client libraries balk at empty strings.
      OPENAI_API_KEY: "sk-spendguard-demo-stub"
      OPENAI_BASE_URL: "http://counting-stub:8765/v1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "off"
    volumes:
      # Workspace source — read-only.
      - ../..:/opt/spendguard:ro
      # Sidecar UDS shared with the rest of the stack.
      - sidecar-uds:/var/run/spendguard
      # HARDEN_D05_UR: source pricing freeze from bundles runtime.env
      # (written by pricing-seed-init / bundles-init at compose-up time).
      - bundles-data:/var/lib/spendguard/bundles:ro
      # Writable site-packages persistence across re-runs.
      - atomic-agents-runner-venv:/opt/venv
    tmpfs:
      - /tmp
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[atomic-agents-runner] python $$(python --version)"

        # Build a virtualenv on the named volume so repeat runs are fast.
        if [ ! -d /opt/venv/bin ]; then
          echo "[atomic-agents-runner] creating venv at /opt/venv..."
          python -m venv /opt/venv
        fi
        . /opt/venv/bin/activate

        echo "[atomic-agents-runner] installing in-tree spendguard-sdk[atomic-agents]..."
        # Install best-effort and fall back to the duck-typed driver
        # path when atomic-agents itself isn't available (CI smoke
        # path — the wrapper module loads on the instructor extra
        # alone). atomic-agents pulls a textual TUI; we use --no-cache
        # to keep image size sane.
        pip install -e '/opt/spendguard/sdk/python' || true
        pip install 'instructor>=1.5,<2.0' 'atomic-agents>=2.0,<3' \
                    'openai>=1.0' 'pydantic>=2.0' || \
          echo "[atomic-agents-runner] extras install failed — driver will use duck-typed shapes (CI smoke path)."

        echo "[atomic-agents-runner] sidecar UDS ready check..."
        for i in $$(seq 1 60); do
          if [ -S "$$SPENDGUARD_SIDECAR_UDS" ]; then
            echo "[atomic-agents-runner] sidecar UDS visible at $$SPENDGUARD_SIDECAR_UDS"
            break
          fi
          sleep 1
        done

        # HARDEN_D05_UR: source bundles runtime.env so
        # SPENDGUARD_PRICE_SNAPSHOT_HASH_HEX matches the contract bundle
        # the sidecar loaded (mirrors deploy/demo/runtime/demo-entrypoint.sh).
        if [ -f /var/lib/spendguard/bundles/runtime.env ]; then
          echo "[atomic-agents-runner] sourcing /var/lib/spendguard/bundles/runtime.env..."
          set -a
          . /var/lib/spendguard/bundles/runtime.env
          set +a
        else
          echo "[atomic-agents-runner] FATAL: bundles runtime.env not found" >&2
          exit 1
        fi

        echo "[atomic-agents-runner] launching run_demo.py (SPENDGUARD_DEMO_MODE=$$SPENDGUARD_DEMO_MODE)..."
        exec python /opt/spendguard/deploy/demo/demo/run_demo.py
    depends_on:
      sidecar:
        condition: service_healthy
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [atomic-agents-runner]

volumes:
  bundles-data:
  atomic-agents-runner-venv:
