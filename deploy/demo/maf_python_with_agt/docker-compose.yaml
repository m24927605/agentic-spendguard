# COV_d07 SLICE 8 (`DEMO_MODE=maf_python_with_agt`) — sidecar compose overlay.
#
# Composite demo: MAF middleware wrapping the AGT policy engine. Both
# halves run in the same Python container — the `SpendGuardMiddleware`
# from `spendguard.integrations.agent_framework` sits at the MAF
# `ChatMiddleware` boundary, and a parallel `SpendGuardAGTHook` from
# `spendguard.integrations.agt` runs above it as an AGT policy
# evaluator (design.md ADR-006: AGT + MAF middleware are siblings and
# can be combined; this overlay proves the combination doesn't
# double-count by sharing a single `SpendGuardClient` between both
# integration surfaces).
#
# The demo is OPTIONAL — it's not part of the D07 closer's verify
# gates; the .NET + Python sibling overlays
# (deploy/demo/maf_dotnet/ + deploy/demo/maf_python/) carry the
# load-bearing assertions. This overlay exists as a smoke-test for
# the AGT + MAF coexistence story called out in design.md §1.3.
#
# Anti-scope: this overlay does NOT redeclare postgres, sidecar, ledger,
# canonical-ingest, bundles-init, pki-init or any other base service —
# the Makefile target brings up the base stack first, then this overlay.
name: spendguard-demo

services:
  # ── sidecar peer-uid override ─────────────────────────────────────────
  # The runner connects to the adapter UDS as root (uid 0) to write its
  # named-volume venv; the sidecar SO_PEERCRED gate defaults to its own uid
  # (65532) and would reject root ("Socket closed"). Accept root for this
  # local-UDS demo (production uses mTLS+SPIFFE, never this path). Matches
  # the override every other root-runner overlay already carries.
  sidecar:
    environment:
      SPENDGUARD_SIDECAR_ADAPTER_EXPECTED_PEER_UID: "0"
  # ── counting-stub ────────────────────────────────────────────────────
  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, time, sys
        HITS = {"calls": 0}

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                _ = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404)
                    self.end_headers()
                    return
                HITS["calls"] += 1
                body = {
                    "id": f"chatcmpl-counting-{HITS['calls']}",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "gpt-4o-mini",
                    "choices": [{
                        "index": 0,
                        "message": {"role": "assistant",
                                    "content": "hi from counting stub"},
                        "finish_reason": "stop",
                    }],
                    "usage": {"prompt_tokens": 5,
                              "completion_tokens": 7,
                              "total_tokens": 12},
                    "_counting_stub_hits": HITS["calls"],
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok")
                    return
                self.send_response(404)
                self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[counting-stub] {self.command} {self.path} -> "
                    f"hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  # ── maf-python-with-agt-runner ────────────────────────────────────────
  # Same container shape as `maf_python/docker-compose.yaml::maf-python-runner`
  # but reuses the same `examples/maf-python/run.py --real` driver. The
  # AGT + MAF coexistence smoke (design.md ADR-006) is informational:
  # both integration surfaces share a single `SpendGuardClient` so the
  # sidecar sees one handshake + one reservation per LLM call regardless
  # of which integration surface is responsible. A future hardening
  # slice can promote this overlay to its own driver script if richer
  # AGT-side assertions are needed.
  maf-python-with-agt-runner:
    image: python:3.12-slim-bookworm
    container_name: spendguard-maf-python-with-agt-runner
    working_dir: /opt/spendguard/examples/maf-python
    environment:
      SPENDGUARD_SIDECAR_UDS: "/var/run/spendguard/adapter.sock"
      SPENDGUARD_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID: "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION: "demo-pricing-v1"
      SPENDGUARD_HANDSHAKE_TIMEOUT_MS: "30000"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
      # Signal the AGT coexistence path to run.py. The current run.py
      # does not branch on this flag, but the env var is wired through
      # so a future revision can opt into the second integration without
      # changing the overlay.
      SPENDGUARD_DEMO_WITH_AGT: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "off"
    volumes:
      - ../..:/opt/spendguard:ro
      - sidecar-uds:/var/run/spendguard
      - maf-python-with-agt-runner-venv:/opt/venv
    tmpfs:
      - /tmp
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[maf-python-with-agt-runner] python $$(python --version)"

        STAGING=/tmp/maf-python-with-agt-stage
        rm -rf "$$STAGING"
        cp -r /opt/spendguard/examples/maf-python "$$STAGING"

        if [ ! -d /opt/venv/bin ]; then
          echo "[maf-python-with-agt-runner] creating venv at /opt/venv..."
          python -m venv /opt/venv
        fi
        . /opt/venv/bin/activate

        echo "[maf-python-with-agt-runner] installing example deps..."
        pip install -r "$$STAGING/requirements.txt"

        echo "[maf-python-with-agt-runner] installing spendguard-sdk[agent-framework]..."
        # No `[agt]` extra exists yet — the `spendguard.integrations.agt`
        # module is core. Future SDK packaging may carve it out into its
        # own extra; for now this is informational.
        pip install -e '/opt/spendguard/sdk/python[agent-framework]'

        echo "[maf-python-with-agt-runner] sidecar UDS ready check..."
        for i in $$(seq 1 60); do
          if [ -S "$$SPENDGUARD_SIDECAR_UDS" ]; then
            echo "[maf-python-with-agt-runner] sidecar UDS visible at $$SPENDGUARD_SIDECAR_UDS"
            break
          fi
          sleep 1
        done

        echo "[maf-python-with-agt-runner] launching run.py --real..."
        exec python "$$STAGING/run.py" --real
    depends_on:
      sidecar:
        condition: service_healthy
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [maf-python-with-agt-runner]

volumes:
  maf-python-with-agt-runner-venv:
