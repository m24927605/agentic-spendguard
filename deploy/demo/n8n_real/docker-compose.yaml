# D37 SLICE 5 (`DEMO_MODE=n8n_real`) — sidecar compose overlay.
#
# Mirrors deploy/demo/botpress_real/docker-compose.yaml field-for-field —
# only the runner service differs (the n8n integration's supplyData hook
# delegates via the SpendGuard sidecar HTTP companion at /v1/decision +
# /v1/trace, the same wire shape the Botpress + Inngest runners exercise).
#
# Layered on top of `deploy/demo/compose.yaml` via
# `docker compose -f deploy/demo/compose.yaml \
#                 -f deploy/demo/n8n_real/docker-compose.yaml up`.
# The Makefile DEMO_MODE=n8n_real branch does that for you.
#
# DEVIATION (D37 SLICE 5 vs implementation.md §8): implementation.md §8
# Slice 5 calls for a full n8n v1.50 self-host (n8nio/n8n:1.50.1, ~600 MB
# image + ~30s boot). The D37 review-standards.md §8.3 says the
# integration tier MUST exercise a real n8n runtime; that gate lives in
# CI via testcontainers-node. The demo focuses on the integration's
# reserve/commit/release lifecycle — the same lifecycle the v1.50 runtime
# exercises via supplyData, just driven via a focused 3-step Node runner.
# INV-1 / INV-2 / INV-5 are all verifiable from the focused runner; the
# full v1.50 runtime adds no new invariants over the integration tier
# (see deploy/demo/botpress_real for the parallel rationale).
name: spendguard-demo

services:
  sidecar:
    # Demo Node runner connects to the adapter UDS as root (uid 0) to write
    # its node_modules named volume; the sidecar SO_PEERCRED gate defaults to
    # its own uid (65532) and would reject it. Accept root for this demo.
    # Production uses mTLS+SPIFFE, never this local-UDS path.
    environment:
      SPENDGUARD_SIDECAR_ADAPTER_EXPECTED_PEER_UID: "0"
  # ── counting-stub ────────────────────────────────────────────────────
  # In-network mock OpenAI / Anthropic provider. Identical to the
  # botpress_real / inngest_agent_kit overlays' counting-stub.
  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-n8n-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, time, sys
        HITS = {"calls": 0}

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                _ = self.rfile.read(length)
                if not (self.path.startswith("/v1/chat/completions")
                        or self.path.startswith("/v1/messages")
                        or self.path.startswith("/model/")):
                    self.send_response(404); self.end_headers(); return
                HITS["calls"] += 1
                body = {
                    "id": f"chatcmpl-n8n-{HITS['calls']}",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "gpt-4o-mini",
                    "choices": [{
                        "index": 0,
                        "message": {"role": "assistant",
                                    "content": "hi from n8n demo"},
                        "finish_reason": "stop",
                    }],
                    "usage": {"prompt_tokens": 5,
                              "completion_tokens": 7,
                              "total_tokens": 12,
                              "inputTokens": 5,
                              "outputTokens": 7},
                    "_counting_stub_hits": HITS["calls"],
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(HITS["calls"]))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body); return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok"); return
                self.send_response(404); self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[n8n-counting-stub] {self.command} {self.path} -> "
                    f"hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[n8n-counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  # ── n8n-integration-runner ───────────────────────────────────────────
  # Node 20 container that exercises the n8n-nodes-spendguard reserve/
  # commit lifecycle by invoking the SpendGuard sidecar HTTP companion
  # directly. Same code path the n8n v1.50 runtime would drive when the
  # SpendGuardChatModel node calls into D04's callback handler at AI
  # Agent invocation time, just without the full n8n editor bringup.
  n8n-integration-runner:
    image: node:20.10-bookworm-slim
    container_name: spendguard-n8n-integration-runner
    user: "0:0"
    working_dir: /opt/spendguard/deploy/demo/n8n_real
    environment:
      SPENDGUARD_N8N_SIDECAR_URL: "http://sidecar:8443"
      SPENDGUARD_N8N_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_N8N_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_N8N_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../..:/opt/spendguard:ro
      - sidecar-uds:/var/run/spendguard
    tmpfs:
      - /tmp
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[n8n-integration-runner] node $$(node --version)"
        STAGING=/tmp/n8n-stage
        mkdir -p "$$STAGING"
        cp /opt/spendguard/deploy/demo/n8n_real/run_n8n_demo.mjs "$$STAGING/"
        echo "[n8n-integration-runner] running 3-step matrix..."
        cd "$$STAGING"
        exec node run_n8n_demo.mjs
    depends_on:
      counting-stub:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [n8n-integration-runner]
