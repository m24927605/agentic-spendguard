# D18 SLICE 82 (`DEMO_MODE=windsurf_mitm_fixture`) — sidecar compose overlay.
#
# This compose file is layered on top of `deploy/demo/compose.yaml` via
# `docker compose -f deploy/demo/compose.yaml \
#                 -f deploy/demo/windsurf_mitm_fixture/docker-compose.yaml up`.
# The Makefile DEMO_MODE=windsurf_mitm_fixture branch does that for you.
#
# Two new services scoped to this demo mode:
#
#   counting-stub                      mock OpenAI /v1/chat/completions
#                                      provider; identical shape to the
#                                      stub the cursor_mitm_fixture demo uses.
#
#   windsurf-mitm-fixture-runner       Rust container that compiles +
#                                      runs `services/windsurf_codec`'s
#                                      `windsurf_mitm_fixture_demo`
#                                      example. The example loads each
#                                      of the six SLICE 80 synthetic
#                                      `.windsurf-rpc` fixtures, replays
#                                      them through `replay_fixture`,
#                                      and POSTs the translated OpenAI
#                                      canonical body to the counting
#                                      stub once per success fixture.
#
# # CRITICAL LEGAL POSTURE NOTE
#
# This demo intentionally does NOT boot the Windsurf IDE binary, does
# NOT touch `server.codeium.com` / `windsurf-server.codeium.com`, and
# does NOT capture any live Cascade session. Per `design.md` §1 /
# `SOW.md` §5 the codec is an EXPERIMENTAL reverse-engineered interop
# and the SOW customer acknowledges break-window risk. Live exercise
# of the codec against Cascade traffic happens only in SOW-customer
# deployments under the customer's own legal sign-off, not in this
# demo.
#
# Anti-scope: this overlay does NOT redeclare postgres, sidecar,
# ledger, canonical-ingest, bundles-init, pki-init or any other base
# service. The Makefile target brings up the base stack first, then
# this overlay.

name: spendguard-demo

services:
  # ── counting-stub ────────────────────────────────────────────────────
  # In-network mock OpenAI provider. Verbatim from the cursor_mitm /
  # dify / kong demos so the codec's translated request shape gets a
  # stable mock-upstream to land against.
  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-windsurf-mitm-fixture-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, time, sys
        HITS = {"calls": 0}

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                _ = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404); self.end_headers(); return
                HITS["calls"] += 1
                body = {
                    "id": f"chatcmpl-windsurf-{HITS['calls']}",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "gpt-4o",
                    "choices": [{
                        "index": 0,
                        "message": {"role": "assistant",
                                    "content": "hi from windsurf mitm fixture demo"},
                        "finish_reason": "stop",
                    }],
                    "usage": {"prompt_tokens": 5,
                              "completion_tokens": 7,
                              "total_tokens": 12},
                    "_counting_stub_hits": HITS["calls"],
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(HITS["calls"]))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body); return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok"); return
                self.send_response(404); self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[windsurf-mitm-counting-stub] {self.command} {self.path} -> "
                    f"hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[windsurf-mitm-counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  # ── windsurf-mitm-fixture-runner ────────────────────────────────────
  # Rust container that compiles + runs the
  # `windsurf_mitm_fixture_demo` example out of the in-tree
  # `services/windsurf_codec` crate. The example asserts:
  #
  #   - 6 fixtures replay cleanly through the codec.
  #   - 4 mock-sidecar reserves fire (3 success + 1 error fixture).
  #   - 3 mock-sidecar commits fire (success fixtures only).
  #   - 1 upstream error short-circuits commit (error fixture).
  #   - 1 unsupported wire version exercises the gate (cascade.v9.9).
  #   - 1 decoder_skipped fixture exercises pass-through fallback.
  #   - byte-for-byte round-trip preservation across the corpus.
  #   - 4 counting-stub POSTs land (upstream-forward path wired —
  #     1 per fixture whose translated request decoded).
  #
  # The runner uses Rust's std-library HTTP/1.1 over TCP to hit the
  # counting stub; no extra Rust deps are needed.
  windsurf-mitm-fixture-runner:
    image: rust:1.87-slim
    container_name: spendguard-windsurf-mitm-fixture-runner
    user: "0:0"
    environment:
      SPENDGUARD_WINDSURF_MITM_DEMO_COUNTING_STUB_URL: "http://counting-stub:8765"
      SPENDGUARD_WINDSURF_MITM_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_EXPERIMENTAL_CODECS: "1"
      CARGO_TERM_COLOR: "never"
      RUST_LOG: "info"
    volumes:
      - ../..:/workspace
    working_dir: /workspace
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        echo "[windsurf-mitm-fixture-runner] installing protobuf-compiler + curl..."
        apt-get update >/dev/null && \
          apt-get install -y --no-install-recommends \
            protobuf-compiler libprotobuf-dev curl ca-certificates \
            >/dev/null
        # build.rs uses tonic-build, which looks for google/protobuf
        # well-known files via PROTOC_INCLUDE. apt's libprotobuf-dev
        # installs them under /usr/include/google/protobuf.
        export PROTOC_INCLUDE=/usr/include
        echo "[windsurf-mitm-fixture-runner] running windsurf_mitm_fixture_demo..."
        cargo run --manifest-path services/windsurf_codec/Cargo.toml \
          --features mitm \
          --example windsurf_mitm_fixture_demo
        echo "[windsurf-mitm-fixture-runner] PASS"
    depends_on:
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [windsurf-mitm-fixture-runner]
