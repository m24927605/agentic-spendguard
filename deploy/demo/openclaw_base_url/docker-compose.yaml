# COV_D40A_01 (`DEMO_MODE=openclaw_base_url`) - OpenClaw base-URL recipe demo.
#
# Layer this file on top of deploy/demo/compose.yaml. The base stack starts
# postgres + ledger + canonical-ingest + sidecar + egress-proxy. This overlay
# adds a local OpenAI-compatible counting stub, points the proxy upstream at
# that stub, and runs a Node 22 config-fixture runner that validates the
# OpenClaw custom provider config before driving ALLOW + DENY + STREAM.
name: spendguard-demo

services:
  bundles-init:
    environment:
      DEMO_HARD_CAP_CLAIM_AMOUNT_ATOMIC_GT: "100"

  egress-proxy:
    environment:
      SPENDGUARD_PROXY_OPENAI_BASE_URL: "http://counting-stub:8765/v1"
    depends_on:
      sidecar:
        condition: service_healthy
      counting-stub:
        condition: service_healthy

  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, sys, time
        HITS = {"calls": 0}

        def stream_event(obj):
            return ("data: " + json.dumps(obj, separators=(",", ":")) + "\n\n").encode()

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                raw = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404)
                    self.end_headers()
                    return
                try:
                    req = json.loads(raw.decode() or "{}")
                except Exception:
                    req = {}
                HITS["calls"] += 1
                call_id = HITS["calls"]
                created = int(time.time())
                model = req.get("model") or "gpt-4o-mini"
                usage = {"prompt_tokens": 5, "completion_tokens": 7, "total_tokens": 12}
                if req.get("stream") is True:
                    self.send_response(200)
                    self.send_header("Content-Type", "text/event-stream")
                    self.send_header("Cache-Control", "no-cache")
                    self.send_header("x-counting-stub-hits", str(call_id))
                    self.end_headers()
                    frames = [
                        {
                            "id": f"chatcmpl-counting-{call_id}",
                            "object": "chat.completion.chunk",
                            "created": created,
                            "model": model,
                            "choices": [{
                                "index": 0,
                                "delta": {"role": "assistant"},
                                "finish_reason": None,
                            }],
                        },
                        {
                            "id": f"chatcmpl-counting-{call_id}",
                            "object": "chat.completion.chunk",
                            "created": created,
                            "model": model,
                            "choices": [{
                                "index": 0,
                                "delta": {"content": "hi from "},
                                "finish_reason": None,
                            }],
                        },
                        {
                            "id": f"chatcmpl-counting-{call_id}",
                            "object": "chat.completion.chunk",
                            "created": created,
                            "model": model,
                            "choices": [{
                                "index": 0,
                                "delta": {"content": "counting stub"},
                                "finish_reason": "stop",
                            }],
                            "usage": usage,
                        },
                    ]
                    for frame in frames:
                        self.wfile.write(stream_event(frame))
                        self.wfile.flush()
                    self.wfile.write(b"data: [DONE]\n\n")
                    self.wfile.flush()
                    return

                body = {
                    "id": f"chatcmpl-counting-{call_id}",
                    "object": "chat.completion",
                    "created": created,
                    "model": model,
                    "choices": [{
                        "index": 0,
                        "message": {
                            "role": "assistant",
                            "content": "hi from counting stub",
                        },
                        "finish_reason": "stop",
                    }],
                    "usage": usage,
                    "_counting_stub_hits": call_id,
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(call_id))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok")
                    return
                self.send_response(404)
                self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[counting-stub] {self.command} {self.path} -> hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  openclaw-runner:
    image: node:22-bookworm-slim
    container_name: spendguard-openclaw-runner
    working_dir: /opt/spendguard/deploy/demo/openclaw_base_url
    environment:
      OPENCLAW_CONFIG_PATH: "/opt/spendguard/deploy/demo/openclaw_base_url/openclaw.config.json"
      OPENCLAW_PROVIDER_ID: "spendguard"
      OPENCLAW_EXPECTED_BASE_URL: "http://egress-proxy:9000/v1"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
      SPENDGUARD_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID: "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION: "demo-pricing-v1"
      SPENDGUARD_FX_RATE_VERSION: "demo-fx-v1"
      SPENDGUARD_UNIT_CONVERSION_VERSION: "demo-units-v1"
    volumes:
      - ../..:/opt/spendguard:ro
    tmpfs:
      - /tmp
    command: ["node", "runner.mjs"]
    depends_on:
      egress-proxy:
        condition: service_healthy
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [openclaw-runner]
