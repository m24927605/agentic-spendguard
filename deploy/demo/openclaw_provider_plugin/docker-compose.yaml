# COV_D40B_05 (`DEMO_MODE=openclaw_provider_plugin`) - OpenClaw provider-plugin demo.
#
# Layer this file on top of deploy/demo/compose.yaml. The base stack starts
# postgres + ledger + canonical-ingest + sidecar + outbox-forwarder. This
# overlay adds a local OpenAI-compatible counting stub and a Node 22.19 runner
# that loads @spendguard/openclaw-provider-plugin from the workspace-built dist.
name: spendguard-demo

services:
  bundles-init:
    environment:
      DEMO_HARD_CAP_CLAIM_AMOUNT_ATOMIC_GT: "100"

  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, sys, time
        HITS = {"calls": 0}

        def stream_event(obj):
            return ("data: " + json.dumps(obj, separators=(",", ":")) + "\n\n").encode()

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                raw = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404)
                    self.end_headers()
                    return
                try:
                    req = json.loads(raw.decode() or "{}")
                except Exception:
                    req = {}
                HITS["calls"] += 1
                call_id = HITS["calls"]
                created = int(time.time())
                model = req.get("model") or "gpt-4o-mini"
                usage = {"prompt_tokens": 5, "completion_tokens": 7, "total_tokens": 12}

                if req.get("spendguard_demo_provider_error") is True:
                    body = json.dumps({
                        "error": {
                            "code": "provider_500",
                            "message": "forced provider error for D40B demo",
                        },
                        "_counting_stub_hits": call_id,
                    }).encode()
                    self.send_response(500)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.send_header("x-counting-stub-hits", str(call_id))
                    self.end_headers()
                    self.wfile.write(body)
                    return

                if req.get("stream") is True:
                    self.send_response(200)
                    self.send_header("Content-Type", "text/event-stream")
                    self.send_header("Cache-Control", "no-cache")
                    self.send_header("x-counting-stub-hits", str(call_id))
                    self.end_headers()
                    frames = [
                        {
                            "id": f"chatcmpl-counting-{call_id}",
                            "object": "chat.completion.chunk",
                            "created": created,
                            "model": model,
                            "choices": [{
                                "index": 0,
                                "delta": {"role": "assistant"},
                                "finish_reason": None,
                            }],
                        },
                        {
                            "id": f"chatcmpl-counting-{call_id}",
                            "object": "chat.completion.chunk",
                            "created": created,
                            "model": model,
                            "choices": [{
                                "index": 0,
                                "delta": {"content": "hi from "},
                                "finish_reason": None,
                            }],
                        },
                        {
                            "id": f"chatcmpl-counting-{call_id}",
                            "object": "chat.completion.chunk",
                            "created": created,
                            "model": model,
                            "choices": [{
                                "index": 0,
                                "delta": {"content": "counting stub"},
                                "finish_reason": "stop",
                            }],
                            "usage": usage,
                        },
                    ]
                    for frame in frames:
                        self.wfile.write(stream_event(frame))
                        self.wfile.flush()
                    self.wfile.write(b"data: [DONE]\n\n")
                    self.wfile.flush()
                    return

                body = {
                    "id": f"chatcmpl-counting-{call_id}",
                    "object": "chat.completion",
                    "created": created,
                    "model": model,
                    "choices": [{
                        "index": 0,
                        "message": {
                            "role": "assistant",
                            "content": "hi from counting stub",
                        },
                        "finish_reason": "stop",
                    }],
                    "usage": usage,
                    "_counting_stub_hits": call_id,
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(call_id))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok")
                    return
                self.send_response(404)
                self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[counting-stub] {self.command} {self.path} -> hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  openclaw-provider-plugin-runner:
    image: node:22.19-bookworm-slim
    container_name: spendguard-openclaw-provider-plugin-runner
    working_dir: /opt/spendguard/deploy/demo/openclaw_provider_plugin
    environment:
      OPENCLAW_CONFIG_PATH: "/opt/spendguard/deploy/demo/openclaw_provider_plugin/openclaw.config.json"
      SPENDGUARD_SIDECAR_UDS: "/var/run/spendguard/adapter.sock"
      SPENDGUARD_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID: "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION: "demo-pricing-v1"
      SPENDGUARD_FX_RATE_VERSION: "demo-fx-v1"
      SPENDGUARD_UNIT_CONVERSION_VERSION: "demo-units-v1"
      SPENDGUARD_HANDSHAKE_TIMEOUT_MS: "30000"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
    volumes:
      - ../..:/opt/spendguard:ro
      - sidecar-uds:/var/run/spendguard
      - bundles-data:/var/lib/spendguard/bundles:ro
      - openclaw-provider-plugin-runner-modules:/var/lib/openclaw-provider-plugin-runner/node_modules
    tmpfs:
      - /tmp
      - /home/node/.npm
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        echo "[openclaw-provider-plugin-runner] node $$(node --version) npm $$(npm --version)"

        if [ ! -f /opt/spendguard/integrations/openclaw-provider-plugin/dist/index.js ]; then
          echo "[openclaw-provider-plugin-runner] FATAL: plugin dist missing; run pnpm --dir integrations/openclaw-provider-plugin build" >&2
          exit 1
        fi

        STAGING=/tmp/openclaw-provider-plugin-stage
        mkdir -p "$$STAGING"
        cp /opt/spendguard/deploy/demo/openclaw_provider_plugin/runner.mjs "$$STAGING/"

        mkdir -p /var/lib/openclaw-provider-plugin-runner/node_modules
        ln -sf /var/lib/openclaw-provider-plugin-runner/node_modules "$$STAGING/node_modules"

        cd "$$STAGING"
        node -e "
          const fs = require('fs');
          fs.writeFileSync('package.json', JSON.stringify({
            type: 'module',
            dependencies: {
              '@spendguard/sdk': 'file:/opt/spendguard/sdk/typescript'
            }
          }, null, 2));
        "

        echo "[openclaw-provider-plugin-runner] installing SDK dependency..."
        npm install --no-audit --no-fund --no-package-lock --loglevel=warn

        echo "[openclaw-provider-plugin-runner] staging provider plugin package..."
        rm -rf "$$STAGING/node_modules/@spendguard/openclaw-provider-plugin"
        mkdir -p "$$STAGING/node_modules/@spendguard/openclaw-provider-plugin"
        cp /opt/spendguard/integrations/openclaw-provider-plugin/package.json \
          "$$STAGING/node_modules/@spendguard/openclaw-provider-plugin/package.json"
        cp -R /opt/spendguard/integrations/openclaw-provider-plugin/dist \
          "$$STAGING/node_modules/@spendguard/openclaw-provider-plugin/dist"

        echo "[openclaw-provider-plugin-runner] sidecar UDS ready check..."
        for i in $$(seq 1 60); do
          if [ -S "$$SPENDGUARD_SIDECAR_UDS" ]; then
            echo "[openclaw-provider-plugin-runner] sidecar UDS visible at $$SPENDGUARD_SIDECAR_UDS"
            break
          fi
          sleep 1
        done

        if [ -f /var/lib/spendguard/bundles/runtime.env ]; then
          echo "[openclaw-provider-plugin-runner] sourcing /var/lib/spendguard/bundles/runtime.env..."
          set -a
          . /var/lib/spendguard/bundles/runtime.env
          set +a
        else
          echo "[openclaw-provider-plugin-runner] FATAL: bundles runtime.env not found" >&2
          exit 1
        fi

        echo "[openclaw-provider-plugin-runner] launching runner.mjs..."
        exec node runner.mjs
    depends_on:
      sidecar:
        condition: service_healthy
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [openclaw-provider-plugin-runner]

volumes:
  bundles-data:
  openclaw-provider-plugin-runner-modules:
