# SpendGuard end-to-end POC compose topology.
#
# Services (start order enforced via depends_on + healthchecks):
#   1. postgres                  — PostgreSQL with two DBs (ledger + canonical_ingest)
#   2. pki-init                  — generates root CA + per-service workload certs (one-shot)
#   3. bundles-init              — pre-bakes contract / schema bundles + signs manifest (one-shot)
#   4. endpoint-catalog          — HTTPS server hosting signed manifest (Helm-pinned trust root)
#   5. ledger                    — Rust mTLS gRPC service over postgres
#   6. canonical-ingest          — Rust mTLS gRPC service over postgres
#   7. sidecar                   — Rust UDS gRPC server + mTLS client to ledger / canonical_ingest
#   8. demo                      — Python adapter + Pydantic-AI agent + Mock LLM model
#
# All services share `spendguard-net` for service-to-service communication.
# UDS is exposed via the `sidecar-uds` named volume mounted into both
# sidecar and demo containers. Bundles + PKI live in named volumes so that
# init containers can populate them before runtime containers consume.
#
# Bring-up:    `make demo-up` (or `docker compose up --build --abort-on-container-exit demo`)
# Tear-down:   `make demo-down`
#
# Notes:
#   - Postgres listens on :5433 (host) so it doesn't collide with other
#     dev containers that already use the default :5432.
#   - Endpoint catalog HTTPS uses port :8443 internal; certs are signed
#     by the PKI root CA so reqwest's default trust store (after
#     update-ca-certificates is run inside the sidecar image) accepts.
#   - The demo container blocks on adapter→sidecar UDS readiness, runs
#     the Pydantic-AI agent against a Mock model, prints the gated call,
#     and exits 0 on success.

name: spendguard-demo

services:
  postgres:
    image: postgres:16-alpine
    container_name: spendguard-postgres
    environment:
      POSTGRES_USER: spendguard
      POSTGRES_PASSWORD: spendguard_demo
      POSTGRES_DB: postgres            # bootstrap; init scripts create the two app DBs
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/migrations:/docker-entrypoint-initdb.d:ro
      - ../../services/ledger/migrations:/var/spendguard/ledger-migrations:ro
      - ../../services/canonical_ingest/migrations:/var/spendguard/canonical-migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spendguard -d spendguard_ledger"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks: [spendguard-net]

  pki-init:
    build:
      context: ./init/pki
    container_name: spendguard-pki-init
    volumes:
      - pki-data:/pki
    networks: [spendguard-net]

  pricing-seed-init:
    build:
      context: ./init/pricing
    container_name: spendguard-pricing-seed-init
    environment:
      POSTGRES_HOST:     "postgres"
      POSTGRES_USER:     "spendguard"
      POSTGRES_PASSWORD: "spendguard_demo"
      PRICING_DB:        "spendguard_canonical"
      LEDGER_DB:         "spendguard_ledger"
      FX_RATE_VERSION:   "demo-fx-v1"
      UNIT_CONVERSION_VERSION: "demo-units-v1"
      SIGNING_KEY_ID:    "demo-key-1"
      PGPASSWORD:        "spendguard_demo"
    volumes:
      - bundles-data:/bundles
      - ./init/pricing/seed.yaml:/seed.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [spendguard-net]

  bundles-init:
    build:
      context: ./init/bundles
    container_name: spendguard-bundles-init
    environment:
      CONTRACT_BUNDLE_ID:    "11111111-1111-4111-8111-111111111111"
      SCHEMA_BUNDLE_ID:      "22222222-2222-4222-8222-222222222222"
      # ttl_sweep mode exports SIDECAR_TTL_SECONDS=5 before compose up
      # so the contract bundle gets a 5s TTL (sidecar reads from
      # contract budget, not from its own env). Default 600 keeps
      # decision / invoice / release / agent / deny baselines stable.
      CONTRACT_RESERVATION_TTL_SECONDS: "${SIDECAR_TTL_SECONDS:-600}"
      # Legacy fallback values; pricing-seed-init overrides via /bundles/pricing.env
      PRICING_VERSION:       "demo-pricing-v1"
      FX_RATE_VERSION:       "demo-fx-v1"
      UNIT_CONVERSION_VERSION: "demo-units-v1"
      SIGNING_KEY_ID:        "demo-key-1"
    volumes:
      - bundles-data:/bundles
    depends_on:
      pricing-seed-init:
        condition: service_completed_successfully
    networks: [spendguard-net]

  canonical-seed-init:
    image: postgres:16-alpine
    container_name: spendguard-canonical-seed-init
    environment:
      POSTGRES_HOST: "postgres"
      POSTGRES_USER: "spendguard"
      POSTGRES_PASSWORD: "spendguard_demo"
      SCHEMA_BUNDLE_ID: "22222222-2222-4222-8222-222222222222"
    volumes:
      - bundles-data:/var/lib/spendguard/bundles:ro
      - ./init/canonical_seed/seed_schema_bundle.sh:/seed_schema_bundle.sh:ro
    entrypoint: ["/bin/sh", "/seed_schema_bundle.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      bundles-init:
        condition: service_completed_successfully
    networks: [spendguard-net]

  manifest-init:
    build:
      context: ./init/manifest
    container_name: spendguard-manifest-init
    environment:
      CATALOG_VERSION_ID:    "ctlg-demo-rev1"
      CATALOG_SERVE_HOST:    "endpoint-catalog"
      CATALOG_SERVE_PORT:    "8443"
      MANIFEST_VALID_HOURS:  "24"
    volumes:
      - manifest-data:/manifest
    depends_on:
      bundles-init:
        condition: service_completed_successfully
    networks: [spendguard-net]

  endpoint-catalog:
    image: nginx:1.27-alpine
    container_name: spendguard-endpoint-catalog
    volumes:
      - manifest-data:/usr/share/nginx/html:ro
      - pki-data:/etc/ssl/spendguard:ro
      - ./init/manifest/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      pki-init:
        condition: service_completed_successfully
      manifest-init:
        condition: service_completed_successfully
    healthcheck:
      # Use 127.0.0.1 explicitly: nginx listens on 0.0.0.0:8443 (IPv4
      # only) per default.conf, but `localhost` inside the container
      # resolves to ::1 first and wget refuses to fall through.
      test: ["CMD-SHELL", "wget -q --no-check-certificate -O - https://127.0.0.1:8443/v1/catalog/manifest > /dev/null"]
      interval: 3s
      timeout: 5s
      retries: 20
    networks:
      spendguard-net:
        aliases: [endpoint-catalog]

  ledger:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.ledger
    container_name: spendguard-ledger
    environment:
      RUST_LOG:                              "info,spendguard_ledger=debug"
      SPENDGUARD_LEDGER_BIND_ADDR:           "0.0.0.0:50051"
      SPENDGUARD_LEDGER_DATABASE_URL:        "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_ledger?sslmode=disable"
      SPENDGUARD_LEDGER_TENANT_ID:           "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_LEDGER_REGION:              "demo"
      SPENDGUARD_LEDGER_WORKLOAD_INSTANCE_ID: "ledger-demo-1"
      SPENDGUARD_LEDGER_PRODUCER_SIGNING_KEY_ID: "demo-key-1"
      # mTLS server material (paths inside the container).
      SPENDGUARD_LEDGER_TLS_CERT_PEM: "/etc/ssl/spendguard/ledger.crt"
      SPENDGUARD_LEDGER_TLS_KEY_PEM:  "/etc/ssl/spendguard/ledger.key"
      SPENDGUARD_LEDGER_TLS_CA_PEM:   "/etc/ssl/spendguard/ca.crt"
      # Demo runs against a single Postgres instance (no sync replica),
      # so verify_durability_settings would hard-fail without this
      # opt-out. Production deployments MUST leave this unset and ensure
      # synchronous_commit + synchronous_standby_names are configured
      # per Stage 2 §4.2 + Ledger §19.
      SPENDGUARD_LEDGER_ALLOW_UNSAFE_DURABILITY: "true"
      # Phase 5 GA hardening S6: producer signing.
      SPENDGUARD_PROFILE: "demo"
      SPENDGUARD_LEDGER_SIGNING_MODE: "local"
      SPENDGUARD_LEDGER_SIGNING_PRODUCER_IDENTITY: "ledger:server-mint"
      SPENDGUARD_LEDGER_SIGNING_KEY_PATH: "/etc/ssl/spendguard/signing/ledger.pem"
      # Round-2 #11: Prometheus /metrics endpoint.
      SPENDGUARD_LEDGER_METRICS_ADDR: "0.0.0.0:9092"
    ports:
      - "9092:9092"
    volumes:
      - pki-data:/etc/ssl/spendguard:ro
    depends_on:
      postgres:
        condition: service_healthy
      pki-init:
        condition: service_completed_successfully
    # No healthcheck: tonic's gRPC reflection isn't enabled; readiness
    # is gated by sidecar's own /readyz which tries the connection.
    networks:
      spendguard-net:
        aliases: [ledger]

  canonical-ingest:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.canonical_ingest
    container_name: spendguard-canonical-ingest
    environment:
      RUST_LOG:                                       "info,spendguard_canonical_ingest=debug"
      SPENDGUARD_CANONICAL_INGEST_BIND_ADDR:          "0.0.0.0:50052"
      SPENDGUARD_CANONICAL_INGEST_DATABASE_URL:       "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_canonical?sslmode=disable"
      SPENDGUARD_CANONICAL_INGEST_TENANT_ID:          "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_CANONICAL_INGEST_REGION:             "demo"
      SPENDGUARD_CANONICAL_INGEST_WORKLOAD_INSTANCE_ID: "canonical-ingest-demo-1"
      SPENDGUARD_CANONICAL_INGEST_TLS_CERT_PEM: "/etc/ssl/spendguard/canonical_ingest.crt"
      SPENDGUARD_CANONICAL_INGEST_TLS_KEY_PEM:  "/etc/ssl/spendguard/canonical_ingest.key"
      SPENDGUARD_CANONICAL_INGEST_TLS_CA_PEM:   "/etc/ssl/spendguard/ca.crt"
      # Required by canonical_ingest config (no default in
      # services/canonical_ingest/src/config.rs).
      SPENDGUARD_CANONICAL_INGEST_INGEST_SHARD_ID: "demo-shard-0"
      # Phase 5 GA hardening S8: strict signature verification.
      # Demo runs strict so the demo IS the integration test for
      # signed-end-to-end. Production sets profile=production +
      # mounts a real trust store (Helm template).
      SPENDGUARD_CANONICAL_INGEST_STRICT_SIGNATURES: "true"
      SPENDGUARD_CANONICAL_INGEST_TRUST_STORE_DIR:   "/etc/ssl/spendguard/signing"
      SPENDGUARD_CANONICAL_INGEST_METRICS_ADDR:      "0.0.0.0:9091"
    volumes:
      - pki-data:/etc/ssl/spendguard:ro
    depends_on:
      postgres:
        condition: service_healthy
      pki-init:
        condition: service_completed_successfully
    networks:
      spendguard-net:
        aliases: [canonical-ingest]

  sidecar:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.sidecar
    container_name: spendguard-sidecar
    environment:
      RUST_LOG: "debug,spendguard_sidecar=trace,tonic=debug,h2=debug,tower=debug"
      # Identity
      SPENDGUARD_SIDECAR_TENANT_ID:                "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_SIDECAR_WORKLOAD_INSTANCE_ID:     "sidecar-demo-1"
      SPENDGUARD_SIDECAR_REGION:                   "demo"
      # UDS for adapter
      SPENDGUARD_SIDECAR_UDS_PATH:                 "/var/run/spendguard/adapter.sock"
      # Endpoint catalog (HTTPS) + manifest verifier
      SPENDGUARD_SIDECAR_ENDPOINT_CATALOG_MANIFEST_URL: "https://endpoint-catalog:8443/v1/catalog/manifest"
      SPENDGUARD_SIDECAR_MANIFEST_VERIFY_KEY_PEM:  "/etc/spendguard/manifest_verify_key.pub.pem"
      # Trust pin + bundle hash are populated at container start by
      # sidecar-entrypoint.sh, which reads /etc/ssl/spendguard/ca.crt +
      # /var/lib/spendguard/bundles/runtime.env and exports the right
      # env vars before exec'ing the binary. The sidecar config schema
      # requires these but compose can't resolve them at parse time
      # because they depend on init-container output.
      SPENDGUARD_SIDECAR_MTLS_BOOTSTRAP_TOKEN:     "demo-bootstrap-token"
      # Bundle bootstrap
      SPENDGUARD_SIDECAR_BUNDLE_ROOT:              "/var/lib/spendguard/bundles"
      SPENDGUARD_SIDECAR_CONTRACT_BUNDLE_ID:       "11111111-1111-4111-8111-111111111111"
      SPENDGUARD_SIDECAR_SCHEMA_BUNDLE_ID:         "22222222-2222-4222-8222-222222222222"
      # Fencing bootstrap (operator-pre-provisioned scope; demo seeds via SQL)
      SPENDGUARD_SIDECAR_FENCING_SCOPE_ID:         "33333333-3333-4333-8333-333333333333"
      # epoch 1, not 0: post_ledger_transaction() rejects epoch 0 as
      # "not a valid lease" (a properly-acquired lease has CAS-incremented
      # at least once). The seed SQL inserts current_epoch=1.
      SPENDGUARD_SIDECAR_FENCING_INITIAL_EPOCH:    "1"
      # Reservation TTL (Phase 2B TTL Sweeper). Default 600s; demo
      # ttl_sweep mode exports SIDECAR_TTL_SECONDS=5 before docker
      # compose up to override (Codex TTL r2 V2.13).
      SPENDGUARD_SIDECAR_RESERVATION_TTL_SECONDS:  "${SIDECAR_TTL_SECONDS:-600}"
      # Upstream URLs (mTLS gRPC over docker DNS)
      SPENDGUARD_SIDECAR_LEDGER_URL:               "https://ledger:50051"
      SPENDGUARD_SIDECAR_CANONICAL_INGEST_URL:     "https://canonical-ingest:50052"
      # Health probe
      SPENDGUARD_SIDECAR_HEALTH_ADDR:              "0.0.0.0:8080"
      # Round-2 #11: Prometheus /metrics endpoint (sidecar = port 9093
      # per the round-2 port table).
      SPENDGUARD_SIDECAR_METRICS_ADDR:             "0.0.0.0:9093"
      # Phase 5 GA hardening S6: producer signing.
      SPENDGUARD_PROFILE:                          "demo"
      SPENDGUARD_SIDECAR_SIGNING_MODE:             "local"
      SPENDGUARD_SIDECAR_SIGNING_PRODUCER_IDENTITY: "sidecar:sidecar-demo-1"
      SPENDGUARD_SIDECAR_SIGNING_KEY_PATH:         "/etc/ssl/spendguard/signing/sidecar.pem"
    ports:
      - "9093:9093"
    volumes:
      - pki-data:/etc/ssl/spendguard:ro
      - bundles-data:/var/lib/spendguard/bundles:ro
      - manifest-data:/etc/spendguard:ro
      - sidecar-uds:/var/run/spendguard
    depends_on:
      ledger:
        condition: service_started
      canonical-ingest:
        condition: service_started
      endpoint-catalog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/readyz | grep -q ready"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s

    networks: [spendguard-net]

  outbox-forwarder:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.outbox_forwarder
    container_name: spendguard-outbox-forwarder
    environment:
      RUST_LOG:                                                "info,spendguard_outbox_forwarder=debug"
      SPENDGUARD_OUTBOX_FORWARDER_DATABASE_URL:                "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_ledger?sslmode=disable"
      SPENDGUARD_OUTBOX_FORWARDER_CANONICAL_INGEST_URL:        "https://canonical-ingest:50052"
      SPENDGUARD_OUTBOX_FORWARDER_TLS_CLIENT_CERT:             "/etc/ssl/spendguard/outbox_forwarder.crt"
      SPENDGUARD_OUTBOX_FORWARDER_TLS_CLIENT_KEY:              "/etc/ssl/spendguard/outbox_forwarder.key"
      SPENDGUARD_OUTBOX_FORWARDER_TLS_CA_PEM:                  "/etc/ssl/spendguard/ca.crt"
      SPENDGUARD_OUTBOX_FORWARDER_WORKLOAD_INSTANCE_ID:        "demo-outbox-forwarder"
      SPENDGUARD_OUTBOX_FORWARDER_SCHEMA_BUNDLE_ID:            "22222222-2222-4222-8222-222222222222"
      SPENDGUARD_OUTBOX_FORWARDER_SCHEMA_BUNDLE_HASH_HEX:      "${SPENDGUARD_SCHEMA_BUNDLE_HASH_HEX:-}"
      SPENDGUARD_OUTBOX_FORWARDER_POLL_INTERVAL_SECONDS:       "2"
      SPENDGUARD_OUTBOX_FORWARDER_BATCH_SIZE:                  "50"
      # Round-2 #11: Prometheus /metrics endpoint.
      SPENDGUARD_OUTBOX_FORWARDER_METRICS_ADDR:                "0.0.0.0:9096"
    ports:
      - "9096:9096"
    volumes:
      - pki-data:/etc/ssl/spendguard:ro
      - bundles-data:/var/lib/spendguard/bundles:ro
    depends_on:
      postgres:
        condition: service_healthy
      canonical-ingest:
        condition: service_started
      canonical-seed-init:
        condition: service_completed_successfully
      pki-init:
        condition: service_completed_successfully
    networks: [spendguard-net]

  ttl-sweeper:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.ttl_sweeper
    container_name: spendguard-ttl-sweeper
    environment:
      RUST_LOG:                                          "info,spendguard_ttl_sweeper=debug"
      SPENDGUARD_TTL_SWEEPER_DATABASE_URL:               "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_ledger?sslmode=disable"
      SPENDGUARD_TTL_SWEEPER_LEDGER_URL:                 "https://ledger:50051"
      SPENDGUARD_TTL_SWEEPER_TENANT_ID:                  "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_TTL_SWEEPER_TLS_CLIENT_CERT:            "/etc/ssl/spendguard/ttl_sweeper.crt"
      SPENDGUARD_TTL_SWEEPER_TLS_CLIENT_KEY:             "/etc/ssl/spendguard/ttl_sweeper.key"
      SPENDGUARD_TTL_SWEEPER_TLS_CA_PEM:                 "/etc/ssl/spendguard/ca.crt"
      SPENDGUARD_TTL_SWEEPER_FENCING_SCOPE_ID:           "00000000-0000-7000-a000-000000000060"
      SPENDGUARD_TTL_SWEEPER_WORKLOAD_INSTANCE_ID:       "demo-ttl-sweeper"
      SPENDGUARD_TTL_SWEEPER_FENCING_INITIAL_EPOCH:      "1"
      SPENDGUARD_TTL_SWEEPER_POLL_INTERVAL_SECONDS:      "2"
      SPENDGUARD_TTL_SWEEPER_BATCH_SIZE:                 "10"
      # Phase 5 GA hardening S6: producer signing.
      SPENDGUARD_PROFILE:                                "demo"
      SPENDGUARD_TTL_SWEEPER_SIGNING_MODE:               "local"
      SPENDGUARD_TTL_SWEEPER_SIGNING_PRODUCER_IDENTITY:  "ttl-sweeper:demo-ttl-sweeper"
      SPENDGUARD_TTL_SWEEPER_SIGNING_KEY_PATH:           "/etc/ssl/spendguard/signing/ttl-sweeper.pem"
      # Round-2 #11: Prometheus /metrics endpoint.
      SPENDGUARD_TTL_SWEEPER_METRICS_ADDR:               "0.0.0.0:9097"
    ports:
      - "9097:9097"
    volumes:
      - pki-data:/etc/ssl/spendguard:ro
    depends_on:
      postgres:
        condition: service_healthy
      ledger:
        condition: service_started
      pki-init:
        condition: service_completed_successfully
    networks: [spendguard-net]

  webhook-receiver:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.webhook_receiver
    container_name: spendguard-webhook-receiver
    environment:
      RUST_LOG:                                                    "info,spendguard_webhook_receiver=debug"
      SPENDGUARD_WEBHOOK_RECEIVER_BIND_ADDR:                       "0.0.0.0:8443"
      SPENDGUARD_WEBHOOK_RECEIVER_HEALTH_ADDR:                     "0.0.0.0:8080"
      SPENDGUARD_WEBHOOK_RECEIVER_DATABASE_URL:                    "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_ledger?sslmode=disable"
      SPENDGUARD_WEBHOOK_RECEIVER_LEDGER_URL:                      "https://ledger:50051"
      SPENDGUARD_WEBHOOK_RECEIVER_TENANT_ID:                       "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_WEBHOOK_RECEIVER_TLS_SERVER_CERT:                 "/etc/ssl/spendguard/webhook_receiver.crt"
      SPENDGUARD_WEBHOOK_RECEIVER_TLS_SERVER_KEY:                  "/etc/ssl/spendguard/webhook_receiver.key"
      SPENDGUARD_WEBHOOK_RECEIVER_TLS_CLIENT_CERT:                 "/etc/ssl/spendguard/webhook_receiver.crt"
      SPENDGUARD_WEBHOOK_RECEIVER_TLS_CLIENT_KEY:                  "/etc/ssl/spendguard/webhook_receiver.key"
      SPENDGUARD_WEBHOOK_RECEIVER_TLS_CA_PEM:                      "/etc/ssl/spendguard/ca.crt"
      SPENDGUARD_WEBHOOK_RECEIVER_FENCING_SCOPE_ID:                "00000000-0000-7000-a000-000000000050"
      SPENDGUARD_WEBHOOK_RECEIVER_WORKLOAD_INSTANCE_ID:            "demo-webhook-receiver"
      SPENDGUARD_WEBHOOK_RECEIVER_FENCING_INITIAL_EPOCH:           "1"
      SPENDGUARD_WEBHOOK_SECRET_MOCK_LLM:                          "demo-secret-not-for-prod"
      # Phase 5 GA hardening S6: producer signing.
      SPENDGUARD_PROFILE:                                          "demo"
      SPENDGUARD_WEBHOOK_RECEIVER_SIGNING_MODE:                    "local"
      SPENDGUARD_WEBHOOK_RECEIVER_SIGNING_PRODUCER_IDENTITY:       "webhook-receiver:demo-webhook-receiver"
      SPENDGUARD_WEBHOOK_RECEIVER_SIGNING_KEY_PATH:                "/etc/ssl/spendguard/signing/webhook-receiver.pem"
      # Round-2 #11: Prometheus /metrics endpoint.
      SPENDGUARD_WEBHOOK_RECEIVER_METRICS_ADDR:                    "0.0.0.0:9098"
    ports:
      - "9098:9098"
    volumes:
      - pki-data:/etc/ssl/spendguard:ro
    depends_on:
      postgres:
        condition: service_healthy
      ledger:
        condition: service_started
      pki-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz | grep -q ok"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks: [spendguard-net]

  control-plane:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.control_plane
    container_name: spendguard-control-plane
    environment:
      RUST_LOG: "info,spendguard_control_plane=debug"
      SPENDGUARD_CONTROL_PLANE_BIND_ADDR:    "0.0.0.0:8091"
      SPENDGUARD_CONTROL_PLANE_DATABASE_URL: "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_ledger?sslmode=disable"
      # Phase 5 GA hardening S17: OIDC/SSO foundation. Demo runs in
      # static_token mode (allowed only with profile=demo).
      SPENDGUARD_PROFILE:                                     "demo"
      SPENDGUARD_CONTROL_PLANE_AUTH_MODE:                     "static_token"
      SPENDGUARD_CONTROL_PLANE_STATIC_TOKEN:                  "demo-admin-token-replace-in-production"
      SPENDGUARD_CONTROL_PLANE_STATIC_TOKEN_SUBJECT:          "demo-operator"
      # Phase 5 GA hardening S18: RBAC + tenant isolation. Demo
      # static-token principal scopes to the seeded demo tenant.
      # The demo policy auto-grants admin via the synthetic
      # `demo-admins` group; in production, set GROUP_POLICY_JSON
      # to map your IdP's group claims to roles.
      SPENDGUARD_CONTROL_PLANE_STATIC_TOKEN_TENANT_IDS:       "00000000-0000-4000-8000-000000000001"
      # Round-2 #11: Prometheus /metrics endpoint.
      SPENDGUARD_CONTROL_PLANE_METRICS_ADDR:                  "0.0.0.0:9094"
    ports:
      - "8091:8091"
      - "9094:9094"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [spendguard-net]

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.dashboard
    container_name: spendguard-dashboard
    environment:
      RUST_LOG: "info,spendguard_dashboard=debug"
      SPENDGUARD_DASHBOARD_BIND_ADDR:    "0.0.0.0:8090"
      SPENDGUARD_DASHBOARD_DATABASE_URL: "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_ledger?sslmode=disable"
      # Phase 5 GA hardening S9: optional canonical DB for /api/audit/export.
      SPENDGUARD_DASHBOARD_CANONICAL_DATABASE_URL: "postgres://spendguard:spendguard_demo@postgres:5432/spendguard_canonical?sslmode=disable"
      SPENDGUARD_DASHBOARD_TENANT_ID:    "00000000-0000-4000-8000-000000000001"
      # Phase 5 GA hardening S17: OIDC/SSO foundation. Demo uses
      # static_token mode (allowed only with profile=demo).
      SPENDGUARD_PROFILE:                          "demo"
      SPENDGUARD_DASHBOARD_AUTH_MODE:              "static_token"
      SPENDGUARD_DASHBOARD_STATIC_TOKEN:           "demo-dashboard-token-replace-in-production"
      SPENDGUARD_DASHBOARD_STATIC_TOKEN_SUBJECT:   "demo-viewer"
      # Phase 5 GA hardening S18: tenant scope on the static
      # principal so the demo dashboard can read the seeded tenant.
      SPENDGUARD_DASHBOARD_STATIC_TOKEN_TENANT_IDS: "00000000-0000-4000-8000-000000000001"
      # Round-2 #11: Prometheus /metrics endpoint.
      SPENDGUARD_DASHBOARD_METRICS_ADDR:           "0.0.0.0:9095"
    ports:
      - "8090:8090"
      - "9095:9095"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [spendguard-net]

  demo:
    build:
      context: ../..
      dockerfile: deploy/demo/runtime/Dockerfile.adapter
    container_name: spendguard-demo
    environment:
      SPENDGUARD_SIDECAR_UDS:                  "/var/run/spendguard/adapter.sock"
      SPENDGUARD_TENANT_ID:                    "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID:                    "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID:           "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID:                      "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION:              "demo-pricing-v1"
      SPENDGUARD_FX_RATE_VERSION:              "demo-fx-v1"
      SPENDGUARD_UNIT_CONVERSION_VERSION:      "demo-units-v1"
      # SPENDGUARD_PRICE_SNAPSHOT_HASH_HEX is sourced from the bundles
      # volume's runtime.env at container start (see entrypoint).
      # Phase 2B Step 8: webhook simulator talks directly to ledger gRPC.
      SPENDGUARD_LEDGER_URL:                   "https://ledger:50051"
      SPENDGUARD_DEMO_TLS_CERT_PEM:            "/etc/ssl/spendguard/ledger.crt"
      SPENDGUARD_DEMO_TLS_KEY_PEM:             "/etc/ssl/spendguard/ledger.key"
      SPENDGUARD_DEMO_TLS_CA_PEM:              "/etc/ssl/spendguard/ca.crt"
      # Phase 3 follow-up: real LLM keys forwarded from host env for
      # DEMO_MODE=agent_real. Missing host var → empty string → run_demo.py
      # FATALs on use (fail-fast).
      OPENAI_API_KEY:                          "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY:                       "${ANTHROPIC_API_KEY:-}"
      SPENDGUARD_DEMO_WEBHOOK_FENCING_SCOPE_ID: "00000000-0000-7000-a000-000000000050"
      SPENDGUARD_DEMO_WEBHOOK_WORKLOAD_INSTANCE_ID: "demo-webhook-receiver"
      # Phase 2B Step 11: webhook receiver service replaces in-process simulator.
      SPENDGUARD_DEMO_WEBHOOK_RECEIVER_URL:    "https://webhook-receiver:8443"
      SPENDGUARD_WEBHOOK_SECRET_MOCK_LLM:      "demo-secret-not-for-prod"
    volumes:
      - sidecar-uds:/var/run/spendguard:ro
      - bundles-data:/var/lib/spendguard/bundles:ro
      - pki-data:/etc/ssl/spendguard:ro
    depends_on:
      sidecar:
        condition: service_healthy
      webhook-receiver:
        condition: service_healthy
    networks: [spendguard-net]

networks:
  spendguard-net:
    driver: bridge

volumes:
  postgres-data:
  pki-data:
  bundles-data:
  manifest-data:
  sidecar-uds:
