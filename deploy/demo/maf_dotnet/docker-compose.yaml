# COV_d07 SLICE 8 (`DEMO_MODE=maf_dotnet_real`) — sidecar compose overlay.
#
# Mirrors `deploy/demo/inngest_agent_kit/docker-compose.yaml` field-for-field;
# only the runner service differs (.NET 8 console app driving
# `IChatClient.UseSpendGuard(sp)` vs Inngest AgentKit wrapping `step.ai`).
# Layered on top of `deploy/demo/compose.yaml` via
# `docker compose -f deploy/demo/compose.yaml -f
# deploy/demo/maf_dotnet/docker-compose.yaml up`. The Makefile
# `DEMO_MODE=maf_dotnet_real` branch does that for you.
#
# Services declared here:
#
#   counting-stub          mock OpenAI `/v1/chat/completions` provider. By-value
#                          duplicate of the openai_agents_ts overlay's stub so
#                          the overlays remain independent.
#
#   maf-dotnet-runner      .NET 8 SDK container that runs `dotnet run` against
#                          the in-tree `examples/maf-dotnet/Maf.Dotnet.csproj`
#                          (which references the in-tree
#                          `Spendguard.AgentFramework` project), so the demo
#                          always reflects the current SDK shape. Parallels
#                          the openai_agents_ts / inngest_agent_kit overlays'
#                          `node:20` pattern: workspace mount + entrypoint
#                          script that runs the consumer's build chain.
#
# Anti-scope: this overlay does NOT redeclare postgres, sidecar, ledger,
# canonical-ingest, bundles-init, pki-init or any other base service —
# the Makefile target brings up the base stack first, then this overlay.
name: spendguard-demo

services:
  # ── counting-stub ────────────────────────────────────────────────────
  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, time, sys
        HITS = {"calls": 0}

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                _ = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404)
                    self.end_headers()
                    return
                HITS["calls"] += 1
                body = {
                    "id": f"chatcmpl-counting-{HITS['calls']}",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "gpt-4o-mini",
                    "choices": [{
                        "index": 0,
                        "message": {"role": "assistant",
                                    "content": "hi from counting stub"},
                        "finish_reason": "stop",
                    }],
                    "usage": {"prompt_tokens": 5,
                              "completion_tokens": 7,
                              "total_tokens": 12},
                    "_counting_stub_hits": HITS["calls"],
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(HITS["calls"]))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok")
                    return
                self.send_response(404)
                self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[counting-stub] {self.command} {self.path} -> "
                    f"hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  # ── maf-dotnet-runner ────────────────────────────────────────────────
  # .NET 8 SDK container that stages the in-tree
  # `examples/maf-dotnet` + `sdk/dotnet-agent-framework/Spendguard.AgentFramework`
  # under /tmp (the workspace mount is read-only) and runs
  # `dotnet run --project examples/maf-dotnet -- --real` against the
  # sidecar UDS. The staging dance keeps the build deterministic across
  # rebuilds; cached NuGet packages persist in the named volume.
  maf-dotnet-runner:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    container_name: spendguard-maf-dotnet-runner
    # Demo-only: run as root inside the container so the named-volume
    # NuGet cache (mounted by docker as root-owned) is writable.
    # Production deployments of `Spendguard.AgentFramework` run under
    # the consumer's own runtime; the adapter itself never touches the
    # filesystem at runtime.
    working_dir: /var/lib/maf-dotnet-stage/examples/maf-dotnet
    environment:
      SPENDGUARD_SIDECAR_UDS: "/var/run/spendguard/adapter.sock"
      SPENDGUARD_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID: "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION: "demo-pricing-v1"
      SPENDGUARD_HANDSHAKE_TIMEOUT_MS: "30000"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
      # Default NuGet config tries to write to ~/.nuget; redirect to the
      # named volume so the install caches across runs.
      NUGET_PACKAGES: "/var/cache/nuget"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
    volumes:
      # Workspace source — read-only.
      - ../..:/opt/spendguard:ro
      # Sidecar UDS shared with the rest of the stack.
      - sidecar-uds:/var/run/spendguard
      # NuGet cache persistence across re-runs.
      - maf-dotnet-runner-nuget:/var/cache/nuget
      # Writable staging dir for `dotnet build`. Named volume (not
      # tmpfs) because tmpfs mounts default to noexec, and `dotnet run`
      # needs to fork/exec the apphost binary in bin/Release/.
      - maf-dotnet-runner-stage:/var/lib/maf-dotnet-stage
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[maf-dotnet-runner] dotnet $$(dotnet --version)"

        # The workspace mount is read-only; we cannot `dotnet build`
        # directly into it (obj/ + bin/ writes). Stage a writable copy
        # of the example + the in-tree Spendguard.AgentFramework project
        # the example references.
        STAGING=/var/lib/maf-dotnet-stage
        rm -rf "$$STAGING/examples" "$$STAGING/sdk"
        mkdir -p "$$STAGING/examples"
        mkdir -p "$$STAGING/sdk"
        cp -r /opt/spendguard/examples/maf-dotnet "$$STAGING/examples/"
        cp -r /opt/spendguard/sdk/dotnet-agent-framework "$$STAGING/sdk/"

        cd "$$STAGING/examples/maf-dotnet"

        echo "[maf-dotnet-runner] sidecar UDS ready check..."
        for i in $$(seq 1 60); do
          if [ -S "$$SPENDGUARD_SIDECAR_UDS" ]; then
            echo "[maf-dotnet-runner] sidecar UDS visible at $$SPENDGUARD_SIDECAR_UDS"
            break
          fi
          sleep 1
        done

        echo "[maf-dotnet-runner] dotnet build --configuration Release..."
        dotnet build --configuration Release

        echo "[maf-dotnet-runner] dotnet --real..."
        exec dotnet bin/Release/net8.0/spendguard-maf-dotnet-demo.dll --real
    depends_on:
      sidecar:
        condition: service_healthy
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [maf-dotnet-runner]

volumes:
  maf-dotnet-runner-nuget:
  maf-dotnet-runner-stage:
