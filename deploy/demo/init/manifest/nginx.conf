# Nginx config used by the `endpoint-catalog` service in the demo.
#
# Serves files written by `manifest-init` via HTTPS, matching the URL
# layout the sidecar expects:
#   GET /v1/catalog/manifest         → manifest pointer (signed JSON)
#   GET /v1/catalog/<version_id>     → immutable catalog body (JSON)
#
# TLS uses the per-service workload cert minted by `pki-init`. The
# sidecar's reqwest client validates this against its
# trust_root_ca_pem; we install /pki/ca.crt into the sidecar's OS trust
# store via the sidecar Dockerfile so the chain validates without
# explicit reqwest::Certificate::from_pem wiring.

server {
    listen              8443 ssl;
    server_name         endpoint-catalog endpoint-catalog.spendguard.internal localhost;

    ssl_certificate     /etc/ssl/spendguard/endpoint_catalog.crt;
    ssl_certificate_key /etc/ssl/spendguard/endpoint_catalog.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Cache-Control "no-store" always;

    # Manifest pointer: short, no-cache, freshness-gated.
    location = /v1/catalog/manifest {
        alias /usr/share/nginx/html/v1/catalog/manifest;
        default_type application/json;
        add_header Cache-Control "no-store" always;
    }

    # Versioned immutable catalog body. Cacheable but the sidecar uses
    # the manifest's `current_catalog_url` directly so cache headers
    # don't matter for correctness — just leave them at default.
    location ~ "^/v1/catalog/(ctlg-[A-Za-z0-9._:-]+)$" {
        alias /usr/share/nginx/html/v1/catalog/$1;
        default_type application/json;
        add_header Cache-Control "max-age=86400, public" always;
    }

    location = /healthz {
        return 200 "ok";
        default_type text/plain;
    }

    location / {
        return 404;
    }
}
