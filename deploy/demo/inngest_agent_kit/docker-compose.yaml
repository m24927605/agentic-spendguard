# D29 SLICE 5 (`DEMO_MODE=inngest_agent_kit`) — sidecar compose overlay.
#
# Mirrors `deploy/demo/openai_agents_ts/docker-compose.yaml` field-for-field;
# only the runner service differs (Inngest AgentKit wrap retry-dedup vs
# OpenAI Agents Runner.run). Layered on top of `deploy/demo/compose.yaml`
# via `docker compose -f deploy/demo/compose.yaml -f
# deploy/demo/inngest_agent_kit/docker-compose.yaml up`. The Makefile
# `DEMO_MODE=inngest_agent_kit` branch does that for you.
#
# Services declared here:
#
#   counting-stub                 mock OpenAI `/v1/chat/completions` provider.
#                                 By-value duplicate of the langchain_ts /
#                                 openai_agents_ts overlay's counting-stub
#                                 so the overlays remain independent.
#
#   inngest-agent-kit-runner      Node 20 container that vendors the
#                                 workspace-built `@spendguard/sdk` +
#                                 `@spendguard/inngest-agent-kit` dist
#                                 artefacts into a self-contained
#                                 node_modules tree, then runs
#                                 `examples/inngest-agent-kit/index.mjs
#                                 --real` against the sidecar UDS.
#
# Anti-scope: this overlay does NOT redeclare postgres, sidecar, ledger,
# canonical-ingest, bundles-init, pki-init or any other base service —
# the Makefile target brings up the base stack first, then this overlay.
name: spendguard-demo

services:
  # ── counting-stub ────────────────────────────────────────────────────
  counting-stub:
    image: python:3.12-slim
    container_name: spendguard-counting-stub
    user: "65532:65532"
    read_only: true
    tmpfs:
      - /tmp
    command:
      - python
      - -c
      - |
        import http.server, json, time, sys
        HITS = {"calls": 0}

        class Handler(http.server.BaseHTTPRequestHandler):
            def do_POST(self):
                length = int(self.headers.get("Content-Length", "0"))
                _ = self.rfile.read(length)
                if not self.path.startswith("/v1/chat/completions"):
                    self.send_response(404)
                    self.end_headers()
                    return
                HITS["calls"] += 1
                body = {
                    "id": f"chatcmpl-counting-{HITS['calls']}",
                    "object": "chat.completion",
                    "created": int(time.time()),
                    "model": "gpt-4o-mini",
                    "choices": [{
                        "index": 0,
                        "message": {"role": "assistant",
                                    "content": "hi from counting stub"},
                        "finish_reason": "stop",
                    }],
                    "usage": {"prompt_tokens": 5,
                              "completion_tokens": 7,
                              "total_tokens": 12},
                    "_counting_stub_hits": HITS["calls"],
                }
                payload = json.dumps(body).encode()
                self.send_response(200)
                self.send_header("Content-Type", "application/json")
                self.send_header("Content-Length", str(len(payload)))
                self.send_header("x-counting-stub-hits", str(HITS["calls"]))
                self.end_headers()
                self.wfile.write(payload)

            def do_GET(self):
                if self.path == "/_count":
                    body = json.dumps({"calls": HITS["calls"]}).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "application/json")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)
                    return
                if self.path in ("/healthz", "/livez"):
                    self.send_response(200)
                    self.send_header("Content-Length", "2")
                    self.end_headers()
                    self.wfile.write(b"ok")
                    return
                self.send_response(404)
                self.end_headers()

            def log_message(self, *args, **_kwargs):
                sys.stderr.write(
                    f"[counting-stub] {self.command} {self.path} -> "
                    f"hits={HITS['calls']}\n"
                )

        server = http.server.HTTPServer(("0.0.0.0", 8765), Handler)
        sys.stderr.write("[counting-stub] listening on :8765\n")
        server.serve_forever()
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8765/healthz',timeout=2);
          sys.exit(0 if r.read()==b'ok' else 1)"
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      spendguard-net:
        aliases: [counting-stub]

  # ── inngest-agent-kit-runner ────────────────────────────────────────
  # Node 20 container that vendors the workspace-built `@spendguard/sdk`
  # + `@spendguard/inngest-agent-kit` dist artefacts and runs
  # `examples/inngest-agent-kit/index.mjs --real`. Pre-built dist
  # mounts (instead of `pnpm install`) keep the image build deterministic
  # and offline-capable; the demo-as-quality-gate principle (project
  # memory) demands the wire shape match what the production publish
  # bundle ships. SLICE 6 already keeps the dist/ bundle current via
  # `pnpm run build`.
  inngest-agent-kit-runner:
    image: node:20.10-bookworm-slim
    container_name: spendguard-inngest-agent-kit-runner
    # Demo-only: run as root inside the container so the named-volume
    # node_modules tree (mounted by docker as root-owned) is writable.
    # Production deployments of `@spendguard/inngest-agent-kit` run under
    # the consumer's own runtime; the adapter itself never touches the
    # filesystem at runtime.
    working_dir: /opt/spendguard/examples/inngest-agent-kit
    environment:
      SPENDGUARD_SIDECAR_UDS: "/var/run/spendguard/adapter.sock"
      SPENDGUARD_TENANT_ID: "00000000-0000-4000-8000-000000000001"
      SPENDGUARD_BUDGET_ID: "44444444-4444-4444-8444-444444444444"
      SPENDGUARD_WINDOW_INSTANCE_ID: "55555555-5555-4555-8555-555555555555"
      SPENDGUARD_UNIT_ID: "66666666-6666-4666-8666-666666666666"
      SPENDGUARD_PRICING_VERSION: "demo-pricing-v1"
      SPENDGUARD_FX_RATE_VERSION: "demo-fx-v1"
      SPENDGUARD_UNIT_CONVERSION_VERSION: "demo-units-v1"
      SPENDGUARD_HANDSHAKE_TIMEOUT_MS: "30000"
      SPENDGUARD_DEMO_RETRIES: "2"
      # The stand-in step.ai is pointed at the in-network counting stub.
      OPENAI_BASE_URL: "http://counting-stub:8765/v1"
      OPENAI_API_KEY: "demo-counting-stub-no-real-key"
      SPENDGUARD_COUNTING_STUB_URL: "http://counting-stub:8765"
    volumes:
      # Workspace source — read-only.
      - ../..:/opt/spendguard:ro
      # Sidecar UDS shared with the rest of the stack.
      - sidecar-uds:/var/run/spendguard
      # HARDEN_D05_WI: source pricing freeze from bundles runtime.env
      # (written by pricing-seed-init / bundles-init at compose-up time) —
      # mirrors the HARDEN_D05_UR Python overlay convention.
      - bundles-data:/var/lib/spendguard/bundles:ro
      # Writable node_modules persistence across re-runs.
      - inngest-agent-kit-runner-modules:/var/lib/inngest-agent-kit-runner/node_modules
    tmpfs:
      - /tmp
      - /home/node/.npm
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        # NOTE: every $ that should reach the container shell at runtime
        # (not be interpolated by docker compose at parse time) is
        # written as $$ in this YAML literal.

        echo "[inngest-agent-kit-runner] node $$(node --version) npm $$(npm --version)"

        # The workspace mount is read-only; we cannot `npm install`
        # directly into it. Stage a writable copy of the example into
        # /tmp and resolve the SpendGuard halves via `file:` deps against
        # the read-only mount's pre-built dist artefacts.
        STAGING=/tmp/inngest-agent-kit-stage
        mkdir -p "$$STAGING"
        cp /opt/spendguard/examples/inngest-agent-kit/package.json "$$STAGING/"
        cp /opt/spendguard/examples/inngest-agent-kit/index.mjs "$$STAGING/"

        # Wire the staging dir's node_modules to the named volume so
        # repeated runs reuse the install.
        mkdir -p /var/lib/inngest-agent-kit-runner/node_modules
        ln -sf /var/lib/inngest-agent-kit-runner/node_modules "$$STAGING/node_modules"

        cd "$$STAGING"

        # Override the published-version deps with `file:` references to
        # the in-tree workspace builds. The original published-name
        # imports in index.mjs still resolve through node_modules because
        # both workspace packages keep their published `name` in
        # package.json.
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.dependencies['@spendguard/sdk'] = 'file:/opt/spendguard/sdk/typescript';
          pkg.dependencies['@spendguard/inngest-agent-kit'] = 'file:/opt/spendguard/sdk/typescript-inngest-agent-kit';
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
        "

        echo "[inngest-agent-kit-runner] installing example deps..."
        npm install --no-audit --no-fund --no-package-lock --loglevel=warn

        echo "[inngest-agent-kit-runner] sidecar UDS ready check..."
        for i in $$(seq 1 60); do
          if [ -S "$$SPENDGUARD_SIDECAR_UDS" ]; then
            echo "[inngest-agent-kit-runner] sidecar UDS visible at $$SPENDGUARD_SIDECAR_UDS"
            break
          fi
          sleep 1
        done

        # HARDEN_D05_WI: source bundles runtime.env so
        # SPENDGUARD_PRICE_SNAPSHOT_HASH_HEX matches the contract bundle
        # the sidecar loaded (mirrors deploy/demo/runtime/demo-entrypoint.sh).
        if [ -f /var/lib/spendguard/bundles/runtime.env ]; then
          echo "[inngest-agent-kit-runner] sourcing /var/lib/spendguard/bundles/runtime.env..."
          set -a
          . /var/lib/spendguard/bundles/runtime.env
          set +a
        else
          echo "[inngest-agent-kit-runner] FATAL: bundles runtime.env not found" >&2
          exit 1
        fi

        echo "[inngest-agent-kit-runner] launching index.mjs --real..."
        exec node index.mjs --real
    depends_on:
      sidecar:
        condition: service_healthy
      counting-stub:
        condition: service_healthy
    networks:
      spendguard-net:
        aliases: [inngest-agent-kit-runner]

volumes:
  bundles-data:
  inngest-agent-kit-runner-modules:
