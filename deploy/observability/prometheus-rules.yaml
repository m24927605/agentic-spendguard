# SpendGuard GA alert rules.
#
# These rules intentionally reference metrics emitted by the checked-in
# services and inventoried in docs/operations/metrics-inventory.md. Run
# scripts/observability/validate-alert-runbooks.sh before applying changes.

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: spendguard-slos
  labels:
    app.kubernetes.io/part-of: spendguard
    spendguard.dev/track: ga
spec:
  groups:
    - name: spendguard.predictor
      interval: 30s
      rules:
        - alert: SpendGuardOutputPredictorLatencyHigh
          expr: |
            histogram_quantile(
              0.99,
              sum(rate(spendguard_output_predictor_predict_latency_seconds_bucket[5m])) by (le)
            ) > 0.5
          for: 10m
          labels:
            severity: page
            team: predictor
            slo: predictor-p99
          annotations:
            summary: "Output predictor p99 latency > 500ms for 10m"
            runbook: "docs/operations/runbooks/output-predictor-latency.md"

        - alert: SpendGuardOutputPredictorErrorRateHigh
          expr: |
            (
              sum(rate(spendguard_output_predictor_predict_total{outcome="err"}[5m]))
              /
              clamp_min(sum(rate(spendguard_output_predictor_predict_total[5m])), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: page
            team: predictor
            slo: predictor-availability
          annotations:
            summary: "Output predictor error rate > 1% for 5m"
            runbook: "docs/operations/runbooks/output-predictor-errors.md"

        - alert: SpendGuardRunCostProjectorLatencyHigh
          expr: |
            histogram_quantile(
              0.99,
              sum(rate(spendguard_run_cost_projector_project_latency_seconds_bucket[5m])) by (le)
            ) > 0.5
          for: 10m
          labels:
            severity: page
            team: predictor
            slo: run-cost-projector-p99
          annotations:
            summary: "Run cost projector p99 latency > 500ms for 10m"
            runbook: "docs/operations/runbooks/run-cost-projector-latency.md"

        - alert: SpendGuardRunCostProjectorErrorRateHigh
          expr: |
            (
              sum(rate(spendguard_run_cost_projector_project_total{outcome="err"}[5m]))
              /
              clamp_min(sum(rate(spendguard_run_cost_projector_project_total[5m])), 0.001)
            ) > 0.01
          for: 5m
          labels:
            severity: page
            team: predictor
            slo: run-cost-projector-availability
          annotations:
            summary: "Run cost projector Project error rate > 1% for 5m"
            runbook: "docs/operations/runbooks/run-cost-projector-errors.md"

    - name: spendguard.audit_chain
      interval: 30s
      rules:
        - alert: SpendGuardOutboxLagHigh
          expr: |
            max(spendguard_outbox_pending_oldest_age_seconds) > 60
          for: 5m
          labels:
            severity: page
            team: platform
            slo: audit-lag
          annotations:
            summary: "Audit outbox oldest pending row age > 60s for 5m"
            runbook: "docs/operations/runbooks/outbox-lag.md"
            drill_runbook: "docs/operations/drills/audit-chain-forwarder-backlog.md"

        - alert: SpendGuardOutboxNoLeader
          expr: |
            absent(spendguard_outbox_forwarder_is_leader)
            or
            sum(spendguard_outbox_forwarder_is_leader) != 1
          for: 5m
          labels:
            severity: page
            team: platform
            slo: audit-forwarding
          annotations:
            summary: "Outbox forwarder leader count is not exactly one"
            runbook: "docs/operations/runbooks/outbox-no-leader.md"
            drill_runbook: "docs/operations/drills/audit-chain-forwarder-backlog.md"

        - alert: SpendGuardCanonicalIngestRejecting
          expr: |
            sum(rate(spendguard_ingest_events_rejected_invalid_signature_total[5m])) > 0
          for: 5m
          labels:
            severity: page
            team: platform
            slo: canonical-ingest-integrity
          annotations:
            summary: "Canonical ingest is rejecting invalid signatures"
            runbook: "docs/operations/runbooks/canonical-ingest-rejects.md"

        - alert: SpendGuardSignatureQuarantineSpike
          expr: |
            sum(rate(spendguard_ingest_events_quarantined_total[5m])) > 0
          for: 10m
          labels:
            severity: warn
            team: platform
            slo: canonical-ingest-integrity
          annotations:
            summary: "Canonical ingest quarantine rate is nonzero"
            runbook: "docs/operations/runbooks/signature-quarantine-spike.md"

    - name: spendguard.drift
      interval: 60s
      rules:
        - alert: SpendGuardPredictionDriftAlerting
          expr: |
            increase(spendguard_stats_aggregator_drift_alerts_total[1h]) > 0
          for: 1m
          labels:
            severity: warn
            team: predictor
            slo: prediction-calibration
          annotations:
            summary: "Prediction drift alert emitted in the last hour"
            runbook: "docs/operations/runbooks/prediction-drift-alerts.md"

        - alert: SpendGuardTokenizerDriftEscalation
          expr: |
            increase(spendguard_tokenizer_drift_alert_oncall_escalation_total[1h]) > 0
          for: 1m
          labels:
            severity: page
            team: tokenizer
            slo: tokenizer-calibration
          annotations:
            summary: "Tokenizer drift on-call escalation emitted"
            runbook: "docs/operations/runbooks/tokenizer-drift-escalation.md"
