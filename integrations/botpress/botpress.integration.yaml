# Botpress integration manifest — SpendGuard LLM budget guardrail.
#
# NOTE: the authoritative definition is `integration.definition.ts` (consumed
# by `bp build` / `bp deploy`). This YAML is an operator-facing summary kept in
# lockstep with that definition for documentation purposes only.
#
# SpendGuard is an LLM-provider integration: Botpress invokes its
# `generateContent` action for every LLM completion, and `listLanguageModels`
# to populate the model picker. `generateContent` reserves budget with the
# SpendGuard sidecar BEFORE forwarding to the upstream provider, then commits
# real usage afterwards. DENY / DEGRADE / config errors fail the call with a
# Botpress RuntimeError (fail closed; dev escape via
# SPENDGUARD_BOTPRESS_FAIL_OPEN=1).
name: spendguard
version: 0.1.0
title: SpendGuard
description: >-
  Fail-closed LLM budget guardrail. Reserves spend against the SpendGuard
  sidecar before forwarding to the upstream provider (OpenAI / Anthropic /
  Bedrock); commits real usage after generation; fails the call with a Botpress
  RuntimeError on DENY / DEGRADE / config errors.
readme: README.md

# The configuration shape is validated at install time against the Zod schema
# in integration.definition.ts (ConfigurationObjectSchema). Mirrored here for
# operator-facing documentation only.
configuration:
  sidecarUrl: "string (URL of the SpendGuard sidecar HTTP companion)"
  spendguardBudgetId: "string (UUID of the budget to charge)"
  spendguardWindowInstanceId: "string (UUID of the window instance)"
  upstreamProvider: "enum: openai | anthropic | bedrock"
  tenantId: "string (operator tenant identifier)"
  tlsCertPath: "string (optional; path to mTLS client cert PEM)"
  tlsKeyPath: "string (optional; path to mTLS client key PEM)"
  tlsRootCaPath: "string (optional; path to sidecar CA PEM)"

entities:
  modelRef: "Reference to an upstream model the integration can route to."

actions:
  generateContent:
    description: >-
      The SpendGuard gate point. Reserves projected spend with the sidecar,
      forwards the prompt to the configured upstream provider, then commits the
      real token usage. DENY / DEGRADE / config / provider / commit failures
      throw a Botpress RuntimeError after releasing any held reservation.
  listLanguageModels:
    description: >-
      Lists the upstream models this integration can route to for the
      configured provider (seeds the Botpress model picker).
