# Botpress Integration manifest — SpendGuard pre/post AI-call budget guardrail.
#
# Generated by the SpendGuard team for the D32 Botpress coverage spec
# (docs/specs/coverage/D32_botpress/). This manifest is the v1 invariant
# install path: `botpress integrations push` (self-host Botpress v12) or
# marketplace submission (Botpress Cloud, pending approval).
#
# review-standards.md §1.1 fields:
#   - name           — `spendguard` (lowercase, semver-shaped repo identifier).
#   - version        — semver-shaped, in lockstep with package.json `version`.
#   - description    — operator-facing one-liner.
#   - icon           — relative path to a packaged SVG/PNG used in the
#                      Botpress integrations catalog. Resolved from the
#                      package root at push time.
#   - readme         — relative path to the README rendered in the
#                      Botpress integrations catalog.
name: spendguard
version: 0.1.0
description: >-
  Pre/post AI-call budget guardrail. Reserves spend against the SpendGuard
  sidecar before Botpress dispatches upstream (OpenAI / Anthropic / Bedrock);
  commits real usage after generation; throws Botpress RuntimeError on DENY
  / DEGRADE / config errors. Fail-closed default, dev escape via
  SPENDGUARD_BOTPRESS_FAIL_OPEN=1.
icon: README.md
readme: README.md

# The integration's configuration shape is the source of truth at install
# time, but the Botpress runtime validates against the Zod schema exported
# by src/config.ts (the Integration constructor wires
# `configuration.schema`). The fields below mirror that schema for
# operator-facing documentation purposes only.
configuration:
  sidecarUrl: "string (URL of the SpendGuard sidecar HTTP companion)"
  spendguardBudgetId: "string (UUID of the budget to charge)"
  spendguardWindowInstanceId: "string (UUID of the window instance)"
  upstreamProvider: "enum: openai | anthropic | bedrock"
  tenantId: "string (operator tenant identifier)"
  tlsCertPath: "string (optional; path to mTLS client cert PEM)"
  tlsKeyPath: "string (optional; path to mTLS client key PEM)"
  tlsRootCaPath: "string (optional; path to sidecar CA PEM)"

hooks:
  beforeAiGeneration:
    description: >-
      Reserves projected spend with the SpendGuard sidecar before Botpress
      dispatches the upstream model HTTP. DENY/DEGRADE throw Botpress
      RuntimeError; ALLOW returns the original `data` payload untouched.
  afterAiGeneration:
    description: >-
      Commits real usage from `event.payload.usage` (input/outputTokens).
      Missing usage falls back to the estimator snapshot captured at reserve
      time and logs a WARN. Hook-error path releases the reservation.
