chart:
  profile: production

global:
  region: kind-harden02
  imagePullPolicy: IfNotPresent

postgres:
  existingSecret: spendguard-postgres-urls
  ledgerUrlKey: ledger-url
  canonicalUrlKey: canonical-url
  controlPlaneUrlKey: control-plane-url
  tokenizerUrlKey: tokenizer-url
  outputPredictorUrlKey: output-predictor-url
  outputPredictorPluginEndpointUrlKey: output-predictor-plugin-endpoint-url
  runCostProjectorUrlKey: run-cost-projector-url
  statsAggregatorUrlKey: stats-aggregator-url
  applyMigrationsOnInstall: false

sidecar:
  endpointCatalogManifestUrl: https://endpoint-catalog.spendguard.svc.cluster.local:8443/v1/catalog/manifest
  runCostProjectorUrl: https://spendguard-spendguard-run-cost-projector:50055
  contractBundleHashHex: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  trustRootSpkiSha256Hex: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb

tokenizer:
  image:
    tag: v0.1.0
  mtlsSecretName: spendguard-tokenizer-mtls
  providerSecretName: spendguard-tokenizer-provider-keys
  canonicalIngestUrl: https://spendguard-spendguard-canonical-ingest:50052
  sinkMtlsSecretName: spendguard-tokenizer-sink-mtls
  signingKeySecretName: spendguard-tokenizer-signing-key
  signingKeyPath: /etc/spendguard/signing/signing-key.pem
  schemaBundleHashHex: cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc

outputPredictor:
  image:
    tag: v0.1.0
  mtlsSecretName: spendguard-output-predictor-mtls

runCostProjector:
  image:
    tag: v0.1.0
  mtlsSecretName: spendguard-run-cost-projector-mtls

egressProxy:
  enabled: true
  image:
    tag: v0.1.0

networkPolicy:
  enabled: true
  postgresCidrs:
    - 10.0.0.0/8

statsAggregator:
  image:
    tag: v0.1.0
  canonicalIngestUrl: https://spendguard-spendguard-canonical-ingest:50052
  sinkMtlsSecretName: spendguard-stats-aggregator-sink-mtls
  signingKeySecretName: spendguard-stats-aggregator-signing-key
  signingKeyPath: /etc/spendguard/signing/signing-key.pem
  schemaBundleHashHex: cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc

outboxForwarder:
  schemaBundleHashHex: cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
