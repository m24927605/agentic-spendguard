            - { name: SPENDGUARD_LEADER_LEASE_TTL_MS,      value: "15000" }
            - { name: SPENDGUARD_LEADER_RENEW_INTERVAL_MS, value: "5000" }
            - { name: SPENDGUARD_LEADER_RETRY_INTERVAL_MS, value: "1000" }
            # K8s Lease backend is namespaced. Bind to the release
            # namespace so multi-namespace installs don't collide on
            # the "default" namespace fallback.
            - name: SPENDGUARD_LEADER_K8S_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            # Phase 5 GA hardening S6: producer signing config.
            - { name: SPENDGUARD_PROFILE,                                value: "production" }
            - { name: SPENDGUARD_TTL_SWEEPER_SIGNING_MODE,               value: "local" }
            - { name: SPENDGUARD_TTL_SWEEPER_SIGNING_PRODUCER_IDENTITY,  value: "ttl-sweeper:$(SPENDGUARD_TTL_SWEEPER_WORKLOAD_INSTANCE_ID)" }
            - { name: SPENDGUARD_TTL_SWEEPER_SIGNING_KEY_PATH,           value: "/etc/spendguard/signing/ttl-sweeper.pem" }
          volumeMounts:
            - { name: tls, mountPath: /etc/ssl/spendguard, readOnly: true }
            - { name: signing, mountPath: /etc/spendguard/signing, readOnly: true }
      volumes:
        - name: tls
          secret:
            secretName: spendguard-prod-tls
        - name: signing
          secret:
            secretName: spendguard-prod-signing-keys
            items:
              - { key: ttl-sweeper.pem, path: ttl-sweeper.pem }
