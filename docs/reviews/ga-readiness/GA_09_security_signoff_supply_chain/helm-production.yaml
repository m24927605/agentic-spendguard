            # read TENANT_ID (the binary works against the audit_outbox
            # table directly, not per-tenant). Removed the unused env
            # var so the chart matches the binary's actual surface.
            # Phase 5 S2: per-pod-unique workload_instance_id via downward API.
            - name: _POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
