apiVersion: apps/v1
kind: Deployment
metadata:
  name: spendguard-spendguard-webhook-receiver
  labels:
    app.kubernetes.io/name: spendguard
    app.kubernetes.io/instance: spendguard
    app.kubernetes.io/version: "0.1.0-alpha.3"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spendguard-0.1.0-alpha.3
    app.kubernetes.io/component: webhook-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spendguard
      app.kubernetes.io/instance: spendguard
      app.kubernetes.io/component: webhook-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spendguard
        app.kubernetes.io/instance: spendguard
        app.kubernetes.io/version: "0.1.0-alpha.3"
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: spendguard-0.1.0-alpha.3
        app.kubernetes.io/component: webhook-receiver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook-receiver
          image: ghcr.io/m24927605/spendguard/webhook-receiver:v0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - { name: https, containerPort: 8443 }
            - { name: health, containerPort: 8080 }
            - { name: metrics, containerPort: 9098 }
          env:
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_METRICS_ADDR,         value: "0.0.0.0:9098" }
            # Round-2 #3: BIND_ADDR + HEALTH_ADDR are required by
            # Config::from_env() (no defaults). Bind values match
            # the containerPort declarations above.
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_BIND_ADDR,            value: "0.0.0.0:8443" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_HEALTH_ADDR,          value: "0.0.0.0:8080" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_TENANT_ID,            value: "00000000-0000-4000-8000-000000000001" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_FENCING_SCOPE_ID,     value: "00000000-0000-7000-a000-000000000050" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_WORKLOAD_INSTANCE_ID, value: "webhook-receiver-0" }
            # Round-2 #3: required by Config::from_env(); previously
            # unwired (production install would CrashLoopBackOff).
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_FENCING_INITIAL_EPOCH, value: "1" }
            - name: SPENDGUARD_WEBHOOK_RECEIVER_LEDGER_URL
              value: "https://spendguard-spendguard-ledger:50051"
            - name: SPENDGUARD_WEBHOOK_RECEIVER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: "spendguard-prod-postgres-urls"
                  key: "ledger-url"
            # Round-2 #3: per-tenant HMAC secret for the mock-llm
            # provider. Config field is `mock_llm_secret`, and
            # envy::from_env() (NOT prefixed) reads the env var as
            # SPENDGUARD_WEBHOOK_SECRET_MOCK_LLM. The previous chart
            # set SPENDGUARD_WEBHOOK_RECEIVER_HMAC_SECRET, which the
            # binary ignored, leaving Config::from_env() to bail with
            # "missing field mock_llm_secret".
            - name: SPENDGUARD_WEBHOOK_SECRET_MOCK_LLM
              valueFrom:
                secretKeyRef:
                  name: spendguard-prod-webhook-hmac
                  key: hmac
            # Round-2 #3: Config::from_env() distinguishes server
            # vs client TLS material (HTTPS server identity vs gRPC
            # client identity to ledger). Wire both — same files in
            # the chart, but the binary expects all four env names.
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_TLS_SERVER_CERT, value: "/etc/ssl/spendguard/webhook-receiver.crt" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_TLS_SERVER_KEY,  value: "/etc/ssl/spendguard/webhook-receiver.key" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_TLS_CLIENT_CERT, value: "/etc/ssl/spendguard/webhook-receiver.crt" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_TLS_CLIENT_KEY,  value: "/etc/ssl/spendguard/webhook-receiver.key" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_TLS_CA_PEM,      value: "/etc/ssl/spendguard/ca.crt" }
            # Phase 5 GA hardening S6: producer signing config.
            - { name: SPENDGUARD_PROFILE,                                    value: "production" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_SIGNING_MODE,              value: "local" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_SIGNING_PRODUCER_IDENTITY, value: "webhook-receiver:webhook-receiver-0" }
            - { name: SPENDGUARD_WEBHOOK_RECEIVER_SIGNING_KEY_PATH,          value: "/etc/spendguard/signing/webhook-receiver.pem" }
          volumeMounts:
            - { name: tls, mountPath: /etc/ssl/spendguard, readOnly: true }
            - { name: signing, mountPath: /etc/spendguard/signing, readOnly: true }
          readinessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tls
          secret:
            secretName: spendguard-prod-tls
        - name: signing
          secret:
            secretName: spendguard-prod-signing-keys
            items:
              - { key: webhook-receiver.pem, path: webhook-receiver.pem }
