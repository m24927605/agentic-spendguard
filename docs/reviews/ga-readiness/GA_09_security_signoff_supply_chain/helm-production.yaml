apiVersion: apps/v1
kind: Deployment
metadata:
  name: spendguard-spendguard-tokenizer
  labels:
    app.kubernetes.io/name: spendguard
    app.kubernetes.io/instance: spendguard
    app.kubernetes.io/version: "0.1.0-alpha.3"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spendguard-0.1.0-alpha.3
    app.kubernetes.io/component: tokenizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spendguard
      app.kubernetes.io/instance: spendguard
      app.kubernetes.io/component: tokenizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spendguard
        app.kubernetes.io/instance: spendguard
        app.kubernetes.io/version: "0.1.0-alpha.3"
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: spendguard-0.1.0-alpha.3
        app.kubernetes.io/component: tokenizer
    spec:
      # Round-2 fix M7: pod-level securityContext — runAsNonRoot +
      # seccomp baseline matching CIS Kubernetes Benchmark §5.7. Container
      # securityContext below adds read-only rootfs + drop ALL caps.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tokenizer
          image: ghcr.io/m24927605/spendguard/tokenizer:v0.1.0
          imagePullPolicy: IfNotPresent
          # Round-2 fix M7: container-level securityContext.
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - { name: grpc,    containerPort: 50053 }
            - { name: metrics, containerPort: 9099  }
          env:
            - { name: SPENDGUARD_TOKENIZER_LISTEN_ADDR,           value: "0.0.0.0:50053" }
            - { name: SPENDGUARD_TOKENIZER_METRICS_ADDR,          value: "0.0.0.0:9099"  }
            - { name: SPENDGUARD_TOKENIZER_REGION,                value: "us-west-2" }
            # Per spec §5.3 health invariant — Tier 3 hit-rate
            # alerting threshold. SLICE_03 plumbs the value through
            # Config; the alert wire-up itself lands in SLICE-extra.
            - { name: SPENDGUARD_TOKENIZER_TIER3_ALERT_THRESHOLD, value: "0.001" }
            # ── SLICE_05: Tier 1 shadow drift detection ────────────
            # Per spec §4 + §11 rollback plan, shadowEnabled is a
            # master kill-switch. Default true; operators set to
            # false to disable the shadow worker entirely (Tier 2
            # hot path is unaffected).
            - { name: SPENDGUARD_TOKENIZER_SHADOW_ENABLED,        value: "true" }
            # Default sample rate per spec §4.1 (1% = 0.01).
            # Per-(tenant, model) override via the control plane API.
            - { name: SPENDGUARD_TOKENIZER_SHADOW_DEFAULT_SAMPLE_RATE, value: "0.01" }
            # canonical_ingest gRPC endpoint for signed
            # tokenizer_drift_alert CloudEvent emission.
            - { name: SPENDGUARD_TOKENIZER_CANONICAL_INGEST_URL,  value: "https://spendguard-spendguard-canonical-ingest:50052" }
            # HARDEN_03 / #168: AppendEventsRequest schema bundle
            # envelope. Production profile gates this above; demo may
            # leave the hash empty because canonical_ingest is unset and
            # the sink is not constructed.
            - { name: SPENDGUARD_TOKENIZER_SCHEMA_BUNDLE_ID,       value: "22222222-2222-4222-8222-222222222222" }
            - { name: SPENDGUARD_TOKENIZER_SCHEMA_BUNDLE_HASH_HEX, value: "4444444444444444444444444444444444444444444444444444444444444444" }
            - { name: SPENDGUARD_TOKENIZER_CANONICAL_SCHEMA_VERSION, value: "spendguard.v1alpha1" }
            # Postgres URL for tokenizer_t1_samples persistence.
            # Migration 0051 owns the schema.
            - name: SPENDGUARD_TOKENIZER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: "spendguard-prod-postgres-urls"
                  key: "tokenizer-url"
            # Least-privilege control-plane DB path for durable per-(tenant, model)
            # sample-rate overrides plus HARDEN_05 per-tenant PII opt-in
            # and shared count_tokens quota claims. The worker sets
            # app.current_tenant_id per event, so RLS remains the isolation
            # boundary across tokenizer replicas. This Secret key must map
            # to tokenizer_shadow_runtime_role, not the control-plane writer.
            - name: SPENDGUARD_TOKENIZER_SAMPLING_OVERRIDE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: "spendguard-prod-postgres-urls"
                  key: "tokenizer-shadow-url"
            # Provider API keys for Anthropic / Gemini Tier 1
            # count_tokens calls. Mounted from a pre-created Secret
            # so the keys never appear in the Helm release secrets
            # or Deployment manifest. Demo: both optional (worker falls
            # back to drop-only when neither key is present). Production
            # (chart.profile=production + shadowEnabled=true): the
            # template-level fail-fast above requires this Secret to
            # exist; at least ONE of the two keys MUST be populated for
            # the shadow worker to make any provider call.
            # R2 M12: optional flag flipped to false in production so a
            # rotated/missing key surfaces as a CrashLoopBackoff instead
            # of silent shadow-disablement.
            - name: SPENDGUARD_TOKENIZER_ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: "spendguard-prod-tokenizer-provider-keys"
                  key: anthropic-api-key
                  optional: false
            - name: SPENDGUARD_TOKENIZER_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: "spendguard-prod-tokenizer-provider-keys"
                  key: gemini-api-key
                  optional: false
            # R2 B4: outbound mTLS to canonical_ingest for the
            # tokenizer_drift_alert CloudEvent sink. Required under
            # chart.profile=production + shadowEnabled=true. Paths
            # match the cert-manager mount convention the sidecar uses.
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_CERT_PEM, value: "/etc/spendguard/sink-tls/tls.crt" }
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_KEY_PEM,  value: "/etc/spendguard/sink-tls/tls.key" }
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_CA_PEM,   value: "/etc/spendguard/sink-tls/ca.crt"  }
            - { name: SPENDGUARD_TOKENIZER_SINK_TLS_SNI,      value: "canonical-ingest.spendguard.internal" }
            # R2 B1: producer identity + signing mode for the audit-routed
            # drift_alert CloudEvent. Mirrors the env contract used by
            # sidecar / canonical_ingest / ledger via signer_from_env.
            - { name: SPENDGUARD_PROFILE,                     value: "production" }
            - { name: SPENDGUARD_TOKENIZER_SIGNING_PRODUCER_IDENTITY, value: "tokenizer-service:us-west-2" }
            - { name: SPENDGUARD_TOKENIZER_SIGNING_MODE,      value: "local" }
            - { name: SPENDGUARD_TOKENIZER_SIGNING_KEY_PATH,  value: "/etc/spendguard/signing/signing-key.pem" }
            # Round-2 fix B3.2: mTLS — paths into the mounted Secret.
            - { name: SPENDGUARD_TOKENIZER_TLS_CERT_PEM,          value: "/etc/spendguard/tls/tls.crt" }
            - { name: SPENDGUARD_TOKENIZER_TLS_KEY_PEM,           value: "/etc/spendguard/tls/tls.key" }
            - { name: SPENDGUARD_TOKENIZER_TLS_CA_PEM,            value: "/etc/spendguard/tls/ca.crt" }
          volumeMounts:
            # Round-2 fix M7: read-only rootfs requires /tmp writable for
            # any scratch + spilled state from tonic/h2.
            - name: tmp
              mountPath: /tmp
            - name: tls
              mountPath: /etc/spendguard/tls
              readOnly: true
            # R2 B4: outbound mTLS material for canonical_ingest sink.
            - name: sink-tls
              mountPath: /etc/spendguard/sink-tls
              readOnly: true
            # R2 B1: PKCS8 PEM key for Ed25519 drift_alert CloudEvent
            # signing. Mounted from a Secret named `signingKeySecretName`
            # at the path the SPENDGUARD_TOKENIZER_SIGNING_KEY_PATH env
            # points at.
            - name: signing-key
              mountPath: /etc/spendguard/signing
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 192Mi
      volumes:
        - name: tmp
          emptyDir: {}
        - name: tls
          secret:
            secretName: "spendguard-prod-tokenizer-mtls"
        - name: sink-tls
          secret:
            secretName: "spendguard-prod-tokenizer-sink-mtls"
        - name: signing-key
          secret:
            secretName: "spendguard-prod-tokenizer-signing-key"
