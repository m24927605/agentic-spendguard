---
# Source: spendguard/templates/networkpolicy.yaml
# ────────────────────────────────────────────────────────────────────────
# Default-deny egress: every pod with this label denies ALL egress unless
# a sibling NetworkPolicy below explicitly allows it. Pods in this
# namespace MUST opt-in to the SpendGuard L2 enforcement model by
# carrying the `spendguard.io/enforced=true` label.
#
# This is the per-tenant kill switch: a pod not carrying the label is
# untouched by L2 enforcement (gradual migration path). Pods carrying
# the label can ONLY egress via the sidecar-pod-allow + provider-allow
# policies below.
# ────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spendguard-spendguard-default-deny-egress
  labels:
    app.kubernetes.io/name: spendguard
    app.kubernetes.io/instance: spendguard
    app.kubernetes.io/version: "0.1.0-alpha.3"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spendguard-0.1.0-alpha.3
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      spendguard.io/enforced: "true"
  policyTypes:
    - Egress
  # Empty egress list = deny-all-egress for pods matching the selector.
---
# Source: spendguard/templates/networkpolicy.yaml
# ────────────────────────────────────────────────────────────────────────
# Allow enforced app pods to reach the egress_proxy. This is the only
# permitted upstream egress for L2-enforced pods: app code MUST use the
# proxy as the OpenAI/Anthropic/Bedrock/Vertex/Azure SDK base_url.
# ────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spendguard-spendguard-allow-app-to-egress-proxy
  labels:
    app.kubernetes.io/name: spendguard
    app.kubernetes.io/instance: spendguard
    app.kubernetes.io/version: "0.1.0-alpha.3"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spendguard-0.1.0-alpha.3
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      spendguard.io/enforced: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spendguard
              app.kubernetes.io/instance: spendguard
              app.kubernetes.io/component: egress-proxy
      ports:
        - { protocol: TCP, port: 9000 }
---
# Source: spendguard/templates/networkpolicy.yaml
# ────────────────────────────────────────────────────────────────────────
# Allow DNS lookup (UDP + TCP 53). Without this, ALL DNS resolution
# fails inside enforced pods → connections to the egress_proxy
# ClusterIP service can't be resolved by name.
# ────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spendguard-spendguard-allow-app-dns
  labels:
    app.kubernetes.io/name: spendguard
    app.kubernetes.io/instance: spendguard
    app.kubernetes.io/version: "0.1.0-alpha.3"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spendguard-0.1.0-alpha.3
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      spendguard.io/enforced: "true"
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
# Source: spendguard/templates/networkpolicy.yaml
# ────────────────────────────────────────────────────────────────────────
# Allow egress_proxy → external LLM provider hosts (port 443/HTTPS).
#
# The set of providers is the SLICE_11 routing-table coverage:
#   api.openai.com
#   api.anthropic.com
#   bedrock-runtime.{region}.amazonaws.com   (operator pins region)
#   generativelanguage.googleapis.com        (Vertex)
#   {azure_resource}.openai.azure.com        (Azure OpenAI; per-tenant)
#
# K8s NetworkPolicy egress.to.ipBlock only supports CIDR (no DNS), so
# we ALLOW any external destination on port 443 from the egress_proxy
# pod (loose). For tight pinning (operator-specific provider IPs),
# operators replace this template with a CIDR allowlist via Helm
# extraEgressRules. v1 ships the broad allow because:
#   - External LLM provider IPs rotate frequently (CDN-fronted).
#   - The L2 contract is "app pods CANNOT reach external LLM APIs
#     directly"; the proxy can — operator's choice whether to
#     additionally CIDR-restrict the proxy's egress.
# ────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spendguard-spendguard-allow-egress-proxy-to-providers
  labels:
    app.kubernetes.io/name: spendguard
    app.kubernetes.io/instance: spendguard
    app.kubernetes.io/version: "0.1.0-alpha.3"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spendguard-0.1.0-alpha.3
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spendguard
      app.kubernetes.io/instance: spendguard
      app.kubernetes.io/component: egress-proxy
  policyTypes:
    - Egress
  egress:
    # External LLM providers — port 443 HTTPS.
    - to:
        - ipBlock:
            cidr: "203.0.113.0/24"
      ports:
        - { protocol: TCP, port: 443 }
    # DNS (resolve provider hostnames).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # Postgres (audit_outbox writes).
    - to:
        - ipBlock:
            cidr: "198.51.100.10/32"
      ports:
        - { protocol: TCP, port: 5432 }
---
# Source: spendguard/templates/networkpolicy.yaml
# ────────────────────────────────────────────────────────────────────────
# Allow sidecar → egress_proxy / tokenizer / output_predictor /
# run_cost_projector / canonical_ingest / Postgres / DNS.
# ────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spendguard-spendguard-allow-sidecar-internal
  labels:
    app.kubernetes.io/name: spendguard
    app.kubernetes.io/instance: spendguard
    app.kubernetes.io/version: "0.1.0-alpha.3"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: spendguard-0.1.0-alpha.3
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spendguard
      app.kubernetes.io/instance: spendguard
      app.kubernetes.io/component: sidecar
  policyTypes:
    - Egress
  egress:
    # egress_proxy (sidecar's UDS path is unaffected — same pod / hostPath;
    # this allow is for the L4 fallback path when UDS hostPath disabled).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spendguard
              app.kubernetes.io/instance: spendguard
              app.kubernetes.io/component: egress-proxy
      ports:
        - { protocol: TCP, port: 9000 }
    # tokenizer gRPC.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spendguard
              app.kubernetes.io/instance: spendguard
              app.kubernetes.io/component: tokenizer
      ports:
        - { protocol: TCP, port: 50053 }
    # output_predictor gRPC.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spendguard
              app.kubernetes.io/instance: spendguard
              app.kubernetes.io/component: output-predictor
      ports:
        - { protocol: TCP, port: 50054 }
    # run_cost_projector gRPC.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spendguard
              app.kubernetes.io/instance: spendguard
              app.kubernetes.io/component: run-cost-projector
      ports:
        - { protocol: TCP, port: 50055 }
    # canonical_ingest gRPC (audit append).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spendguard
              app.kubernetes.io/instance: spendguard
              app.kubernetes.io/component: canonical-ingest
      ports:
        - { protocol: TCP, port: 50052 }
    # ledger gRPC.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: spendguard
              app.kubernetes.io/instance: spendguard
              app.kubernetes.io/component: ledger
      ports:
        - { protocol: TCP, port: 50051 }
    # DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # Postgres.
    - to:
        - ipBlock:
            cidr: "198.51.100.10/32"
      ports:
        - { protocol: TCP, port: 5432 }
---
