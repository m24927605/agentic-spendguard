            - { name: SPENDGUARD_STATS_AGGREGATOR_MIN_SAMPLES_FOR_ALERT,  value: "100" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_DRIFT_Z_THRESHOLD,      value: "2" }
            - name: SPENDGUARD_STATS_AGGREGATOR_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: "spendguard-prod-postgres-urls"
                  key: "stats-aggregator-url"
            - { name: SPENDGUARD_STATS_AGGREGATOR_CANONICAL_INGEST_URL,   value: "https://spendguard-spendguard-canonical-ingest:50052" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SINK_TLS_CERT_PEM,      value: "/etc/spendguard/sink-tls/tls.crt" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SINK_TLS_KEY_PEM,       value: "/etc/spendguard/sink-tls/tls.key" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SINK_TLS_CA_PEM,        value: "/etc/spendguard/sink-tls/ca.crt"  }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SINK_TLS_SNI,           value: "canonical-ingest.spendguard.internal" }
            # SLICE_06: producer identity + signing mode for the audit-routed
            # prediction_drift_alert CloudEvent. Mirrors tokenizer SLICE_05
            # R2 B1 env contract for signer_from_env.
            - { name: SPENDGUARD_PROFILE,                                 value: "production" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SIGNING_PRODUCER_IDENTITY, value: "stats-aggregator:us-west-2" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SIGNING_MODE,           value: "local" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SIGNING_KEY_PATH,       value: "/etc/spendguard/signing/signing-key.pem" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SCHEMA_BUNDLE_ID,       value: "22222222-2222-4222-8222-222222222222" }
            - { name: SPENDGUARD_STATS_AGGREGATOR_SCHEMA_BUNDLE_HASH_HEX, value: "5555555555555555555555555555555555555555555555555555555555555555" }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: sink-tls
              mountPath: /etc/spendguard/sink-tls
              readOnly: true
            - name: signing-key
              mountPath: /etc/spendguard/signing
              readOnly: true
          livenessProbe:
            httpGet:
              # R2 M8: /livez is pure process liveness — won't restart
              # the pod just because DB connectivity is flaky (that's
