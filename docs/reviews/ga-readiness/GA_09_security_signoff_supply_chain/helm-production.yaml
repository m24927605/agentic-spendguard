            # readiness; the file paths are unchanged.
            - { name: SPENDGUARD_OUTBOX_FORWARDER_TLS_CLIENT_CERT, value: "/etc/ssl/spendguard/outbox-forwarder.crt" }
            - { name: SPENDGUARD_OUTBOX_FORWARDER_TLS_CLIENT_KEY,  value: "/etc/ssl/spendguard/outbox-forwarder.key" }
            - { name: SPENDGUARD_OUTBOX_FORWARDER_TLS_CA_PEM,      value: "/etc/ssl/spendguard/ca.crt" }
            # Round-2 #3: required by Config::from_env(); previously
            # unwired (production install would CrashLoopBackOff). The
            # bundle ID + hash MUST be byte-exact match for the schema
