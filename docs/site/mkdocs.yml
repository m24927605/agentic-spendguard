site_name: SpendGuard
site_description: >-
  Open-source runtime safety layer that gates every LLM call against a budget
  before the spend lands. Pre-call enforcement, immutable audit chain,
  framework adapters for Pydantic-AI, LangChain, LangGraph, OpenAI Agents, AGT.
# Public docs URL. Used by mkdocs-material to emit <link rel="canonical">
# tags, absolute sitemap.xml URLs, and absolute OG image URLs. Deployment
# target: GitHub Pages on the user-pages domain under the agentic-spendguard
# project path. Update if the docs move to a custom domain.
site_url: https://m24927605.github.io/agentic-spendguard/
repo_url: https://github.com/m24927605/agentic-spendguard
edit_uri: edit/main/docs/site/docs/

extra:
  # Suppress "Made with Material for MkDocs" footer (gives a tiny boost to
  # crawl efficiency by reducing boilerplate; cosmetic SEO win).
  generator: false

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Use cases:
      - Pre-call budget caps: use-cases/pre-call-budget-cap.md
      - Stop a runaway agent: use-cases/agent-runaway-protection.md
      - Reservation pattern: use-cases/reservation-pattern.md
  - Concepts:
      - 6-layer architecture: concepts/architecture.md
      - Decision lifecycle: concepts/decision-lifecycle.md
      - Audit chain: concepts/audit-chain.md
      - Pricing & USD budget: concepts/pricing-and-usd.md
  - Deployment:
      - Docker compose (POC): deployment/docker-compose.md
      - Helm chart (k8s): deployment/helm.md
      - Terraform (AWS): deployment/terraform-aws.md
  - Authoring contracts:
      - Contract YAML reference: contracts/yaml.md
      - Rule examples: contracts/examples.md
  - Adapter integrations:
      - Pydantic-AI: integrations/pydantic-ai.md
      - LangChain & LangGraph: integrations/langchain.md
      - OpenAI Agents SDK: integrations/openai-agents.md
      - Microsoft AGT: integrations/agt.md
  - Operations:
      - Dashboard: operations/dashboard.md
      - Control plane API: operations/control-plane.md
  - Roadmap:
      - GA hardening slices: roadmap/ga-hardening-slices.md
  - Reference:
      - Wire protocol (proto): reference/proto.md
      - Ledger schema: reference/ledger-schema.md
      - Error codes: reference/error-codes.md
  - POC vs GA gates: poc-vs-ga.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['../../']
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  # Social cards: auto-generates Open Graph + Twitter Card PNGs per page
  # using the page title + meta.description front-matter. Requires the
  # mkdocs-material[imaging] extra (Pillow + cairosvg) — see requirements.txt.
  - social:
      cards: true
      cards_layout_options:
        background_color: "#3F51B5"
        color: "#FFFFFF"
