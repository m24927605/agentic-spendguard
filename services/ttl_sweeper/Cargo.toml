[package]
name = "spendguard-ttl-sweeper"
version = "0.1.0-alpha"
edition = "2021"
license = "Apache-2.0"
description = "SpendGuard TTL Sweeper: background worker that releases expired reservations via Ledger.Release(reason=TTL_EXPIRED). Closes Step 7.5 P1.1 known POC gap."

[[bin]]
name = "spendguard-ttl-sweeper"
path = "src/main.rs"

[dependencies]
time = { version = "=0.3.49", default-features = false }  # pin: 0.3.50 is broken (references time_macros::timestamp absent in its paired time-macros 0.2.29); float again once a fixed 0.3.51+ ships
tokio = { version = "1", features = ["full"] }
tonic = { version = "0.12", features = ["tls", "transport"] }
prost = "0.13"
prost-types = "0.13"
sqlx = { version = "0.8", features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
    "uuid",
    "chrono",
] }
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
rustls = "0.23"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v7", "v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
envy = "0.4"
async-trait = "0.1"

# Phase 5 S1: shared lease primitive for singleton workers.
spendguard-leases = { path = "../leases" }

# Phase 5 S6: shared signing crate.
spendguard-signing = { path = "../signing" }

# Round-2 #11: Prometheus /metrics endpoint.
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"

[build-dependencies]
tonic-build = "0.12"
prost-build = "0.13"
