# model_default_distribution.toml — cold-start L2 baseline distributions.
#
# Spec ref:
#   * cold-start-baseline-spec-v1alpha1.md §4 (TOML schema + curation)
#   * cold-start-baseline-spec-v1alpha1.md §7 (source curation flow)
#   * output-predictor-service-spec-v1alpha1.md §7 (L4 → L3 → L2 → L1 chain)
#
# Initial v1alpha1 hand-curated baselines for SLICE_08:
#   * 10 models × 7 prompt classes = 70 entries
#   * Source citations in docs/cold-start-baseline-sources.md
#   * sample_size ≥ 500 per spec §7.3 quality bar
#   * confidence reflects reviewer-judged data quality (0.3-0.7 typical for v1alpha1)
#
# Refresh cadence: quarterly per spec §7.2 — Q3 2026 first refresh window.
# Quality bar: each entry derived from public benchmark with reproducible
# methodology; class assignment validated by reviewer.
#
# Lookup semantics per spec §2.3:
#   - L4 (cache hit + samples ≥ 30) → unset cold_start_layer_used
#   - L3 (federated; deferred per §5.6) → 'L3'
#   - L2 (this TOML) → 'L2'
#   - L1 (hard fallback) → 'L1'
#
# When this TOML lacks a (model, class) entry, the cold-start chain falls
# from L2 → L1; that's expected per spec §8 failure mode "Specific (model,
# class) entry missing".

schema_version = "v1alpha1"
last_updated = "2026-05-30"
notes = "Initial SLICE_08 curation; quarterly refresh per spec §7.2."

