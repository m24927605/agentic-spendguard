# model_context_window.toml — bundled lookup table for Strategy A.
#
# Spec ref output-predictor-service-spec-v1alpha1.md §3.2.
#
# Each entry maps a model identifier (as it appears in
# `PredictRequest.model`) to its context window size in tokens. Used by
# Strategy A when the caller does not supply `model_context_window`
# explicitly (sidecar typically does — this table is the fallback).
#
# Unknown models fall back to
# `SPENDGUARD_OUTPUT_PREDICTOR_UNKNOWN_MODEL_CONTEXT_WINDOW` (default 8000
# per spec §3.3).
#
# Refresh cadence: same quarterly cadence as
# `model_default_distribution.toml` (SLICE_08+). When vendors release
# new models or change context windows, bump the entries here and ship
# a new output_predictor binary.
#
# Sources (as of 2026-05-30):
#   * OpenAI: https://platform.openai.com/docs/models
#   * Anthropic: https://docs.anthropic.com/en/docs/models-overview
#   * Google: https://ai.google.dev/gemini-api/docs/models/gemini

# ── OpenAI ──────────────────────────────────────────────────────────
[[entries]]
model = "gpt-4o"
context_window = 128000

