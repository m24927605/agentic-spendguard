[package]
name = "spendguard-tokenizer-service"
version = "0.1.0-alpha"
edition = "2021"
license = "Apache-2.0"
description = "SpendGuard tokenizer service: gRPC over mTLS centralized form per tokenizer-service-spec-v1alpha1.md §2.1(a). Wraps the spendguard-tokenizer library crate (in-process Tier 2 BPE) plus a ShadowVerify stub (Tier 1; SLICE_05 wires the real shadow worker). SLICE_03 scope: tonic server skeleton + UDS bind + metrics endpoint."

[[bin]]
name = "spendguard-tokenizer"
path = "src/main.rs"

[lib]
name = "spendguard_tokenizer_service"
path = "src/lib.rs"

[dependencies]
# Library form — the service is a thin tonic wrapper around the
# in-process tokenizer; both forms share the same dispatch table +
# encoder cache (per spec §2.1).
#
# R2 M6: enable the opt-in `cohere` feature for the tokenizer service
# binary + integration tests. The service is the centralized form per
# spec §2.1(a); deployments still gate the Cohere encoder behind their
# own legal review when linking the library form (sidecar /
# egress_proxy default to feature OFF). The slice04 golden samples
# integration tests live here and require the Cohere dispatch entries
# to be present.
spendguard-tokenizer = { path = "../../crates/spendguard-tokenizer", features = ["cohere"] }

# Direct rustls dep so main() can call CryptoProvider::install_default()
rustls = "0.23"

# gRPC + protobuf (server side only — tokenizer is a leaf service
# with no outbound RPCs in SLICE_03).
tonic = { version = "0.12", features = ["tls", "transport"] }
prost = "0.13"
prost-types = "0.13"

# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"
async-stream = "0.3"

# HTTP / Prometheus /metrics endpoint (raw hyper, matching the ledger
# / canonical_ingest convention so there's no `prometheus` crate
# dependency to track).
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"

# UDS support: round-2 fix B3.1 (panel finding): tokio-vsock was the
# wrong crate (VM-socket protocol, not Unix socket). UDS binding now
# uses tokio::net::UnixListener (already a dep of `tokio = "1"`) +
# tonic's Server::serve_with_incoming() pattern (precedent:
# services/sidecar/src/main.rs:262-296). No additional crate dep is
# needed; tonic-build's transport feature already enables UDS.
#
# Errors / logging
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Config (env-driven for POC, mirrors sidecar / ledger)
envy = "0.4"
serde = { version = "1", features = ["derive"] }

# UUIDs (request_id mint)
uuid = { version = "1", features = ["v7"] }

# SLICE_05: HTTP client for Anthropic / Gemini provider count_tokens
# APIs (Tier 1 shadow). `rustls-tls` keeps the TLS surface
# single-provider (matches the aws_lc_rs default_provider main.rs
# installs); `json` feature serialises request bodies; default-features
# off drops the native-tls fallback we don't want.
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1"
hex = "0.4"

# SLICE_05: random float for sample rate gating. Default features
# omitted to drop `getrandom`'s wasm-only paths; the `std` + `std_rng`
# defaults we keep are enough for ThreadRng.
rand = { version = "0.8", default-features = false, features = ["std", "std_rng"] }

# SLICE_05: parking_lot RwLock for SampleRateState per-(tenant, model)
# map + CircuitBreaker per-(tenant, model) state. Faster than std for
# read-mostly workloads and provides poison-free guards (so a panicked
# shadow worker can't deadlock the gRPC handler that shares the lock).
parking_lot = "0.12"

# SLICE_05: Ed25519 producer signing for `tokenizer_drift_alert`
# CloudEvent emitted by the shadow worker. Reuses the canonical
# Signer trait + LocalEd25519Signer + DisabledSigner triad already
# wired in sidecar / canonical_ingest / ttl_sweeper.
spendguard-signing = { path = "../signing" }
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"

# SLICE_05: SQL persistence for tokenizer_t1_samples. sqlx-postgres
# behind tls-rustls (matching the sidecar / ledger convention) and
# without the macros feature (we use query() / query_as() / fetch_one
# patterns to keep compile-time DB checks off).
sqlx = { version = "0.8", default-features = false, features = [
    "postgres",
    "runtime-tokio",
    "tls-rustls",
    "uuid",
    "chrono",
] }

# SLICE_05: prost CloudEvent uses bytes::Bytes for the signature +
# data fields; the worker constructs both via Bytes::new() / Bytes::from.
bytes = "1"

[build-dependencies]
tonic-build = "0.12"
prost-build = "0.13"

[dev-dependencies]
pretty_assertions = "1"
tempfile = "3"
tokio = { version = "1", features = ["test-util", "macros", "rt-multi-thread"] }

# SLICE_05: mock HTTP server for provider client unit tests. wiremock
# spins up a tokio HTTP server per test fixture, so the Anthropic /
# Gemini clients can be unit-tested without provider credentials.
wiremock = "0.6"
testcontainers = "0.23"
testcontainers-modules = { version = "0.11", features = ["postgres"] }

[features]
default = []
