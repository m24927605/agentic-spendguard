[package]
name = "spendguard-signing"
version = "0.1.0-alpha"
edition = "2021"
license = "Apache-2.0"
description = "Phase 5 GA hardening S6: producer signing abstraction. Trait + LocalEd25519Signer + KmsSigner stub + DisabledSigner. Consumed by audit-producing services (sidecar, webhook_receiver, ttl_sweeper, ledger handlers)."

[lib]
name = "spendguard_signing"
path = "src/lib.rs"

[dependencies]
ed25519-dalek = { version = "2", features = ["pkcs8", "pem", "rand_core"] }
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
thiserror = "1"
anyhow = "1"
tracing = "0.1"
sha2 = "0.10"
hex = "0.4"

# Phase 5 GA hardening S7: keys.json manifest parse + audit-marker JSON.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Round-2 #8 PR 8b: AWS KMS-backed signing for production deployments.
# aws-sdk-kms 1.x transitive deps require rustc 1.91 (bumped in PR 8a).
aws-config = "1"
aws-sdk-kms = "1"

# Round-2 #8 ECDSA verifier follow-up: P-256 verify for KMS-signed
# audit rows. `pem` features enable SPKI parse from operator-supplied
# `keys.json` manifest entries.
p256 = { version = "0.13", default-features = false, features = ["pkcs8", "ecdsa", "pem", "std"] }
spki = { version = "0.7", features = ["pem"] }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
tempfile = "3"
rand = "0.8"
