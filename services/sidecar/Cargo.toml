[package]
name = "spendguard-sidecar"
version = "0.1.0-alpha"
edition = "2021"
license = "Apache-2.0"
description = "SpendGuard per-workload-instance sidecar: in-process adapter UDS gRPC + Ledger / Canonical Ingest clients + Contract DSL evaluator + decision transaction state machine"

[[bin]]
name = "spendguard-sidecar"
path = "src/main.rs"

[dependencies]
# gRPC + protobuf (server for adapter UDS; clients for ledger + canonical ingest)
tonic = { version = "0.12", features = ["tls", "transport", "gzip"] }
prost = "0.13"
prost-types = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tower = { version = "0.5", features = ["limit", "timeout"] }
tower-http = { version = "0.6", features = ["trace"] }
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
async-trait = "0.1"
futures = "0.3"

# UDS
tokio-vsock = { version = "0.5", optional = true }
nix = { version = "0.29", features = ["socket", "uio", "user"] }

# HTTP client (Endpoint Catalog manifest pull)
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }

# Crypto / signing
ed25519-dalek = { version = "2", features = ["pkcs8", "pem"] }
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# UUIDs
uuid = { version = "1", features = ["v7", "v4", "serde"] }

# Big decimal for NUMERIC(38,0) amount math (Phase 2B Step 7 commit).
num-bigint = "0.4"

# Time
chrono = { version = "0.4", features = ["serde"] }

# CEL evaluator (Contract DSL predicate language)
cel-interpreter = "0.9"

# Errors / logging
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Config
envy = "0.4"

# JSON Pointer for RFC6902 mutation patches (Contract §11)
json-patch = "2"

# Sync primitives (parking_lot for fast non-poisoning RwLock).
parking_lot = "0.12"

# Async stream macro (used by the UDS incoming connection adapter in main).
async-stream = "0.3"

[build-dependencies]
tonic-build = "0.12"
prost-build = "0.13"

[features]
default = []
# Enable experimental Lambda Extensions runtime support (Phase 2+).
lambda-extension = []

[dev-dependencies]
testcontainers = "0.23"
pretty_assertions = "1"
tempfile = "3"
