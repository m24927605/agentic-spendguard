[package]
name = "spendguard-sidecar"
version = "0.1.0-alpha"
edition = "2021"
license = "Apache-2.0"
description = "SpendGuard per-workload-instance sidecar: in-process adapter UDS gRPC + Ledger / Canonical Ingest clients + Contract DSL evaluator + decision transaction state machine"

[[bin]]
name = "spendguard-sidecar"
path = "src/main.rs"

# D09 SLICE 1: integration test for the HTTP companion wire surface.
# Requires the http-companion-test-support feature so it can reach
# `test_support::ephemeral_pki` and `build_router_for_tests` from the
# library crate.
[[test]]
name = "http_companion_test"
path = "tests/http_companion_test.rs"
required-features = ["http-companion-test-support"]

[dependencies]

# Direct rustls dep so main() can call CryptoProvider::install_default()
rustls = "0.23"
# gRPC + protobuf (server for adapter UDS; clients for ledger + canonical ingest)
tonic = { version = "0.12", features = ["tls", "transport"] }
prost = "0.13"
prost-types = "0.13"
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tower = { version = "0.5", features = ["limit", "timeout"] }
tower-http = { version = "0.6", features = ["trace"] }
hyper = { version = "1", features = ["http1", "server"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
async-trait = "0.1"
futures = "0.3"

# UDS
tokio-vsock = { version = "0.5", optional = true }
nix = { version = "0.29", features = ["socket", "uio", "user"] }

# HTTP client (Endpoint Catalog manifest pull)
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }

# Crypto / signing
ed25519-dalek = { version = "2", features = ["pkcs8", "pem"] }
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
base64 = "0.22"
# X.509 leaf parsing for per-tenant SPIFFE-URI SAN pinning on the HTTP
# companion mTLS surface (D09 SLICE 6 / HARDEN_08). Mirrors the version
# used by services/output_predictor for the predictor-client SVID path.
x509-parser = "0.16"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Phase 3 wedge: extract contract.yaml from bundle .tgz at startup.
flate2 = "1"
tar = "0.4"

# UUIDs
uuid = { version = "1", features = ["v7", "v4", "serde"] }

# Big decimal for NUMERIC(38,0) amount math (Phase 2B Step 7 commit).
num-bigint = "0.4"

# Time
chrono = { version = "0.4", features = ["serde"] }

# CEL evaluator (Contract DSL predicate language)
cel-interpreter = "0.9"

# Errors / logging
thiserror = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Config
envy = "0.4"

# JSON Pointer for RFC6902 mutation patches (Contract §11)
json-patch = "2"

# Sync primitives (parking_lot for fast non-poisoning RwLock).
parking_lot = "0.12"

# Async stream macro (used by the UDS incoming connection adapter in main).
async-stream = "0.3"

# Phase 5 GA hardening S6: shared signing crate (Ed25519 producer signing).
spendguard-signing = { path = "../signing" }

# Phase 5 GA hardening S22: fail-open / fail-closed policy matrix.
spendguard-policy = { path = "../policy" }

# D09 SLICE 1: HTTP companion listener (axum) over mTLS for out-of-process
# plugins that cannot speak the adapter UDS gRPC contract (Kong Go plugin,
# Coze plugin daemon, Botpress integration). Mirrors the gRPC adapter
# handler semantics 1:1 but speaks JSON over HTTP/1.1+mTLS. Default OFF;
# enabled when SPENDGUARD_SIDECAR_HTTP_COMPANION_PORT > 0.
axum = { version = "0.7", features = ["json", "http1"] }
tokio-rustls = "0.26"
rustls-pemfile = "2"
rustls-pki-types = "1"
# rcgen — gated behind `http-companion-test-support` so the integration
# tests can mint an ephemeral CA + workload + client cert without
# checking PEMs into the repo. Optional and feature-gated so release
# binaries never link rcgen.
rcgen = { version = "0.13", optional = true }

[build-dependencies]
tonic-build = "0.12"
prost-build = "0.13"

[features]
default = []
# Enable experimental Lambda Extensions runtime support (Phase 2+).
lambda-extension = []
# D09 SLICE 1: surface http_companion::test_support + build_router_for_tests
# for integration tests living in `services/sidecar/tests/`. cargo runs
# integration tests against the lib compiled WITHOUT `cfg(test)`, so the
# integration-only re-exports gate on this feature instead. The feature
# also turns on the optional `rcgen` dep used by the ephemeral PKI
# helper; release binaries do NOT link rcgen.
http-companion-test-support = ["dep:rcgen"]

[dev-dependencies]
testcontainers = "0.23"
pretty_assertions = "1"
tempfile = "3"
# rcgen is also an optional [dependencies] entry (feature-gated out of
# release builds). It is additionally a dev-dependency so lib unit tests
# (`#[cfg(test)]`, e.g. http_companion::mtls::placeholder_for_tests) can
# mint ephemeral certs without enabling http-companion-test-support.
# dev-dependencies never link into release binaries.
rcgen = { version = "0.13" }

# D09 SLICE 1: integration tests use reqwest as an mTLS client. rcgen
# is gated behind the `http-companion-test-support` feature in
# [dependencies] above (optional) so the integration test crate can
# opt into the test-support module without pulling rcgen into release
# builds.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls-manual-roots", "json"] }
